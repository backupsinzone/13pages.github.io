e angel of the church in Smyrna write: These are the words of him who is the First and the Last, who died and came to life again."],[9,"I know your afflictions and your poverty-yet you are rich! I know the slander of those who say they are Jews and are not, but are a synagogue of Satan."],[10,"Do not be afraid of what you are about to suffer. I tell you, the devil will put some of you in prison to test you, and you will suffer persecution for ten days. Be faithful, even to the point of death, and I will give you the crown of life."],[11,"He who has an ear, let him hear what the Spirit says to the churches. He who overcomes will not be hurt at all by the second death."],[12,"“To the angel of the church in Pergamum write: These are the words of him who has the sharp, doubleedged sword."],[13,"I know where you live-where Satan has his throne. Yet you remain true to my name. You did not renounce your faith in me, even in the days of Antipas, my faithful witness, who was put to death in your city-where Satan lives."],[14,"Nevertheless, I have a few things against you: You have people there who hold to the teaching of Balaam, who taught Balak to entice the Israelites to sin by eating food sacrificed to idols and by committing sexual immorality."],[15,"Likewise you also have those who hold to the teaching of the Nicolaitans."],[16,"Repent therefore! Otherwise, I will soon come to you and will fight against them with the sword of my mouth."],[17,"He who has an ear, let him hear what the Spirit says to the churches. To him who overcomes, I will give some of the hidden manna. I will also give him a white stone with a new name written on it, known only to him who receives it."],[18,"“To the angel of the church in Thyatira write: These are the words of the Son of God, whose eyes are like blazing fire and whose feet are like burnished bronze."],[19,"I know your deeds, your love and faith, your service and perseverance, and that you are now doing more than you did at first."],[20,"Nevertheless, I have this against you: You tolerate that woman Jezebel, who calls herself a prophetess. By her teaching she misleads my servants into"],[21,"I have given her time to repent of her immorality, but she is unwilling."],[22,"So I will cast her on a bed of suffering, and I will make those who commit adultery with her suffer intensely, unless they repent of her ways."],[23,"I will strike her children dead. Then all the churches will know that I am he who searches hearts and minds, and I will repay each of you according to your deeds."],[24,"Now I say to the rest of you in Thyatira, to you who do not hold to her teaching and have not learned Satan’s so-called deep secrets (I will not impose any other burden on you):"],[25,"Only hold on to what you have until I come."],[26,"To him who overcomes and does my will to the end, I will give authority over the nations–"],[27,"‘He will rule them with an iron scepter; he will dash them to pieces like pottery’ –"],[28,"just as I have received authority from my Father. I will also give him the morning star."],[29,"He who has an ear, let him hear what the Spirit says to the churches."]]},{"chapter":3,"title":"Revelation 3","verses":[[1,"“To the angel of the church in Sardis write: These are the words of him who holds the seven spirits of God and the seven stars. I know your deeds; you have a reputation of being alive, but you are dead."],[2,"Wake up! Strengthen what remains and is about to die, for I have not found your deeds complete in the sight of my God."],[3,"Remember, therefore, what you have received and heard; obey it, and repent. But if you do not wake up, I will come like a thief, and you will not know at what time I will come to you."],[4,"Yet you have a few people in Sardis who have not soiled their clothes. They will walk with me, dressed in white, for they are worthy."],[5,"He who overcomes will, like them, be dressed in white. I will never blot out his name from the book of life, but will acknowledge his name before my Father and his angels."],[6,"He who has an ear, let him hear what the Spirit says to the churches."],[7,"“To the angel of the church in Philadelphia write: These are the words of him who is holy and true, who holds the key of David. What he opens no one can shut, and what he shuts no one can open."],[8,"I know your deeds. See, I have placed before you an open door that no one can shut. I know that you have little"],[9,"I will make those who are of the synagogue of Satan, who claim to be Jews though they are not, but are liars–I will make them come and fall down at your feet and acknowledge that I have loved you."],[10,"Since you have kept my command to endure patiently, I will also keep you from the hour of trial that is going to come upon the whole world to test those who live on the earth."],[11,"I am coming soon. Hold on to what you have, so that no one will take your crown."],[12,"Him who overcomes I will make a pillar in the temple of my God. Never again will he leave it. I will write on him the name of my God and the name of the city of my God, the new Jerusalem, which is coming down out of heaven from my God; and I will also write on him my new name."],[13,"He who has an ear, let him hear what the Spirit says to the churches."],[14,"“To the angel of the church in Laodicea write: These are the words of the Amen, the faithful and true witness, the ruler of God’s creation."],[15,"I know your deeds, that you are neither cold nor hot. I wish you were either one or the other!"],[16,"So, because you are lukewarm– neither hot nor cold–I am about to spit you out of my mouth."],[17,"You say, ‘I am rich; I have acquired wealth and do not need a thing.’ But you do not realize that you are wretched, pitiful, poor, blind and naked."],[18,"I counsel you to buy from me gold refined in the fire, so you can become rich; and white clothes to wear, so you can cover your shameful nakedness; and salve to put on your eyes, so you can see."],[19,"Those whom I love I rebuke and discipline. So be earnest, and repent."],[20,"Here I am! I stand at the door and knock. If anyone hears my voice and opens the door, I will come in and eat with him, and he with me."],[21,"To him who overcomes, I will give the right to sit with me on my throne, just as I overcame and sat down with my Father on his throne."],[22,"He who has an ear, let him hear what the Spirit says to the churches.”"]]},{"chapter":4,"title":"Revelation 4","verses":[[1,"After this I looked, and there before me was a door standing open in heaven. And the voice I had first heard speaking to me like a trumpet said, “Come up here, and I will show you what must take place after this.”"],[2,"At once I was in the Spirit, and there before me was a throne in heaven with someone sitting on it."],[3,"And the one who sat there had the appearance of jasper and carnelian. A rainbow, resembling an emerald, encircled the throne."],[4,"Surrounding the throne were twenty-four other thrones, and seated on them were twenty-four elders. They were dressed in white and had crowns of gold on their heads."],[5,"From the throne came flashes of lightning, rumblings and peals of thunder. Before the throne, seven lamps were blazing. These are the seven spirits of God."],[6,"Also before the throne there was what looked like a sea of glass, clear as crystal."],[7,"In the center, around the throne, were four living creatures, and they were covered with eyes, in front and in back. The first living creature was like a lion, the second was like an ox, the third had a face like a man, the fourth was like a flying eagle."],[8,"Each of the four living creatures had six wings and was covered with eyes all around, even under his wings. Day and night they never stop saying: “Holy, holy, holy is the Lord God Almighty, who was, and is, and is to come.”"],[9,"Whenever the living creatures give glory, honor and thanks to him who sits on the throne and who lives for ever and ever,"],[10,"the twenty-four elders fall down before him who sits on the throne, and worship him who lives for ever and ever. They lay their crowns before the throne and say:"],[11,"“You are worthy, our Lord and God, to receive glory and honor and power, for you created all things, and by your will they were created and have their being.”"]]},{"chapter":5,"title":"Revelation 5","verses":[[1,"Then I saw in the right hand of him who sat on the throne a scroll with writing on both sides and sealed with seven seals."],[2,"And I saw a mighty angel proclaiming in a loud voice, “Who is worthy to break the seals and open the scroll?”"],[3,"But no one in heaven or on earth or under the earth could open the scroll or even look inside it."],[4,"I wept and wept because no one was found who was worthy to open the scroll or look inside."],[5,"Then one of the elders said to me, “Do not weep! See, the Lion of the tribe of Judah, the Root of David, has triumphed. He is able to open the scroll and its seven seals.”"],[6,"Then I saw a Lamb, looking as if it had been slain, standing in the center of the throne, encircled by the four living creatures and the elders. He had seven horns and seven eyes, which are the seven spirits of God sent out into all the earth."],[7,"He came and took the scroll from the right hand of him who sat on the throne."],[8,"And when he had taken it, the four living creatures and the twenty-four elders fell down before the Lamb. Each one had a harp and they were holding golden bowls full of incense, which are the prayers of the saints."],[9,"And they sang a new song: “You are worthy to take the scroll and to open its seals, because you were slain, and with your blood you purchased men for God from every tribe and language and people and nation."],[10,"You have made them to be a kingdom and priests to serve our God, and they will reign on the earth.”"],[11,"Then I looked and heard the voice of many angels, numbering thousands upon thousands, and ten thousand times ten thousand. They encircled the throne and the living creatures and the elders."],[12,"In a loud voice they sang: “Worthy is the Lamb, who was slain, to receive power and wealth and wisdom and strength and honor and glory and praise!”"],[13,"Then I heard every creature in heaven and on earth and under the earth and on the sea, and all that is in them, singing: “To him who sits on the throne and to the Lamb be praise and honor and glory and power, for ever and ever!”"],[14,"The four living creatures said, “Amen,” and the elders fell down and worshiped."]]},{"chapter":6,"title":"Revelation 6","verses":[[1,"I watched as the Lamb opened the first of the seven seals. Then I heard one of the four living creatures say in a voice like thunder, “Come!”"],[2,"I looked, and there before me was a white horse! Its rider held a bow, and he was given a crown, and he rode out as a conqueror bent on conquest."],[3,"When the Lamb opened the second seal, I heard the second living creature say, “Come!”"],[4,"Then another horse came out, a fiery red one. Its rider was given power to take peace from the earth and to make men slay each other. To him was given a large sword."],[5,"When the Lamb opened the third seal, I heard the third living creature say, “Come!” I looked, and there before me was a black horse! Its rider was holding a pair of scales in his hand."],[6,"Then I heard what sounded like a voice among the four living creatures, saying, “A quart of wheat for a day’s wages, and three quarts of barley for a day’s wages, and do not damage the oil and the wine!”"],[7,"When the Lamb opened the fourth seal, I heard the voice of the fourth living creature say, “Come!”"],[8,"I looked, and there before me was a pale horse! Its rider was named Death, and Hades was following close behind him. They were given power over a fourth of the earth to kill by sword, famine and plague, and by the wild beasts of the earth."],[9,"When he opened the fifth seal, I saw under the altar the souls of those who had been slain because of the word of God and the testimony they had maintained."],[10,"They called out in a loud voice, “How long, Sovereign Lord, holy and true, until you judge the inhabitants of the earth and avenge our blood?”"],[11,"Then each of them was given a white robe, and they were told to wait a little longer, until the number of their fellow servants and brothers who were to be killed as they had been was completed."],[12,"I watched as he opened the sixth seal. There was a great earthquake. The sun turned black like sackcloth made of goat hair, the whole moon turned blood red,"],[13,"and the stars in the sky fell to earth, as late figs drop from a fig tree when shaken by a strong wind."],[14,"The sky receded like a scroll, rolling up, and every mountain and island was removed from its place."],[15,"Then the kings of the earth, the princes, the generals, the rich, the mighty, and every slave and every free man hid in caves and among the rocks of the mountains."],[16,"They called to the mountains and the rocks, “Fall on us and hide us from the face of him who sits on the throne and from the wrath of the Lamb!"],[17,"For the great day of their wrath has come, and who can stand?”"]]},{"chapter":7,"title":"Revelation 7","verses":[[1,"After this I saw four angels standing at the four corners of the earth, holding back the four winds of the earth to prevent any wind from blowing on the land or on the sea or on any tree."],[2,"Then I saw another angel coming up from the east, having the seal of the living God. He called out in a loud voice to the four angels who had been given power to harm the land and the sea:"],[3,"“Do not harm the land or the sea or the trees until we put a seal on the foreheads of the servants of our God.”"],[4,"Then I heard the number of those who were sealed: 144,000 from all the tribes of Israel."],[5,"From the tribe of Judah 12,000 were sealed, from the tribe of Reuben 12,000, from the tribe of Gad 12,000,"],[6,"from the tribe of Asher 12,000, from the tribe of Naphtali 12,000, from the tribe of Manasseh 12,000,"],[7,"from the tribe of Simeon 12,000, from the tribe of Levi 12,000, from the tribe of Issachar 12,000,"],[8,"from the tribe of Zebulun 12,000, from the tribe of Joseph 12,000, from the tribe of Benjamin 12,000."],[9,"After this I looked and there before me was a great multitude that no one could count, from every nation, tribe, people"],[10,"And they cried out in a loud voice: “Salvation belongs to our God, who sits on the throne, and to the Lamb.”"],[11,"All the angels were standing around the throne and around the elders and the four living creatures. They fell down on their faces before the throne and worshiped God,"],[12,"saying: “Amen! Praise and glory and wisdom and thanks and honor and power and strength be to our God for ever and ever. Amen!”"],[13,"Then one of the elders asked me, “These in white robes–who are they, and where did they come from?”"],[14,"I answered, “Sir, you know.”"],[15,"And he said, “These are they who have come out of the great tribulation; they have washed their robes and made them white in the blood of the Lamb. Therefore, “they are before the throne of God and serve him day and night in his temple; and he who sits on the throne will spread his tent over them."],[16,"Never again will they hunger; never again will they thirst. The sun will not beat upon them, nor any scorching heat."],[17,"For the Lamb at the center of the throne will be their shepherd; he will lead them to springs of living water. And"]]},{"chapter":8,"title":"Revelation 8","verses":[[1,"When he opened the seventh seal, there was silence in heaven for about half an hour."],[2,"And I saw the seven angels who stand before God, and to them were given seven trumpets."],[3,"Another angel, who had a golden censer, came and stood at the altar. He was given much incense to offer, with the prayers of all the saints, on the golden altar before the throne."],[4,"The smoke of the incense, together with the prayers of the saints, went up before God from the angel’s hand."],[5,"Then the angel took the censer, filled it with fire from the altar, and hurled it on the earth; and there came peals of thunder, rumblings, flashes of lightning and an earthquake."],[6,"Then the seven angels who had the seven trumpets prepared to sound them."],[7,"The first angel sounded his trumpet, and there came hail and fire mixed with blood, and it was hurled down upon the earth. A third of the earth was burned up, a third of the trees were burned up, and all the green grass was burned up."],[8,"The second angel sounded his trumpet, and something like a huge mountain, all ablaze, was thrown into the sea. A third of the sea turned into blood,"],[9,"a third of the living creatures in the sea died, and a third of the ships were destroyed."],[10,"The third angel sounded his trumpet, and a great star, blazing like a torch, fell from the sky on a third of the rivers and on the springs of water–"],[11,"the name of the star is Wormwood. A third of the waters turned bitter, and many people died from the waters that had become bitter."],[12,"The fourth angel sounded his trumpet, and a third of the sun was struck, a third of the moon, and a third of the stars, so that a third of them turned dark. A third of the day was without light, and also a third of the night."],[13,"As I watched, I heard an eagle that was flying in midair call out in a loud voice: “Woe! Woe! Woe to the inhabitants of the earth, because of the trumpet blasts about to be sounded by the other three angels!”"]]},{"chapter":9,"title":"Revelation 9","verses":[[1,"The fifth angel sounded his trumpet, and I saw a star that had fallen from the sky to the earth. The star was given the key to the shaft of the Abyss."],[2,"When he opened the Abyss, smoke rose from it like the smoke from a gigantic furnace. The sun and sky were darkened by the smoke from the Abyss."],[3,"And out of the smoke locusts came down upon the earth and were given power like that of scorpions of the earth."],[4,"They were told not to harm the grass of the earth or any plant or tree, but only those people who did not have the seal of God on their foreheads."],[5,"They were not given power to kill them, but only to torture them for five months. And the agony they suffered was like that of the sting of a scorpion when it strikes a man."],[6,"During those days men will seek death, but will not find it; they will long to die, but death will elude them."],[7,"The locusts looked like horses prepared for battle. On their heads they wore something like crowns of gold, and their faces resembled human faces."],[8,"Their hair was like women’s hair, and their teeth were like lions’ teeth."],[9,"They had breastplates like breastplates of iron, and the sound of their wings was like the thundering of many horses and chariots rushing into battle."],[10,"They had tails and stings like scorpions, and in their tails they had power to torment people for five months."],[11,"They had as king over them the angel of the Abyss, whose name in Hebrew is Abaddon, and in Greek, Apollyon."],[12,"The first woe is past; two other woes are yet to come."],[13,"The sixth angel sounded his trumpet, and I heard a voice coming from the horns of the golden altar that is before God."],[14,"It said to the sixth angel who had the trumpet, “Release the four angels who are bound at the great river Euphrates.”"],[15,"And the four angels who had been kept ready for this very hour and day and month and year were released to kill a third of mankind."],[16,"The number of the mounted troops was two hundred million. I heard their number."],[17,"The horses and riders I saw in my vision looked like this: Their breastplates were fiery red, dark blue, and yellow as sulfur. The heads of the horses resembled the heads of lions, and out of their mouths came fire, smoke and sulfur."],[18,"A third of mankind was killed by the three plagues of fire, smoke and sulfur that came out of their mouths."],[19,"The power of the horses was in their mouths and in their tails; for their tails were like snakes, having heads with which they inflict injury."],[20,"The rest of mankind that were not killed by these plagues still did not repent of the work of their hands; they did not stop worshiping demons, and idols of gold, silver, bronze, stone and wood–idols that cannot see or hear or walk."],[21,"Nor did they repent of their murders, their magic arts, their sexual immorality or their thefts."]]},{"chapter":10,"title":"Revelation 10","verses":[[1,"Then I saw another mighty angel coming down from heaven. He was robed in a cloud, with a rainbow above his head; his face was like the sun, and his legs were like fiery pillars."],[2,"He was holding a little scroll, which lay open in his hand. He planted his right foot on the sea and his left foot on the land,"],[3,"and he gave a loud shout like the roar of a lion. When he shouted, the voices of the seven thunders spoke."],[4,"And when the seven thunders spoke, I was about to write; but I heard a voice from heaven say, “Seal up what the seven thunders have said and do not write it down.”"],[5,"Then the angel I had seen standing on the sea and on the land raised his right hand to heaven."],[6,"And he swore by him who lives for ever and ever, who created the heavens and all that is in them, the earth and all that is in it, and the sea and all that is in it, and said, “There will be no more delay!"],[7,"But in the days when the seventh angel is about to sound his trumpet, the mystery of God will be accomplished, just as he announced to his servants the prophets.”"],[8,"Then the voice that I had heard from heaven spoke to me once more: “Go, take the scroll that lies open in the hand of the angel who is standing on the sea and on the land.”"],[9,"So I went to the angel and asked him to give me the little scroll. He said to me, “Take it and eat it. It will turn your stomach sour, but in your mouth it will be as sweet as honey.”"],[10,"I took the little scroll from the angel’s hand and ate it. It tasted as sweet as honey in my mouth, but when I had eaten it, my stomach turned sour."],[11,"Then I was told, “You must prophesy again about many peoples, nations, languages and kings.”"]]},{"chapter":11,"title":"Revelation 11","verses":[[1,"I was given a reed like a measuring rod and was told, “Go and measure the temple of God and the altar, and count the worshipers there."],[2,"But exclude the outer court; do not measure it, because it has been given to the Gentiles. They will trample on the holy city for 42 months."],[3,"And I will give power to my two witnesses, and they will prophesy for 1,260 days, clothed in sackcloth.”"],[4,"These are the two olive trees and the two lampstands that stand before the Lord of the earth."],[5,"If anyone tries to harm them, fire comes from their mouths and devours their enemies. This is how anyone who wants to harm them must die."],[6,"These men have power to shut up the sky so that it will not rain during the time they are prophesying; and they have power to turn the waters into blood and"],[7,"Now when they have finished their testimony, the beast that comes up from the Abyss will attack them, and overpower and kill them."],[8,"Their bodies will lie in the street of the great city, which is figuratively called Sodom and Egypt, where also their Lord was crucified."],[9,"For three and a half days men from every people, tribe, language and nation will gaze on their bodies and refuse them burial."],[10,"The inhabitants of the earth will gloat over them and will celebrate by sending each other gifts, because these two prophets had tormented those who live on the earth."],[11,"But after the three and a half days a breath of life from God entered them, and they stood on their feet, and terror struck those who saw them."],[12,"Then they heard a loud voice from heaven saying to them, “Come up here.” And they went up to heaven in a cloud, while their enemies looked on."],[13,"At that very hour there was a severe earthquake and a tenth of the city collapsed. Seven thousand people were killed in the earthquake, and the survivors were terrified and gave glory to the God of heaven."],[14,"The second woe has passed; the third woe is coming soon."],[15,"The seventh angel sounded his trumpet, and there were loud voices in heaven, which said: “The kingdom of the world has become the kingdom of our Lord and of his Christ, and he will reign for ever and ever.”"],[16,"And the twenty-four elders, who were seated on their thrones before God, fell on their faces and worshiped God,"],[17,"saying: “We give thanks to you, Lord God Almighty, the One who is and who was, because you have taken your great power and have begun to reign."],[18,"The nations were angry; and your wrath has come. The time has come for judging the dead, and for rewarding your servants the prophets and your saints and those who reverence your name, both small and great– and for destroying those who destroy the earth.”"],[19,"Then God’s temple in heaven was opened, and within his temple was seen the ark of his covenant. And there came flashes of lightning, rumblings, peals of thunder, an earthquake and a great hailstorm."]]},{"chapter":12,"title":"Revelation 12","verses":[[1,"A great and wondrous sign appeared in heaven: a woman clothed with the sun, with the moon under her feet and a crown of twelve stars on her head."],[2,"She was pregnant and cried out in pain as she was about to give birth."],[3,"Then another sign appeared in heaven: an enormous red dragon with seven heads and ten horns and seven crowns on his heads."],[4,"His tail swept a third of the stars out of the sky and flung them to the earth. The dragon stood in front of the woman who was about to give birth, so that he might devour her child the moment it was born."],[5,"She gave birth to a son, a male child, who will rule all the nations with an iron scepter. And her child was snatched up to God and to his throne."],[6,"The woman fled into the desert to a place prepared for her by God, where she might be taken care of for 1,260 days."],[7,"And there was war in heaven. Michael and his angels fought against the dragon, and the dragon and his angels fought back."],[8,"But he was not strong enough, and they lost their place in heaven."],[9,"The great dragon was hurled down– that ancient serpent called the devil, or Satan, who leads the whole world astray. He was hurled to the earth, and his angels with him."],[10,"Then I heard a loud voice in heaven say: “Now have come the salvation and the power and the kingdom of our God, and the authority of his Christ. For the accuser of our brothers, who accuses them before our God day and night, has been hurled down."],[11,"They overcame him by the blood of the Lamb and by the word of their testimony; they did not love their lives so much as to shrink from death."],[12,"Therefore rejoice, you heavens and you who dwell in them! But woe to the earth and the sea, because the devil has gone down to you! He is filled with fury, because he knows that his time is short.”"],[13,"When the dragon saw that he had been hurled to the earth, he pursued the woman who had given birth to the male child."],[14,"The woman was given the two wings of a great eagle, so that she might fly to the place prepared for her in the desert, where she would be taken care of for a time, times and half a time, out of the serpent’s reach."],[15,"Then from his mouth the serpent spewed water like a river, to overtake the woman and sweep her away with the torrent."],[16,"But the earth helped the woman by opening its mouth and swallowing the river that the dragon had spewed out of his mouth."],[17,"Then the dragon was enraged at the woman and went off to make war against the rest of her offspring–those who obey God’s commandments and hold to the testimony of Jesus."]]},{"chapter":13,"title":"Revelation 13","verses":[[1,"And the dragon stood on theshore of the sea."],[2,"And I saw a beast coming out of the sea. He had ten horns and seven heads, with ten crowns on his horns, and on each head a blasphemous name. The beast I saw resembled a leopard, but had feet like those of a bear and a mouth like that of a lion. The dragon gave the beast his power and his throne and great authority."],[3,"One of the heads of the beast seemed to have had a fatal wound, but the fatal wound had been healed. The whole world was astonished and followed the beast."],[4,"Men worshiped the dragon because he had given authority to the beast, and they also worshiped the beast and asked, “Who is like the beast? Who can make war against him?”"],[5,"The beast was given a mouth to utter proud words and blasphemies and to exercise his authority for forty-two months."],[6,"He opened his mouth to blaspheme God, and to slander his name and his dwelling place and those who live in heaven."],[7,"He was given power to make war against the saints and to conquer them. And he was given authority over every tribe, people, language and nation."],[8,"All inhabitants of the earth will worship the beast–all whose names have not been written in the book of life belonging to the Lamb that was slain from the creation of the world."],[9,"He who has an ear, let him hear."],[10,"If anyone is to go into captivity, into captivity he will go. If anyone is to be killed with the sword, with the sword he will be killed. This calls for patient endurance and faithfulness on the part of the saints."],[11,"Then I saw another beast, coming out of the earth. He had two horns like a lamb, but he spoke like a dragon."],[12,"He exercised all the authority of the first beast on his behalf, and made the earth and its inhabitants worship the first beast, whose fatal wound had been healed."],[13,"And he performed great and miraculous signs, even causing fire to come down from heaven to earth in full view of men."],[14,"Because of the signs he was given power to do on behalf of the first beast, he deceived the inhabitants of the earth. He ordered them to set up an image in honor of the beast who was wounded by the sword and yet lived."],[15,"He was given power to give breath to the image of the first beast, so that it could speak and cause all who refused to worship the image to be killed."],[16,"He also forced everyone, small and great, rich and poor, free and slave, to receive a mark on his right hand or on his forehead,"],[17,"so that no one could buy or sell unless he had the mark, which is the name of the beast or the number of his name."],[18,"This calls for wisdom. If anyone has insight, let him calculate the number of the beast, for it is man’s number. His number is 666."]]},{"chapter":14,"title":"Revelation 14","verses":[[1,"Then I looked, and there before me was the Lamb, standing on Mount Zion, and with him 144,000 who had his name and his Father’s name written on their foreheads."],[2,"And I heard a sound from heaven like the roar of rushing waters and like a loud peal of thunder. The sound I heard was like that of harpists playing their harps."],[3,"And they sang a new song before the throne and before the four living creatures and the elders. No one could learn the song except the 144,000 who had been redeemed from the earth."],[4,"These are those who did not defile themselves with women, for they kept themselves pure. They follow the Lamb wherever he goes. They were purchased from among men and offered as firstfruits to God and the Lamb."],[5,"No lie was found in their mouths; they are blameless."],[6,"Then I saw another angel flying in midair, and he had the eternal gospel to proclaim to those who live on the earth– to every nation, tribe, language and people."],[7,"He said in a loud voice, “Fear God and give him glory, because the hour of his judgment has come. Worship him who made the heavens, the earth, the sea and the springs of water.”"],[8,"A second angel followed and said, “Fallen! Fallen is Babylon the Great, which made all the nations drink the maddening wine of her adulteries.”"],[9,"A third angel followed them and said in a loud voice: “If anyone worships the beast and his image and receives his mark on the forehead or on the hand,"],[10,"he, too, will drink of the wine of God’s fury, which has been poured full strength into the cup of his wrath. He will be tormented with burning sulfur in the presence of the holy angels and of the Lamb."],[11,"And the smoke of their torment rises for ever and ever. There is no rest day or night for those who worship the beast and his image, or for anyone who receives the mark of his name.”"],[12,"This calls for patient endurance on the part of the saints who obey God’s commandments and remain faithful to Jesus."],[13,"Then I heard a voice from heaven say, “Write: Blessed are the dead who die in the Lord from now on.” “Yes,” says the Spirit, “they will rest from their labor, for their deeds will follow them.”"],[14,"I looked, and there before me was a white cloud, and seated on the cloud was one “like a son of man” with a"],[15,"Then another angel came out of the temple and called in a loud voice to him who was sitting on the cloud, “Take your sickle and reap, because the time to reap has come, for the harvest of the earth is ripe.”"],[16,"So he who was seated on the cloud swung his sickle over the earth, and the earth was harvested."],[17,"Another angel came out of the temple in heaven, and he too had a sharp sickle."],[18,"Still another angel, who had charge of the fire, came from the altar and called in a loud voice to him who had the sharp sickle, “Take your sharp sickle and gather the clusters of grapes from the earth’s vine, because its grapes are ripe.”"],[19,"The angel swung his sickle on the earth, gathered its grapes and threw them into the great winepress of God’s wrath."],[20,"They were trampled in the winepress outside the city, and blood flowed out of the press, rising as high as the horses’ bridles for a distance of 1,600 stadia."]]},{"chapter":15,"title":"Revelation 15","verses":[[1,"I saw in heaven another great and marvelous sign: seven angels with the seven last plagues–last, because with them God’s wrath is completed."],[2,"And I saw what looked like a sea of glass mixed with fire and, standing"],[3,"and sang the song of Moses the servant of God and the song of the Lamb: “Great and marvelous are your deeds, Lord God Almighty. Just and true are your ways, King of the ages."],[4,"Who will not fear you, O Lord, and bring glory to your name? For you alone are holy. All nations will come and worship before you, for your righteous acts have been revealed.”"],[5,"After this I looked and in heaven the temple, that is, the tabernacle of the Testimony, was opened."],[6,"Out of the temple came the seven angels with the seven plagues. They were dressed in clean, shining linen and wore golden sashes around their chests."],[7,"Then one of the four living creatures gave to the seven angels seven golden bowls filled with the wrath of God, who lives for ever and ever."],[8,"And the temple was filled with smoke from the glory of God and from his power, and no one could enter the temple until the seven plagues of the seven angels were completed."]]},{"chapter":16,"title":"Revelation 16","verses":[[1,"Then I heard a loud voice from the temple saying to the seven angels, “Go, pour out the seven bowls of God’s wrath on the earth.”"],[2,"The first angel went and poured out his bowl on the land, and ugly and painful sores broke out on the people who had the mark of the beast and worshiped his image."],[3,"The second angel poured out his bowl on the sea, and it turned into blood like that of a dead man, and every living thing in the sea died."],[4,"The third angel poured out his bowl on the rivers and springs of water, and they became blood."],[5,"Then I heard the angel in charge of the waters say: “You are just in these judgments, you who are and who were, the Holy One, because you have so judged;"],[6,"for they have shed the blood of your saints and prophets, and you have given them blood to drink as they deserve.”"],[7,"And I heard the altar respond: “Yes, Lord God Almighty, true and just are your judgments.”"],[8,"The fourth angel poured out his bowl on the sun, and the sun was given power to scorch people with fire."],[9,"They were seared by the intense heat and they cursed the name of God, who had control over these plagues, but they refused to repent and glorify him."],[10,"The fifth angel poured out his bowl on the throne of the beast, and his kingdom was plunged into darkness. Men gnawed their tongues in agony"],[11,"and cursed the God of heaven because of their pains and their sores, but they refused to repent of what they had done."],[12,"The sixth angel poured out his bowl on the great river Euphrates, and its water was dried up to prepare the way for the kings from the East."],[13,"Then I saw three evil spirits that looked like frogs; they came out of the mouth of the dragon, out of the mouth of the beast and out of the mouth of the false prophet."],[14,"They are spirits of demons performing miraculous signs, and they go out to the kings of the whole world, to gather them for the battle on the great day of God Almighty."],[15,"“Behold, I come like a thief! Blessed is he who stays awake and keeps his clothes with him, so that he may not go naked and be shamefully exposed.”"],[16,"Then they gathered the kings together to the place that in Hebrew is called Armageddon."],[17,"The seventh angel poured out his bowl into the air, and out of the temple came a loud voice from the throne, saying, “It is done!”"],[18,"Then there came flashes of lightning, rumblings, peals of thunder and a severe earthquake. No earthquake like it has ever occurred since man has been on earth, so tremendous was the quake."],[19,"The great city split into three parts, and the cities of the nations collapsed. God remembered Babylon the Great and gave her the cup filled with the wine of the fury of his wrath."],[20,"Every island fled away and the mountains could not be found."],[21,"From the sky huge hailstones of about a hundred pounds each fell upon men. And they cursed God on account of the plague of hail, because the plague was so terrible."]]},{"chapter":17,"title":"Revelation 17","verses":[[1,"One of the seven angels who had the seven bowls came and said to me, “Come, I will show you the punishment of the great prostitute, who sits on many waters."],[2,"With her the kings of the earth committed adultery and the inhabitants of the earth were intoxicated with the wine of her adulteries.”"],[3,"Then the angel carried me away in the Spirit into a desert. There I saw a woman sitting on a scarlet beast that was covered with blasphemous names and had seven heads and ten horns."],[4,"The woman was dressed in purple and scarlet, and was glittering with gold, precious stones and pearls. She held a golden cup in her hand, filled with abominable things and the filth of her adulteries."],[5,"This title was written on her forehead:"],[6,"I saw that the woman was drunk with the blood of the saints, the blood of those who bore testimony to Jesus."],[7,"When I saw her, I was greatly astonished. Then the angel said to me: “Why are you astonished? I will explain to you the mystery of the woman and of the beast she rides, which has the seven heads and ten horns."],[8,"The beast, which you saw, once was, now is not, and will come up out of the Abyss and go to his destruction. The inhabitants of the earth whose names have not been written in the book of life from the creation of the world will be astonished when they see the beast, because he once was, now is not, and yet will come."],[9,"“This calls for a mind with wisdom. The seven heads are seven hills on which the woman sits."],[10,"They are also seven kings. Five have fallen, one is, the other has not yet come; but when he does come, he must remain for a little while."],[11,"The beast who once was, and now is not, is an eighth king. He belongs to the seven and is going to his destruction."],[12,"“The ten horns you saw are ten kings who have not yet received a kingdom, but who for one hour will receive authority as kings along with the beast."],[13,"They have one purpose and will give their power and authority to the beast."],[14,"They will make war against the Lamb, but the Lamb will overcome them because he is Lord of lords and King of kings–and with him will be his called, chosen and faithful followers.”"],[15,"Then the angel said to me, “The waters you saw, where the prostitute sits, are peoples, multitudes, nations and languages."],[16,"The beast and the ten horns you saw will hate the prostitute. They will bring her to ruin and leave her naked; they will eat her flesh and burn her with fire."],[17,"For God has put it into their hearts to accomplish his purpose by agreeing to give the beast their power to rule, until God’s words are fulfilled."],[18,"The woman you saw is the great city that rules over the kings of the earth.”"]]},{"chapter":18,"title":"Revelation 18","verses":[[1,"After this I saw another angel coming down from heaven. He had great authority, and the earth was illuminated by his splendor."],[2,"With a mighty voice he shouted: “Fallen! Fallen is Babylon the Great! She has become a home for demons and a haunt for every evil spirit, a haunt for every unclean and detestable bird."],[3,"For all the nations have drunk the maddening wine of her adulteries. The kings of the earth committed adultery with her, and the merchants of the earth grew rich from her excessive luxuries.”"],[4,"Then I heard another voice from heaven say: “Come out of her, my people, so that you will not share in her sins, so that you will not receive any of her plagues;"],[5,"for her sins are piled up to heaven, and God has remembered her crimes."],[6,"Give back to her as she has given; pay her back double for what she has done. Mix her a double portion from her own cup."],[7,"Give her as much torture and grief as the glory and luxury she gave herself. In her heart she boasts, ‘I sit as queen; I am not a widow, and I will never mourn.’"],[8,"Therefore in one day her plagues will overtake her: death, mourning and famine. She will be consumed by fire, for mighty is the Lord God who judges her."],[9,"“When the kings of the earth who committed adultery with her and shared her luxury see the smoke of her burning, they will weep and mourn over her."],[10,"Terrified at her torment, they will stand far off and cry: ” ‘Woe! Woe, O great city, O Babylon, city of power! In one hour your doom has come!’"],[11,"“The merchants of the earth will weep and mourn over her because no one buys their cargoes any more–"],[12,"cargoes of gold, silver, precious stones and pearls; fine linen, purple, silk and scarlet cloth; every sort of citron wood, and articles of every kind made of"],[13,"cargoes of cinnamon and spice, of incense, myrrh and frankincense, of wine and olive oil, of fine flour and wheat; cattle and sheep; horses and carriages; and bodies and souls of men."],[14,"“They will say, ‘The fruit you longed for is gone from you. All your riches and splendor have vanished, never to be recovered.’"],[15,"The merchants who sold these things and gained their wealth from her will stand far off, terrified at her torment. They will weep and mourn"],[16,"and cry out: ” ‘Woe! Woe, O great city, dressed in fine linen, purple and scarlet, and glittering with gold, precious stones and pearls!"],[17,"In one hour such great wealth has been brought to ruin!’"],[18,"“Every sea captain, and all who travel by ship, the sailors, and all who earn their living from the sea, will stand far off. When they see the smoke of her burning, they will exclaim, ‘Was there ever a city like this great city?’"],[19,"They will throw dust on their heads, and with weeping and mourning cry out: ” ‘Woe! Woe, O great city, where all who had ships on the sea became rich through her wealth! In one hour she has been brought to ruin!"],[20,"Rejoice over her, O heaven! Rejoice, saints and apostles and prophets! God has judged her for the way she treated you.‘ “"],[21,"Then a mighty angel picked up a boulder the size of a large millstone and threw it into the sea, and said: “With such violence the great city of Babylon will be thrown down, never to be found again."],[22,"The music of harpists and musicians, flute players and trumpeters, will never be heard in you again. No workman of any trade will ever be found in you again. The sound of a millstone will never be heard in you again."],[23,"The light of a lamp will never shine in you again. The voice of bridegroom and bride will never be heard in you again. Your merchants were the world’s great men. By your magic spell all the nations were led astray."],[24,"In her was found the blood of prophets and of the saints, and of all who have been killed on the earth.”"]]},{"chapter":19,"title":"Revelation 19","verses":[[1,"After this I heard what sounded like the roar of a great multitude in heaven shouting: “Hallelujah! Salvation and glory and power belong to our God,"],[2,"for true and just are his judgments. He has condemned the great prostitute who corrupted the earth by her adulteries. He has avenged on her the blood of his servants.”"],[3,"And again they shouted: “Hallelujah! The smoke from her goes up for ever and ever.”"],[4,"The twenty-four elders and the four living creatures fell down and worshiped God, who was seated on the throne. And they cried: “Amen, Hallelujah!”"],[5,"Then a voice came from the throne, saying: “Praise our God, all you his servants, you who fear him, both small and great!”"],[6,"Then I heard what sounded like a great multitude, like the roar of rushing waters and like loud peals of thunder, shouting: “Hallelujah! For our Lord God Almighty reigns."],[7,"Let us rejoice and be glad and give him glory! For the wedding of the Lamb has come, and his bride has made herself ready."],[8,"Fine linen, bright and clean, was given her to wear.” (Fine linen stands for the righteous acts of the saints.)"],[9,"Then the angel said to me, “Write: ‘Blessed are those who are invited to the wedding supper of the Lamb!’ ” And he added, “These are the true words of God.”"],[10,"At this I fell at his feet to worship him. But he said to me, “Do not do it! I am a fellow servant with you and with your brothers who hold to the testimony of Jesus. Worship God! For the testimony of Jesus is the spirit of prophecy.”"],[11,"I saw heaven standing open and there before me was a white horse, whose rider is called Faithful and True. With justice he judges and makes war."],[12,"His eyes are like blazing fire, and on his head are many crowns. He has a name written on him that no one knows but he himself."],[13,"He is dressed in a robe dipped in blood, and his name is the Word of God."],[14,"The armies of heaven were following him, riding on white horses and dressed in fine linen, white and clean."],[15,"Out of his mouth comes a sharp sword with which to strike down the nations. “He will rule them with an iron scepter.” He treads the winepress of the fury of the wrath of God Almighty."],[16,"On his robe and on his thigh he has this name written:"],[17,"And I saw an angel standing in the sun, who cried in a loud voice to all the birds flying in midair, “Come, gather together for the great supper of God,"],[18,"so that you may eat the flesh of kings, generals, and mighty men, of horses and their riders, and the flesh of all people, free and slave, small and great.”"],[19,"Then I saw the beast and the kings of the earth and their armies gathered together to make war against the rider on the horse and his army."],[20,"But the beast was captured, and with him the false prophet who had performed the miraculous signs on his behalf. With these signs he had deluded those who had received the mark of the beast and worshiped his image. The two of them were thrown alive into the fiery lake of burning sulfur."],[21,"The rest of them were killed with the sword that came out of the mouth of the rider on the horse, and all the birds gorged themselves on their flesh."]]},{"chapter":20,"title":"Revelation 20","verses":[[1,"And I saw an angel coming down out of heaven, having the key to the Abyss and holding in his hand a great chain."],[2,"He seized the dragon, that ancient serpent, who is the devil, or Satan, and bound him for a thousand years."],[3,"He threw him into the Abyss, and locked and sealed it over him, to keep him from deceiving the nations anymore until the thousand years were ended. After that, he must be set free for a short time."],[4,"I saw thrones on which were seated those who had been given authority to judge. And I saw the souls of those who had been beheaded because of their testimony for Jesus and because of the word of God. They had not worshiped the beast or his image and had not received his mark on their foreheads or their hands. They came to life and reigned with Christ a thousand years."],[5,"(The rest of the dead did not come to life until the thousand years were ended.) This is the first resurrection."],[6,"Blessed and holy are those who have part in the first resurrection. The second death has no power over them, but they"],[7,"When the thousand years are over, Satan will be released from his prison"],[8,"and will go out to deceive the nations in the four corners of the earth–Gog and Magog–to gather them for battle. In number they are like the sand on the seashore."],[9,"They marched across the breadth of the earth and surrounded the camp of God’s people, the city he loves. But fire came down from heaven and devoured them."],[10,"And the devil, who deceived them, was thrown into the lake of burning sulfur, where the beast and the false prophet had been thrown. They will be tormented day and night for ever and ever."],[11,"Then I saw a great white throne and him who was seated on it. Earth and sky fled from his presence, and there was no place for them."],[12,"And I saw the dead, great and small, standing before the throne, and books were opened. Another book was opened, which is the book of life. The dead were judged according to what they had done as recorded in the books."],[13,"The sea gave up the dead that were in it, and death and Hades gave up the dead that were in them, and each person was judged according to what he had done."],[14,"Then death and Hades were thrown into the lake of fire. The lake of fire is the second death."],[15,"If anyone’s name was not found written in the book of life, he was thrown into the lake of fire."]]},{"chapter":21,"title":"Revelation 21","verses":[[1,"Then I saw a new heaven and a new earth, for the first heaven and the first earth had passed away, and there was no longer any sea."],[2,"I saw the Holy City, the new Jerusalem, coming down out of heaven from God, prepared as a bride beautifully dressed for her husband."],[3,"And I heard a loud voice from the throne saying, “Now the dwelling of God is with men, and he will live with them. They will be his people, and God himself will be with them and be their God."],[4,"He will wipe every tear from their eyes. There will be no more death or mourning or crying or pain, for the old order of things has passed away.”"],[5,"He who was seated on the throne said, “I am making everything new!” Then he said, “Write this down, for these words are trustworthy and true.”"],[6,"He said to me: “It is done. I am the Alpha and the Omega, the Beginning and the End. To him who is thirsty I will give to drink without cost from the spring of the water of life."],[7,"He who overcomes will inherit all this, and I will be his God and he will be my son."],[8,"But the cowardly, the unbelieving, the vile, the murderers, the sexually immoral, those who practice magic arts, the idolaters and all liars–their place will be in the fiery lake of burning sulfur. This is the second death.”"],[9,"One of the seven angels who had the seven bowls full of the seven last plagues came and said to me, “Come, I will show you the bride, the wife of the Lamb.”"],[10,"And he carried me away in the Spirit to a mountain great and high, and showed me the Holy City, Jerusalem, coming down out of heaven from God."],[11,"It shone with the glory of God, and its brilliance was like that of a very precious jewel, like a jasper, clear as crystal."],[12,"It had a great, high wall with twelve gates, and with twelve angels at the gates. On the gates were written the names of the twelve tribes of Israel."],[13,"There were three gates on the east, three on the north, three on the south and three on the west."],[14,"The wall of the city had twelve foundations, and on them were the names of the twelve apostles of the Lamb."],[15,"The angel who talked with me had a measuring rod of gold to measure the city, its gates and its walls."],[16,"The city was laid out like a square, as long as it was wide. He measured the city with the rod and found it to be 12,000 stadia in length, and as wide and high as it is long."],[17,"He measured its wall and it was 144 cubits thick, by man’s measurement, which the angel was using."],[18,"The wall was made of jasper, and the city of pure gold, as pure as glass."],[19,"The foundations of the city walls were decorated with every kind of precious stone. The first foundation was jasper, the second sapphire, the third chalcedony, the fourth emerald,"],[20,"the fifth sardonyx, the sixth carnelian, the seventh chrysolite, the eighth beryl, the ninth topaz, the tenth chrysoprase, the eleventh jacinth, and the twelfth amethyst."],[21,"The twelve gates were twelve pearls, each gate made of a single pearl. The great street of the city was of pure gold, like transparent glass."],[22,"I did not see a temple in the city, because the Lord God Almighty and the Lamb are its temple."],[23,"The city does not need the sun or the moon to shine on it, for the glory of God gives it light, and the Lamb is its lamp."],[24,"The nations will walk by its light, and the kings of the earth will bring their splendor into it."],[25,"On no day will its gates ever be shut, for there will be no night there."],[26,"The glory and honor of the nations will be brought into it."],[27,"Nothing impure will ever enter it, nor will anyone who does what is shameful or deceitful, but only those whose names are written in the Lamb’s book of life."]]},{"chapter":22,"title":"Revelation 22","verses":[[1,"Then the angel showed me the river of the water of life, as clear as crystal, flowing from the throne of God and of the Lamb"],[2,"down the middle of the great street of the city. On each side of the river stood the tree of life, bearing twelve crops of fruit, yielding its fruit every month. And the leaves of the tree are for the healing of the nations."],[3,"No longer will there be any curse. The throne of God and of the Lamb will be in the city, and his servants will serve him."],[4,"They will see his face, and his name will be on their foreheads."],[5,"There will be no more night. They will not need the light of a lamp or the light of the sun, for the Lord God will give them light. And they will reign for ever and ever."],[6,"The angel said to me, “These words are trustworthy and true. The Lord, the God of the spirits of the prophets, sent his angel to show his servants the things that must soon take place.”"],[7,"“Behold, I am coming soon! Blessed is he who keeps the words of the prophecy in this book.”"],[8,"I, John, am the one who heard and saw these things. And when I had heard and seen them, I fell down to worship at the feet of the angel who had been showing them to me."],[9,"But he said to me, “Do not do it! I am a fellow servant with you and with your brothers the prophets and of all who keep the words of this book. Worship God!”"],[10,"Then he told me, “Do not seal up the words of the prophecy of this book, because the time is near."],[11,"Let him who does wrong continue to do wrong; let him who is vile continue to be vile; let him who does right continue to do right; and let him who is holy continue to be holy.”"],[12,"“Behold, I am coming soon! My reward is with me, and I will give to everyone according to what he has done."],[13,"I am the Alpha and the Omega, the First and the Last, the Beginning and the End."],[14,"“Blessed are those who wash their robes, that they may have the right to the tree of life and may go through the gates into the city."],[15,"Outside are the dogs, those who practice magic arts, the sexually immoral, the murderers, the idolaters and everyone who loves and practices falsehood."],[16,"“I, Jesus, have sent my angel to give you this testimony for the churches. I am the Root and the Offspring of David, and the bright Morning Star.”"],[17,"The Spirit and the bride say, “Come!” And let him who hears say, “Come!” Whoever is thirsty, let him come; and whoever wishes, let him take the free gift of the water of life."],[18,"I warn everyone who hears the words of the prophecy of this book: If anyone adds anything to them, God will add to him the plagues described in this book."],[19,"And if anyone takes words away from this book of prophecy, God will take away from him his share in the tree of life and in the holy city, which are described in this book."],[20,"He who testifies to these things says, “Yes, I am coming soon.” Amen. Come, Lord Jesus."],[21,"The grace of the Lord Jesus be with God’s people. Amen."]]}],
  korean: [{"chapter":1,"title":"요한계시록 1","verses":[[1,"예수 그리스도의 계시라 이는 하나님이 그에게 주사 반드시 속히 될 일을 그 종들에게 보이시려고 그 천사를 그 종 요한에게 보내어 지시하신 것이라"],[2,"요한은 하나님의 말씀과 예수 그리스도의 증거 곧 자기의 본 것을 다 증거하였느니라"],[3,"이 예언의 말씀을 읽는 자와 듣는 자들과 그 가운데 기록한 것을 지키는 자들이 복이 있나니 때가 가까움이라"],[4,"요한은 아시아에 있는 일곱 교회에 편지하노니 이제도 계시고 전에도 계시고 장차 오실 이와 그 보좌 앞에 일곱 영과"],[5,"또 충성된 증인으로 죽은 자들 가운데서 먼저 나시고 땅의 임금들의 머리가 되신 예수 그리스도로 말미암아 은혜와 평강이 너희에게 있기를 원하노라 우리를 사랑하사 그의 피로 우리 죄에서 우리를 해방하시고"],[6,"그 아버지 하나님을 위하여 우리를 나라와 제사장으로 삼으신 그에게 영광과 능력이 세세토록 있기를 원하노라 아멘"],[7,"볼찌어다, 구름을 타고 오시리라 각인의 눈이 그를 보겠고 그를 찌른 자들도 볼터이요 땅에 있는 모든 족속이 그를 인하여 애곡하리니 그러하리라 아멘"],[8,"주 하나님이 가라사대 나는 알파와 오메가라 이제도 있고 전에도 있었고 장차 올 자요 전능한 자라 하시더라"],[9,"나 요한은 너희 형제요 예수의 환난과 나라와 참음에 동참하는 자라 하나님의 말씀과 예수의 증거를 인하여 밧모라 하는 섬에 있었더니"],[10,"주의 날에 내가 성령에 감동하여 내 뒤에서 나는 나팔 소리 같은 큰 음성을 들으니"],[11,"가로되 너 보는 것을 책에 써서 에베소, 서머나, 버가모, 두아디라, 사데, 빌라델비아, 라오디게아 일곱 교회에 보내라 하시기로"],[12,"몸을 돌이켜 나더러 말한 음성을 알아 보려고 하여 돌이킬 때에 일곱 금 촛대를 보았는데"],[13,"촛대 사이에 인자 같은 이가 발에 끌리는 옷을 입고 가슴에 금띠를 띠고"],[14,"그 머리와 털의 희기가 흰 양털 같고 눈 같으며 그의 눈은 불꽃 같고"],[15,"그의 발은 풀무에 단련한 빛난 주석 같고 그의 음성은 많은 물 소리와 같으며"],[16,"그 오른손에 일곱 별이 있고 그 입에서 좌우에 날선 검이 나오고 그 얼굴은 해가 힘있게 비취는것 같더라"],[17,"내가 볼때에 그 발앞에 엎드러져 죽은 자 같이 되매 그가 오른손을 내게 얹고 가라사대 두려워 말라 나는 처음이요 나중이니"],[18,"곧 산 자라 내가 전에 죽었었노라 볼찌어다 이제 세세토록 살아 있어 사망과 음부의 열쇠를 가졌노니"],[19,"그러므로 네 본 것과 이제 있는 일과 장차 될 일을 기록하라"],[20,"네 본 것은 내 오른손에 일곱 별의 비밀과 일곱 금 촛대라 일곱 별은 일곱 교회의 사자요 일곱 촛대는 일곱 교회니라"]]},{"chapter":2,"title":"요한계시록 2","verses":[[1,"에베소 교회의 사자에게 편지하기를 오른손에 일곱 별을 붙잡고 일곱 금 촛대 사이에 다니시는 이가 가라사대"],[2,"내가 네 행위와 수고와 네 인내를 알고 또 악한 자들을 용납지 아니한 것과 자칭 사도라 하되 아닌 자들을 시험하여 그 거짓된 것을 네가 드러낸 것과"],[3,"또 네가 참고 내 이름을 위하여 견디고 게으르지 아니한 것을 아노라"],[4,"그러나 너를 책망할 것이 있나니 너의 처음 사랑을 버렸느니라"],[5,"그러므로 어디서 떨어진 것을 생각하고 회개하여 처음 행위를 가지라 만일 그리하지 아니하고 회개치 아니하면 내가 네게 임하여 네 촛대를 그 자리에서 옮기리라"],[6,"오직 네게 이것이 있으니 네가 니골라당의 행위를 미워하는도다 나도 이것을 미워하노라"],[7,"귀 있는 자는 성령이 교회들에게 하시는 말씀을 들을찌어다 이기는 그에게는 내가 하나님의 낙원에 있는 생명나무의 과실을 주어 먹게 하리라"],[8,"서머나 교회의 사자에게 편지하기를 처음이요 나중이요 죽었다가 살아나신 이가 가라사대"],[9,"내가 네 환난과 궁핍을 아노니 실상은 네가 부요한 자니라 자칭 유대인이라 하는 자들의 훼방도 아노니 실상은 유대인이 아니요 사단의 회라"],[10,"네가 장차 받을 고난을 두려워 말라 볼찌어다 마귀가 장차 너희 가운데서 몇 사람을 옥에 던져 시험을 받게 하리니 너희가 십일 동안 환난을 받으리라 네가 죽도록 충성하라! 그리하면 내가 생명의 면류관을 네게 주리라"],[11,"귀 있는 자는 성령이 교회들에게 하시는 말씀을 들을찌어다 이기는 자는 둘째 사망의 해를 받지 아니하리라"],[12,"버가모 교회의 사자에게 편지하기를 좌우에 날선 검을 가진 이가 가라사대"],[13,"네가 어디 사는 것을 내가 아노니 거기는 사단의 위가 있는 데라 네가 내 이름을 굳게 잡아서 내 충성된 증인 안디바가 너희 가운데 곧 사단의 거하는 곳에서 죽임을 당할 때에도 나를 믿는 믿음을 저버리지 아니하였도다"],[14,"그러나 네게 두어가지 책망할 것이 있나니 거기 네게 발람의 교훈을 지키는 자들이 있도다 발람이 발락을 가르쳐 이스라엘 앞에 올무를 놓아 우상의 제물을 먹게 하였고 또 행음하게 하였느니라"],[15,"이와 같이 네게도 니골라당의 교훈을 지키는 자들이 있도다"],[16,"그러므로 회개하라! 그리하지 아니하면 내가 네게 속히 임하여 내 입의 검으로 그들과 싸우리라"],[17,"귀 있는 자는 성령이 교회들에게 하시는 말씀을 들을찌어다 이기는 그에게는 내가 감추었던 만나를 주고 또 흰 돌을 줄터인데 그 돌 위에 새 이름을 기록한 것이 있나니 받는 자 밖에는 그 이름을 알 사람이 없느니라"],[18,"두아디라 교회의 사자에게 편지하기를 그 눈이 불꽃 같고 그 발이 빛난 주석과 같은 하나님의 아들이 가라사대"],[19,"내가 네 사업과 사랑과 믿음과 섬김과 인내를 아노니 네 나중 행위가 처음것보다 많도다"],[20,"그러나 네게 책망할 일이 있노라 자칭 선지자라 하는 여자 이세벨을 네가 용납함이니 그가 내 종들을 가르쳐 꾀어 행음하게 하고 우상의 제물을 먹게 하는도다"],[21,"또 내가 그에게 회개할 기회를 주었으되 그 음행을 회개하고자 아니하는도다"],[22,"볼찌어다 내가 그를 침상에 던질터이요 또 그로 더불어 간음하는 자들도 만일 그의 행위를 회개치 아니하면 큰 환난 가운데 던지고"],[23,"또 내가 사망으로 그의 자녀를 죽이리니 모든 교회가 나는 사람의 뜻과 마음을 살피는 자인줄 알찌라 내가 너희 각 사람의 행위대로 갚아 주리라"],[24,"두아디라에 남아 있어 이 교훈을 받지 아니하고 소위 사단의 깊은 것을 알지 못하는 너희에게 말하노니 다른 짐으로 너희에게 지울 것이 없노라"],[25,"다만 너희에게 있는 것을 내가 올 때까지 굳게 잡으라"],[26,"이기는 자와 끝까지 내 일을 지키는 그에게 만국을 다스리는 권세를 주리니"],[27,"그가 철장을 가지고 저희를 다스려 질그릇 깨뜨리는 것과 같이 하리라 나도 내 아버지께 받은 것이 그러하니라"],[28,"내가 또 그에게 새벽 별을 주리라"],[29,"귀 있는 자는 성령이 교회들에게 하시는 말씀을 들을찌어다"]]},{"chapter":3,"title":"요한계시록 3","verses":[[1,"사데 교회의 사자에게 편지하기를 하나님의 일곱 영과 일곱 별을 가진이가 가라사대 내가 네 행위를 아노니 네가 살았다 하는 이름은 가졌으나 죽은 자로다"],[2,"너는 일깨워 그 남은바 죽게 된 것을 굳게 하라 내 하나님 앞에 네 행위의 온전한 것을 찾지 못하였노니"],[3,"그러므로 네가 어떻게 받았으며 어떻게 들었는지 생각하고 지키어 회개하라 만일 일깨지 아니하면 내가 도적 같이 이르리니 어느 시에 네게 임할는지 네가 알지 못하리라"],[4,"그러나 사데에 그 옷을 더럽히지 아니한 자 몇명이 네게 있어 흰 옷을 입고 나와 함께 다니리니 그들은 합당한 자인 연고라"],[5,"이기는 자는 이와 같이 흰 옷을 입을 것이요 내가 그 이름을 생명책에서 반드시 흐리지 아니하고 그 이름을 내 아버지 앞과 그 천사들 앞에서 시인하리라"],[6,"귀 있는 자는 성령이 교회들에게 하시는 말씀을 들을찌어다"],[7,"빌라델비아 교회의 사자에게 편지하기를 거룩하고 진실하사 다윗의 열쇠를 가지신 이 곧 열면 닫을 사람이 없고 닫으면 열 사람이 없는 그이가 가라사대"],[8,"볼찌어다 내가 네 앞에 열린 문을 두었으되 능히 닫을 사람이 없으리라 내가 네 행위를 아노니 네가 적은 능력을 가지고도 내 말을 지키며 내 이름을 배반치 아니하였도다"],[9,"보라 사단의 회 곧 자칭 유대인이라 하나 그렇지 않고 거짓말 하는 자들 중에서 몇을 네게 주어 저희로 와서 네 발앞에 절하게 하고 내가 너를 사랑하는 줄을 알게 하리라"],[10,"네가 나의 인내의 말씀을 지켰은즉 내가 또한 너를 지키어 시험의 때를 면하게 하리니 이는 장차 온 세상에 임하여 땅에 거하는 자들을 시험할 때라"],[11,"내가 속히 임하리니 네가 가진 것을 굳게 잡아 아무나 네 면류관을 빼앗지 못하게 하라"],[12,"이기는 자는 내 하나님 성전에 기둥이 되게 하리니 그가 결코 다시 나가지 아니하리라 내가 하나님의 이름과 하나님의 성 곧 하늘에서 내 하나님께로부터 내려 오는 새 예루살렘의 이름과 나의 새 이름을 그이 위에 기록하리라"],[13,"귀 있는 자는 성령이 교회들에게 하시는 말씀을 들을찌어다"],[14,"라오디게아 교회의 사자에게 편지하기를 아멘이시요 충성되고 참된 증인이시요 하나님의 창조의 근본이신 이가 가라사대"],[15,"내가 네 행위를 아노니 네가 차지도 아니하고 더웁지도 아니하도다 네가 차든지 더웁든지 하기를 원하노라"],[16,"네가 이같이 미지근하여 더웁지도 아니하고 차지도 아니하니 내 입에서 너를 토하여 내치리라"],[17,"네가 말하기를 나는 부자라 부요하여 부족한 것이 없다 하나 네 곤고한 것과 가련한 것과 가난한 것과 눈 먼것과 벌거벗은 것을 알지 못하도다"],[18,"내가 너를 권하노니 내게서 불로 연단한 금을 사서 부요하게 하고 흰 옷을 사서 입어 벌거벗은 수치를 보이지 않게 하고 안약을 사서 눈에 발라 보게 하라"],[19,"무릇 내가 사랑하는 자를 책망하여 징계하노니 그러므로 네가 열심을 내라 회개하라"],[20,"볼찌어다 내가 문밖에 서서 두드리노니 누구든지 내 음성을 듣고 문을 열면 내가 그에게로 들어가 그로 더불어 먹고 그는 나로 더불어 먹으리라"],[21,"이기는 그에게는 내가 내 보좌에 함께 앉게 하여주기를 내가 이기고 아버지 보좌에 함께 앉은 것과 같이 하리라"],[22,"귀 있는 자는 성령이 교회들에게 하시는 말씀을 들을찌어다"]]},{"chapter":4,"title":"요한계시록 4","verses":[[1,"이 일 후에 내가 보니 하늘에 열린 문이 있는데 내가 들은바 처음에 내게 말하던 나팔소리 같은 그 음성이 가로되 `이리로 올라오라 이 후에 마땅히 될 일을 내가 네게 보이리라' 하시더라"],[2,"내가 곧 성령에 감동하였더니 보라, 하늘에 보좌를 베풀었고 그 보좌 위에 앉으신 이가 있는데"],[3,"앉으신 이의 모양이 벽옥과 홍보석 같고 또 무지개가 있어 보좌에 둘렸는데 그 모양이 녹보석 같더라"],[4,"또 보좌에 둘려 이십 사 보좌들이 있고 그 보좌들 위에 이십 사 장로들이 흰 옷을 입고 머리에 금 면류관을 쓰고 앉았더라"],[5,"보좌로부터 번개와 음성과 뇌성이 나고 보좌 앞에 일곱 등불 켠것이 있으니 이는 하나님의 일곱 영이라"],[6,"보좌 앞에 수정과 같은 유리 바다가 있고 보좌 가운데와 보좌 주위에 네 생물이 있는데 앞뒤에 눈이 가득하더라"],[7,"그 첫째 생물은 사자 같고 그 둘째 생물은 송아지 같고 그 세째 생물은 얼굴이 사람 같고 그 네째 생물은 날아가는 독수리 같은데"],[8,"네 생물이 각각 여섯 날개가 있고 그 안과 주위에 눈이 가득하더라 그들이 밤낮 쉬지 않고 이르기를 `거룩하다, 거룩하다, 거룩하다, 주 하나님 곧 전능하신이여 전에도 계셨고 이제도 계시고 장차 오실 자라' 하고"],[9,"그 생물들이 영광과 존귀와 감사를 보좌에 앉으사 세세토록 사시는 이에게 돌릴 때에"],[10,"이십 사 장로들이 보좌에 앉으신 이 앞에 엎드려 세세토록 사시는 이에게 경배하고 자기의 면류관을 보좌 앞에 던지며 가로되"],[11,"우리 주 하나님이여 영광과 존귀와 능력을 받으시는 것이 합당하오니 주께서 만물을 지으신지라 만물이 주의 뜻대로 있었고 또 지으심을 받았나이다' 하더라"]]},{"chapter":5,"title":"요한계시록 5","verses":[[1,"내가 보매 보좌에 앉으신 이의 오른손에 책이 있으니 안팎으로 썼고 일곱 인으로 봉하였더라"],[2,"또 보매 힘 있는 천사가 큰 음성으로 외치기를 `누가 책을 펴며 그 인을 떼기에 합당하냐' 하니"],[3,"하늘 위에나 땅 위에나 땅 아래에 능히 책을 펴거나 보거나 할 이가 없더라"],[4,"이 책을 펴거나 보거나 하기에 합당한 자가 보이지 않기로 내가 크게 울었더니"],[5,"장로 중에 하나가 내게 말하되 `울지 말라 유대 지파의 사자 다윗의 뿌리가 이기었으니 이 책과 그 일곱 인을 떼시리라' 하더라"],[6,"내가 또 보니 보좌와 네 생물과 장로들 사이에 어린 양이 섰는데 일찍 죽임을 당한것 같더라 일곱 뿔과 일곱 눈이 있으니 이 눈은 온 땅에 보내심을 입은 하나님의 일곱 영이더라"],[7,"어린 양이 나아와서 보좌에 앉으신 이의 오른손에서 책을 취하시니라"],[8,"책을 취하시매 네 생물과 이십 사 장로들이 어린 양 앞에 엎드려 각각 거문고와 향이 가득한 금 대접을 가졌으니 이 향은 성도의 기도들이라"],[9,"새 노래를 노래하여 가로되 `책을 가지시고 그 인봉을 떼기에 합당하시도다 일찍 죽임을 당하사 각 족속과 방언과 백성과 나라 가운데서 사람들을 피로 사서 하나님께 드리시고"],[10,"저희로 우리 하나님 앞에서 나라와 제사장을 삼으셨으니 저희가 땅에서 왕노릇하리로다' 하더라"],[11,"내가 또 보고 들으매 보좌와 생물들과 장로들을 둘러 선 많은 천사의 음성이 있으니 그 수가 만만이요 천천이라"],[12,"큰 음성으로 가로되 `죽임을 당하신 어린 양이 능력과 부와 지혜와 힘과 존귀와 영광과 찬송을 받으시기에 합당하도다' 하더라"],[13,"내가 또 들으니 하늘 위에와 땅 위에와 땅 아래와 바다 위에와 또 그 가운데 모든 만물이 가로되 `보좌에 앉으신 이와 어린 양에게 찬송과 존귀와 영광과 능력을 세세토록 돌릴찌어다' 하니"],[14,"네 생물이 가로되 `아멘' 하고 장로들은 엎드려 경배하더라"]]},{"chapter":6,"title":"요한계시록 6","verses":[[1,"내가 보매 어린 양이 일곱 인 중에 하나를 떼시는 그 때에 내가 들으니 네 생물 중에 하나가 우뢰소리 같이 말하되 `오라' 하기로"],[2,"내가 이에 보니 흰 말이 있는데 그 탄 자가 활을 가졌고 면류관을 받고 나가서 이기고 또 이기려고 하더라"],[3,"둘째 인을 떼실 때에 내가 들으니 둘째 생물이 말하되 `오라' 하더니"],[4,"이에 붉은 다른 말이 나오더라 그 탄 자가 허락을 받아 땅에서 화평을 제하여 버리며 서로 죽이게 하고 또 큰 칼을 받았더라"],[5,"세째 인을 떼실 때에 내가 들으니 세째 생물이 말하되 `오라' 하기로 내가 보니 검은 말이 나오는데 그 탄 자가 손에 저울을 가졌더라"],[6,"내가 네 생물 사이로서 나는듯하는 음성을 들으니 가로되 `한 데나리온에 밀 한되요 한 데나리온에 보리 석되로다 또 감람유와 포도주는 해치 말라' 하더라"],[7,"네째 인을 떼실 때에 내가 네째 생물의 음성을 들으니 가로되 `오라' 하기로"],[8,"내가 보매 청황색 말이 나오는데 그 탄 자의 이름은 사망이니 음부가 그 뒤를 따르더라 저희가 땅 사분 일의 권세를 얻어 검과 흉년과 사망과 땅의 짐승으로써 죽이더라"],[9,"다섯째 인을 떼실 때에 내가 보니 하나님의 말씀과 저희의 가진 증거를 인하여 죽임을 당한 영혼들이 제단 아래 있어"],[10,"큰 소리로 불러 가로되 `거룩하고 참되신 대주재여 땅에 거하는 자들을 심판하여 우리 피를 신원하여 주지 아니하시기를 어느 때까지 하시려나이까' 하니"],[11,"각각 저희에게 흰 두루마기를 주시며 가라사대 `아직 잠시 동안 쉬되 저희 동무 종들과 형제들도 자기처럼 죽임을 받아 그 수가 차기까지 하라' 하시더라"],[12,"내가 보니 여섯째 인을 떼실 때에 큰 지진이 나며 해가 총담 같이 검어지고 온 달이 피 같이 되며"],[13,"하늘의 별들이 무화과나무가 대풍에 흔들려 선 과실이 떨어지는것 같이 땅에 떨어지며"],[14,"하늘은 종이 축이 말리는것 같이 떠나가고 각 산과 섬이 제 자리에서 옮기우매"],[15,"땅의 임금들과 왕족들과 장군들과 부자들과 강한 자들과 각 종과 자주자가 굴과 산 바위틈에 숨어"],[16,"산과 바위에게 이르되 `우리 위에 떨어져 보좌에 앉으신 이의 낯에서와 어린 양의 진노에서 우리를 가리우라"],[17,"그들의 진노의 큰 날이 이르렀으니 누가 능히 서리요' 하더라"]]},{"chapter":7,"title":"요한계시록 7","verses":[[1,"이 일 후에 내가 네 천사가 땅 네 모퉁이에 선 것을 보니 땅의 사방의 바람을 붙잡아 바람으로 하여금 땅에나 바다에나 각종 나무에 불지 못하게 하더라"],[2,"또 보매 다른 천사가 살아계신 하나님의 인을 가지고 해 돋는 데로부터 올라와서 땅과 바다를 해롭게 할 권세를 얻은 네 천사를 향하여 큰 소리로 외쳐"],[3,"가로되 `우리가 우리 하나님의 종들의 이마에 인치기까지 땅이나 바다나 나무나 해하지 말라' 하더라"],[4,"내가 인맞은 자의 수를 들으니 이스라엘 자손의 각 지파 중에서 인맞은 자들이 십 사만 사천이니"],[5,"유다 지파 중에 인맞은 자가 일만 이천이요 르우벤 지파 중에 일만 이천이요 갓 지파 중에 일만 이천이요"],[6,"아셀 지파 중에 일만 이천이요 납달리 지파 중에 일만 이천이요 므낫세 지파 중에 일만 이천이요"],[7,"시므온 지파 중에 일만 이천이요 레위 지파 중에 일만 이천이요 잇사갈 지파 중에 일만 이천이요"],[8,"스불론 지파 중에 일만 이천이요 요셉 지파 중에 일만 이천이요 베냐민 지파 중에 인맞은 자가 일만 이천이라"],[9,"이 일 후에 내가 보니 각 나라와 족속과 백성과 방언에서 아무라도 능히 셀 수 없는 큰 무리가 흰 옷을 입고 손에 종려 가지를 들고 보좌 앞과 어린 양 앞에 서서"],[10,"큰 소리로 외쳐 가로되 `구원하심이 보좌에 앉으신 우리 하나님과 어린 양에게 있도다' 하니"],[11,"모든 천사가 보좌와 장로들과 네 생물의 주위에 섰다가 보좌 앞에 엎드려 얼굴을 대고 하나님께 경배하여"],[12,"가로되 `아멘 찬송과 영광과 지혜와 감사와 존귀와 능력과 힘이 우리 하나님께 세세토록 있을찌로다 아멘' 하더라"],[13,"장로 중에 하나가 응답하여 내게 이르되 `이 흰옷 입은 자들이 누구며 또 어디서 왔느뇨"],[14,"내가 가로되 `내 주여 당신이 알리이다' 하니 그가 나더러 이르되 `이는 큰 환난에서 나오는 자들인데 어린양의 피에 그 옷을 씻어 희게 하였느니라"],[15,"그러므로 그들이 하나님의 보좌 앞에 있고 또 그의 성전에서 밤낮 하나님을 섬기매 보좌에 앉으신 이가 그들 위에 장막을 치시리니"],[16,"저희가 다시 주리지도 아니하며 목마르지도 아니하고 해나 아무 뜨거운 기운에 상하지 아니할찌니"],[17,"이는 보좌 가운데 계신 어린 양이 저희의 목자가 되사 생명수 샘으로 인도하시고 하나님께서 저희 눈에서 모든 눈물을 씻어 주실 것임이러라"]]},{"chapter":8,"title":"요한계시록 8","verses":[[1,"일곱째 인을 떼실 때에 하늘이 반시 동안쯤 고요하더니"],[2,"내가 보매 하나님 앞에 시위한 일곱 천사가 있어 일곱 나팔을 받았더라"],[3,"또 다른 천사가 와서 제단 곁에 서서 금 향로를 가지고 많은 향을 받았으니 이는 모든 성도의 기도들과 합하여 보좌 앞 금단에 드리고자 함이라"],[4,"향연이 성도의 기도와 함께 천사의 손으로부터 하나님 앞으로 올라가는지라"],[5,"천사가 향로를 가지고 단 위의 불을 담아다가 땅에 쏟으매 뇌성과 음성과 번개와 지진이 나더라"],[6,"일곱 나팔 가진 일곱 천사가 나팔 불기를 예비하더라"],[7,"첫째 천사가 나팔을 부니 피 섞인 우박과 불이 나서 땅에 쏟아지매 땅의 삼분의 일이 타서 사위고 수목의 삼분의 일도 타서 사위고 각종 푸른 풀도 타서 사위더라"],[8,"둘째 천사가 나팔을 부니 불붙는 큰 산과 같은 것이 바다에 던지우매 바다의 삼분의 일이 피가 되고"],[9,"바다 가운데 생명 가진 피조물들의 삼분의 일이 죽고 배들의 삼분의 일이 깨어지더라"],[10,"세째 천사가 나팔을 부니 횃불 같이 타는 큰 별이 하늘에서 떨어져 강들의 삼분의 일과 여러 물샘에 떨어지니"],[11,"이 별 이름은 쑥이라 물들의 삼분의 일이 쑥이 되매 그 물들이 쓰게 됨을 인하여 많은 사람이 죽더라"],[12,"네째 천사가 나팔을 부니 해 삼분의 일과 달 삼분의 일과 별들의 삼분의 일이 침을 받아 그 삼분의 일이 어두워지니 낮 삼분의 일은 비췸이 없고 밤도 그러하더라"],[13,"내가 또 보고 들으니 공중에 날아가는 독수리가 큰 소리로 이르되 `땅에 거하는 자들에게 화, 화, 화가 있으리로다 이 외에도 세 천사의 불 나팔소리를 인함이로다' 하더라"]]},{"chapter":9,"title":"요한계시록 9","verses":[[1,"다섯째 천사가 나팔을 불매 내가 보니 하늘에서 땅에 떨어진 별 하나가 있는데 저가 무저갱의 열쇠를 받았더라"],[2,"저가 무저갱을 여니 그 구멍에서 큰 풀무의 연기 같은 연기가 올라오매 해와 공기가 그 구멍의 연기로 인하여 어두워지며"],[3,"또 황충이 연기 가운데로부터 땅 위에 나오매 저희가 땅에 있는 전갈의 권세와 같은 권세를 받았더라"],[4,"저희에게 이르시되 `땅의 풀이나 푸른 것이나 각종 수목은 해하지 말고 오직 이마에 하나님의 인 맞지 아니한 사람들만 해하라' 하시더라"],[5,"그러나 그들을 죽이지는 못하게 하시고 다섯달 동안 괴롭게만 하게 하시는데 그 괴롭게 함은 전갈이 사람을 쏠 때에 괴롭게 함과 같더라"],[6,"그날에는 사람들이 죽기를 구하여도 얻지 못하고 죽고 싶으나 죽음이 저희를 피하리로다"],[7,"황충들의 모양은 전쟁을 위하여 예비한 말들 같고 그 머리에 금 같은 면류관 비슷한 것을 썼으며 그 얼굴은 사람의 얼굴 같고"],[8,"또 여자의 머리털 같은 머리털이 있고 그 이는 사자의 이 같으며"],[9,"또 철흉갑 같은 흉갑이 있고 그 날개들의 소리는 병거와 많은 말들이 전장으로 달려 들어가는 소리 같으며"],[10,"또 전갈과 같은 꼬리와 쏘는 살이 있어 그 꼬리에는 다섯달 동안 사람들을 해하는 권세가 있더라"],[11,"저희에게 임금이 있으니 무저갱의 사자라 히브리 음으로 이름은 아바돈이요 헬라 음으로 이름은 아볼루온이더라"],[12,"첫째 화는 지나갔으나 보라 아직도 이 후에 화 둘이 이르리로다"],[13,"여섯째 천사가 나팔을 불매 내가 들으니 하나님 앞 금단 네 뿔에서 한 음성이 나서"],[14,"나팔 가진 여섯째 천사에게 말하기를 `큰 강 유브라데에 결박한 네 천사를 놓아 주라' 하매"],[15,"네 천사가 놓였으니 그들은 그 년, 월, 일, 시에 이르러 사람 삼분의 일을 죽이기로 예비한 자들이더라"],[16,"마병대의 수는 이만만이니 내가 그들의 수를 들었노라"],[17,"이같이 이상한 가운데 그 말들과 그 탄 자들을 보니 불빛과 자주빛과 유황빛 흉갑이 있고 또 말들의 머리는 사자 머리 같고 그 입에서는 불과 연기와 유황이 나오더라"],[18,"이 세 재앙 곧 저희 입에서 나오는 불과 연기와 유황을 인하여 사람 삼분의 일이 죽임을 당하니라"],[19,"이 말들의 힘은 그 입과 그 꼬리에 있으니 그 꼬리는 뱀 같고 또 꼬리에 머리가 있어 이것으로 해하더라"],[20,"이 재앙에 죽지 않고 남은 사람들은 그 손으로 행하는 일을 회개치 아니하고 오히려 여러 귀신과 또는 보거나 듣거나 다니거나 하지 못하는 금, 은, 동과 목석의 우상에게 절하고"],[21,"또 그 살인과 복술과 음행과 도적질을 회개치 아니하더라"]]},{"chapter":10,"title":"요한계시록 10","verses":[[1,"내가 또 보니 힘센 다른 천사가 구름을 입고 하늘에서 내려 오는데 그 머리 위에 무지개가 있고 그 얼굴은 해 같고 그 발은 불기둥 같으며"],[2,"그 손에 펴 놓인 작은 책을 들고 그 오른발은 바다를 밟고 왼발은 땅을 밟고"],[3,"사자의 부르짖는것 같이 큰 소리로 외치니 외칠 때에 일곱 우뢰가 그 소리를 발하더라"],[4,"일곱 우뢰가 발할 때에 내가 기록하려고 하다가 곧 들으니 하늘에서 소리나서 말하기를 `일곱 우뢰가 발한 것을 인봉하고 기록하지 말라' 하더라"],[5,"내가 본바 바다와 땅을 밟고 섰는 천사가 하늘을 향하여 오른손을 들고"],[6,"세세토록 살아계신 자 곧 하늘과 그 가운데 있는 물건이며 땅과 그 가운데 있는 물건이며 바다와 그 가운데 있는 물건을 창조하신 이를 가리켜 맹세하여 가로되 지체하지 아니하리니"],[7,"일곱째 천사가 소리 내는 날 그 나팔을 불게 될 때에 하나님의 비밀이 그 종 선지자들에게 전하신 복음과 같이 이루리라"],[8,"하늘에서 나서 내게 들리던 음성이 또 내게 말하여 가로되 `네가 가서 바다와 땅을 밟고 섰는 천사의 손에 펴 놓인 책을 가지라' 하기로"],[9,"내가 천사에게 나아가 작은 책을 달라 한즉 천사가 가로되 `갖다 먹어버리라 네 배에는 쓰나 네 입에는 꿀 같이 달리라' 하거늘"],[10,"내가 천사의 손에서 작은 책을 갖다 먹어버리니 내 입에는 꿀 같이 다나 먹은 후에 내 배에서는 쓰게 되더라"],[11,"저가 내게 말하기를 `네가 많은 백성과 나라와 방언과 임금에게 다시 예언하여야 하리라' 하더라"]]},{"chapter":11,"title":"요한계시록 11","verses":[[1,"또 내게 지팡이 같은 갈대를 주며 말하기를 일어나서 하나님의 성전과 제단과 그 안에서 경배하는 자들을 척량하되"],[2,"성전 밖 마당은 척량하지 말고 그냥 두라 이것을 이방인에게 주었은즉 저희가 거룩한 성을 마흔 두달 동안 짓밟으리라"],[3,"내가 나의 두 증인에게 권세를 주리니 저희가 굵은 베옷을 입고 일천 이백 육십 일을 예언하리라"],[4,"이는 이 땅의 주 앞에 섰는 두 감람나무와 두 촛대니"],[5,"만일 누구든지 저희를 해하고자 한즉 저희 입에서 불이 나서 그 원수를 소멸할찌니 누구든지 해하려 하면 반드시 이와 같이 죽임을 당하리라"],[6,"저희가 권세를 가지고 하늘을 닫아 그 예언을 하는 날 동안 비 오지 못하게 하고 또 권세를 가지고 물을 변하여 피 되게 하고 아무 때든지 원하는 대로 여러가지 재앙으로 땅을 치리로다"],[7,"저희가 그 증거를 마칠 때에 무저갱으로부터 올라오는 짐승이 저희로 더불어 전쟁을 일으켜 저희를 이기고 저희를 죽일터인즉"],[8,"저희 시체가 큰 성길에 있으리니 그 성은 영적으로 하면 소돔이라고도 하고 애굽이라고도 하니 곧 저희 주께서 십자가에 못 박히신 곳이니라"],[9,"백성들과 족속과 방언과 나라 중에서 사람들이 그 시체를 사흘 반 동안을 목도하며 무덤에 장사하지 못하게 하리로다"],[10,"이 두 선지자가 땅에 거하는 자들을 괴롭게 한고로 땅에 거하는 자들이 저희의 죽음을 즐거워하고 기뻐하여 서로 예물을 보내리라 하더라"],[11,"삼일 반 후에 하나님께로부터 생기가 저희 속에 들어가매 저희가 발로 일어서니 구경하는 자들이 크게 두려워하더라"],[12,"하늘로부터 큰 음성이 있어 이리로 올라오라 함을 저희가 듣고 구름을 타고 하늘로 올라가니 저희 원수들도 구경하더라"],[13,"그 시에 큰 지진이 나서 성 십분의 일이 무너지고 지진에 죽은 사람이 칠천이라 그 남은 자들이 두려워하여 영광을 하늘의 하나님께 돌리더라"],[14,"둘째 화는 지나갔으나 보라 세째 화가 속히 이르는도다"],[15,"일곱째 천사가 나팔을 불매 하늘에 큰 음성들이 나서 가로되 `세상 나라가 우리 주와 그 그리스도의 나라가 되어 그가 세세토록 왕노릇 하시리로다' 하니"],[16,"하나님 앞에 자기 보좌에 앉은 이십 사 장로들이 엎드려 얼굴을 대고 하나님께 경배하여"],[17,"가로되 `감사하옵나니 옛적에도 계셨고 시방도 계신 주 하나님 곧 전능하신이여 친히 큰 권능을 잡으시고 왕노릇 하시도다"],[18,"이방들이 분노하매 주의 진노가 임하여 죽은 자를 심판하시며 종 선지자들과 성도들과 또 무론대소하고 주의 이름을 경외하는 자들에게 상 주시며 또 땅을 망하게 하는 자들을 멸망시키실 때로소이다' 하더라"],[19,"이에 하늘에 있는 하나님의 성전이 열리니 성전 안에 하나님의 언약궤가 보이며 또 번개와 음성들과 뇌성과 지진과 큰 우박이 있더라"]]},{"chapter":12,"title":"요한계시록 12","verses":[[1,"하늘에 큰 이적이 보이니 해를 입은 한 여자가 있는데 그 발 아래는 달이 있고 그 머리에는 열 두 별의 면류관을 썼더라"],[2,"이 여자가 아이를 배어 해산하게 되매 아파서 애써 부르짖더라"],[3,"하늘에 또 다른 이적이 보이니 보라, 한 큰 붉은 용이 있어 머리가 일곱이요 뿔이 열이라 그 여러 머리에 일곱 면류관이 있는데"],[4,"그 꼬리가 하늘 별 삼분의 일을 끌어다가 땅에 던지더라 용이 해산하려는 여자 앞에서 그가 해산하면 그 아이를 삼키고자 하더니"],[5,"여자가 아들을 낳으니 이는 장차 철장으로 만국을 다스릴 남자라 그 아이를 하나님 앞과 그 보좌 앞으로 올려가더라"],[6,"그 여자가 광야로 도망하매 거기서 일천 이백 육십일 동안 저를 양육하기 위하여 하나님의 예비하신 곳이 있더라"],[7,"하늘에 전쟁이 있으니 미가엘과 그의 사자들이 용으로 더불어 싸울쌔 용과 그의 사자들도 싸우나"],[8,"이기지 못하여 다시 하늘에서 저희의 있을 곳을 얻지 못한지라"],[9,"큰 용이 내어 쫓기니 옛 뱀 곧 마귀라고도 하고 사단이라고도 하는 온 천하를 꾀는 자라 땅으로 내어 쫓기니 그의 사자들도 저와 함께 내어 쫓기니라"],[10,"내가 또 들으니 하늘에 큰 음성이 있어 가로되 `이제 우리 하나님의 구원과 능력과 나라와 또 그의 그리스도의 권세가 이루었으니 우리 형제들을 참소하던 자 곧 우리 하나님 앞에서 밤낮 참소하던 자가 쫓겨 났고"],[11,"또 여러 형제가 어린 양의 피와 자기의 증거하는 말을 인하여 저를 이기었으니 그들은 죽기까지 자기 생명을 아끼지 아니하였도다"],[12,"그러므로 하늘과 그 가운데 거하는 자들은 즐거워하라 그러나 땅과 바다는 화 있을찐저 이는 마귀가 자기의 때가 얼마 못된 줄을 알므로 크게 분내어 너희에게 내려 갔음이라' 하더라"],[13,"용이 자기가 땅으로 내어쫓긴 것을 보고 남자를 낳은 여자를 핍박하는지라"],[14,"그 여자가 큰 독수리의 두 날개를 받아 광야 자기 곳으로 날아가 거기서 그 뱀의 낯을 피하여 한 때와 두 때와 반 때를 양육 받으매"],[15,"여자의 뒤에서 뱀이 그 입으로 물을 강 같이 토하여 여자를 물에 떠내려 가게 하려 하되"],[16,"땅이 여자를 도와 그 입을 벌려 용의 입에서 토한 강물을 삼키니"],[17,"용이 여자에게 분노하여 돌아가서 그 여자의 남은 자손 곧 하나님의 계명을 지키며 예수의 증거를 가진 자들로 더불어 싸우려고 바다 모래 위에 섰더라"]]},{"chapter":13,"title":"요한계시록 13","verses":[[1,"내가 보니 바다에서 한 짐승이 나오는데 뿔이 열이요 머리가 일곱이라 그 뿔에는 열 면류관이 있고 그 머리들에는 참람된 이름들이 있더라"],[2,"내가 본 짐승은 표범과 비슷하고 그 발은 곰의 발 같고 그 입은 사자의 입 같은데 용이 자기의 능력과 보좌와 큰 권세를 그에게 주었더라"],[3,"그의 머리 하나가 상하여 죽게 된 것 같더니 그 죽게 되었던 상처가 나으매 온 땅이 이상히 여겨 짐승을 따르고"],[4,"용이 짐승에게 권세를 주므로 용에게 경배하며 짐승에게 경배하여 가로되 `누가 이 짐승과 같으뇨 누가 능히 이로 더불어 싸우리요' 하더라"],[5,"또 짐승이 큰 말과 참람된 말 하는 입을 받고 또 마흔 두달 일할 권세를 받으니라"],[6,"짐승이 입을 벌려 하나님을 향하여 훼방하되 그의 이름과 그의 장막 곧 하늘에 거하는 자들을 훼방하더라"],[7,"또 권세를 받아 성도들과 싸워 이기게 되고 각 족속과 백성과 방언과 나라를 다스리는 권세를 받으니"],[8,"죽임을 당한 어린 양의 생명책에 창세 이후로 녹명되지 못하고 이 땅에 사는 자들은 다 짐승에게 경배하리라"],[9,"누구든지 귀가 있거든 들을찌어다"],[10,"사로잡는 자는 사로잡힐 것이요 칼로 죽이는 자는 자기도 마땅히 칼에 죽으리니 성도들의 인내와 믿음이 여기 있느니라"],[11,"내가 보매 또 다른 짐승이 땅에서 올라오니 새끼양 같이 두 뿔이 있고 용처럼 말하더라"],[12,"저가 먼저 나온 짐승의 모든 권세를 그 앞에서 행하고 땅과 땅에 거하는 자들로 처음 짐승에게 경배하게 하니 곧 죽게 되었던 상처가 나은 자니라"],[13,"큰 이적을 행하되 심지어 사람들 앞에서 불이 하늘로부터 땅에 내려 오게 하고"],[14,"짐승 앞에서 받은바 이적을 행함으로 땅에 거하는 자들을 미혹하며 땅에 거하는 자들에게 이르기를 `칼에 상하였다가 살아난 짐승을 위하여 우상을 만들라' 하더라"],[15,"저가 권세를 받아 그 짐승의 우상에게 생기를 주어 그 짐승의 우상으로 말하게 하고 또 짐승의 우상에게 경배하지 아니하는 자는 몇이든지 다 죽이게 하더라"],[16,"저가 모든 자 곧 작은 자나 큰 자나 부자나 빈궁한 자나 자유한 자나 종들로 그 오른손에나 이마에 표를 받게 하고"],[17,"누구든지 이 표를 가진 자 외에는 매매를 못하게 하니 이 표는 곧 짐승의 이름이나 그 이름의 수라"],[18,"지혜가 여기 있으니 총명 있는 자는 그 짐승의 수를 세어 보라 그 수는 사람의 수니 육백 육십 륙이니라"]]},{"chapter":14,"title":"요한계시록 14","verses":[[1,"또 내가 보니 보라 어린 양이 시온산에 섰고 그와 함께 십 사만 사천이 섰는데 그 이마에 어린 양의 이름과 그 아버지의 이름을 쓴 것이 있도다"],[2,"내가 하늘에서 나는 소리를 들으니 많은 물소리도 같고 큰 뇌성도 같은데 내게 들리는 소리는 거문고 타는 자들의 그 거문고 타는 것 같더라"],[3,"저희가 보좌와 네 생물과 장로들 앞에서 새 노래를 부르니 땅에서 구속함을 얻은 십 사만 사천인 밖에는 능히 이 노래를 배울 자가 없더라"],[4,"이 사람들은 여자로 더불어 더럽히지 아니하고 정절이 있는 자라 어린 양이 어디로 인도하든지 따라가는 자며 사람 가운데서 구속을 받아 처음 익은 열매로 하나님과 어린 양에게 속한 자들이니"],[5,"그 입에 거짓말이 없고 흠이 없는 자들이더라"],[6,"또 보니 다른 천사가 공중에 날아가는데 땅에 거하는 자들 곧 여러 나라와 족속과 방언과 백성에게 전할 영원한 복음을 가졌더라"],[7,"그가 큰 음성으로 가로되 `하나님을 두려워하며 그에게 영광을 돌리라 이는 그의 심판하실 시간이 이르렀음이니 하늘과 땅과 바다와 물들의 근원을 만드신 이를 경배하라' 하더라"],[8,"또 다른 천사 곧 둘째가 그 뒤를 따라 말하되 `무너졌도다 무너졌도다 큰 성 바벨론이여 모든 나라를 그 음행으로 인하여 진노의 포도주로 먹이던 자로다' 하더라"],[9,"또 다른 천사 곧 세째가 그 뒤를 따라 큰 음성으로 가로되 `만일 누구든지 짐승과 그의 우상에게 경배하고 이마에나 손에 표를 받으면"],[10,"그도 하나님의 진노의 포도주를 마시리니 그 진노의 잔에 섞인 것이 없이 부은 포도주라 거룩한 천사들 앞과 어린 양 앞에서 불과 유황으로 고난을 받으리니"],[11,"그 고난의 연기가 세세토록 올라가리로다 짐승과 그의 우상에게 경배하고 그 이름의 표를 받는 자는 누구든지 밤낮 쉼을 얻지 못하리라' 하더라"],[12,"성도들의 인내가 여기 있나니 저희는 하나님의 계명과 예수 믿음을 지키는 자니라"],[13,"또 내가 들으니 하늘에서 음성이 나서 가로되 `기록하라 자금 이후로 주 안에서 죽는 자들은 복이 있도다' 하시매 성령이 가라사대 `그러하다 저희 수고를 그치고 쉬리니 이는 저희의 행한 일이 따름이라' 하시더라"],[14,"또 내가 보니 흰구름이 있고 구름 위에 사람의 아들과 같은 이가 앉았는데 그 머리에는 금 면류관이 있고 그 손에는 이한 낫을 가졌더라"],[15,"또 다른 천사가 성전으로부터 나와 구름 위에 앉은이를 향하여 큰 음성으로 외쳐 가로되 `네 낫을 휘둘러 거두라 거둘 때가 이르러 땅에 곡식이 다 익었음이로다' 하니"],[16,"구름 위에 앉으신 이가 낫을 땅에 휘두르매 곡식이 거두어지니라"],[17,"또 다른 천사가 하늘에 있는 성전에서 나오는데 또한 이한 낫을 가졌더라"],[18,"또 불을 다스리는 다른 천사가 제단으로부터 나와 이한 낫 가진 자를 향하여 큰 음성으로 불러 가로되 `네 이한 낫을 휘둘러 땅의 포도송이를 거두라 그 포도가 익었느니라' 하더라"],[19,"천사가 낫을 땅에 휘둘러 땅의 포도를 거두어 하나님의 진노의 큰 포도주 틀에 던지매"],[20,"성 밖에서 그 틀이 밟히니 틀에서 피가 나서 말굴레까지 닿았고 일천 육백 스다디온에 퍼졌더라"]]},{"chapter":15,"title":"요한계시록 15","verses":[[1,"또 하늘에 크고 이상한 다른 이적을 보매 일곱 천사가 일곱 재앙을 가졌으니 곧 마지막 재앙이라 하나님의 진노가 이것으로 마치리로다"],[2,"또 내가 보니 불이 섞인 유리 바다 같은 것이 있고 짐승과 그의 우상과 그의 이름의 수를 이기고 벗어난 자들이 유리바다 가에 서서 하나님의 거문고를 가지고"],[3,"하나님의 종 모세의 노래, 어린 양의 노래를 불러 가로되 `주 하나님 곧 전능하신이시여 하시는 일이 크고 기이하시도다 만국의 왕이시여 주의 길이 의롭고 참되시도다"],[4,"주여 누가 주의 이름을 두려워하지 아니하며 영화롭게 하지 아니하오리이까 오직 주만 거룩하시니이다 주의 의로우신 일이 나타났으매 만국이 와서 주께 경배하리이다' 하더라"],[5,"또 이 일 후에 내가 보니 하늘에 증거 장막의 성전이 열리며"],[6,"일곱 재앙을 가진 일곱 천사가 성전으로부터 나와 맑고 빛난 세마포 옷을 입고 가슴에 금띠를 띠고"],[7,"네 생물 중에 하나가 세세에 계신 하나님의 진노를 가득히 담은 금대접 일곱을 그 일곱 천사에게 주니"],[8,"하나님의 영광과 능력을 인하여 성전에 연기가 차게 되매 일곱 천사의 일곱 재앙이 마치기까지는 성전에 능히 들어갈 자가 없더라"]]},{"chapter":16,"title":"요한계시록 16","verses":[[1,"또 내가 들으니 성전에서 큰 음성이 나서 일곱 천사에게 말하되 `너희는 가서 하나님의 진노의 일곱 대접을 땅에 쏟으라' 하더라"],[2,"첫째가 가서 그 대접을 땅에 쏟으매 악하고 독한 헌데가 짐승의 표를 받은 사람들과 그 우상에게 경배하는 자들에게 나더라"],[3,"둘째가 그 대접을 바다에 쏟으매 바다가 곧 죽은 자의 피 같이 되니 바다 가운데 모든 생물이 죽더라"],[4,"세째가 그 대접을 강과 물 근원에 쏟으매 피가 되더라"],[5,"내가 들으니 물을 차지한 천사가 가로되 `전에도 계셨고 시방도 계신 거룩하신 이여 이렇게 심판하시니 의로우시도다"],[6,"저희가 성도들과 선지자들의 피를 흘렸으므로 저희로 피를 마시게 하신 것이 합당하니이다' 하더라"],[7,"또 내가 들으니 제단이 말하기를 `그러하다 주 하나님 곧 전능하신 이시여 심판하시는 것이 참되시고 의로우시도다' 하더라"],[8,"네째가 그 대접을 해에 쏟으매 해가 권세를 받아 불로 사람들을 태우니"],[9,"사람들이 크게 태움에 태워진지라 이 재앙들을 행하는 권세를 가지신 하나님의 이름을 훼방하며 또 회개하여 영광을 주께 돌리지 아니하더라"],[10,"또 다섯째가 그 대접을 짐승의 보좌에 쏟으니 그 나라가 곧 어두워지며 사람들이 아파서 자기 혀를 깨물고"],[11,"아픈 것과 종기로 인하여 하늘의 하나님을 훼방하고 저희 행위를 회개치 아니하더라"],[12,"또 여섯째가 그 대접을 큰 강 유브라데에 쏟으매 강물이 말라서 동방에서 오는 왕들의 길이 예비되더라"],[13,"또 내가 보매 개구리 같은 세 더러운 영이 용의 입과 짐승의 입과 거짓 선지자의 입에서 나오니"],[14,"저희는 귀신의 영이라 이적을 행하여 온 천하 임금들에게 가서 하나님 곧 전능하신이의 큰 날에 전쟁을 위하여 그들을 모으더라"],[15,"보라, 내가 도적 같이 오리니 누구든지 깨어 자기 옷을 지켜 벌거벗고 다니지 아니하며 자기의 부끄러움을 보이지 아니하는 자가 복이 있도다"],[16,"세 영이 히브리 음으로 아마겟돈이라 하는 곳으로 왕들을 모으더라"],[17,"일곱째가 그 대접을 공기 가운데 쏟으매 큰 음성이 성전에서 보좌로부터 나서 가로되 `되었다' 하니"],[18,"번개와 음성들과 뇌성이 있고 또 큰 지진이 있어 어찌 큰지 사람이 땅에 있어 옴으로 이같이 큰 지진이 없었더라"],[19,"큰 성이 세 갈래로 갈라지고 만국의 성들도 무너지니 큰 성 바벨론이 하나님 앞에 기억하신바 되어 그의 맹렬한 진노의 포도주 잔을 받으매"],[20,"각 섬도 없어지고 산악도 간데 없더라"],[21,"또 중수가 한 달란트나 되는 큰 우박이 하늘로부터 사람들에게 내리매 사람들이 그 박재로 인하여 하나님을 훼방하니 그 재앙이 심히 큼이러라"]]},{"chapter":17,"title":"요한계시록 17","verses":[[1,"또 일곱 대접을 가진 일곱 천사 중 하나가 와서 내게 말하여 가로되 이리 오라 많은 물위에 앉은 큰 음녀의 받을 심판을 네게 보이리라"],[2,"땅의 임금들도 그로 더불어 음행하였고 땅에 거하는 자들도 그 음행의 포도주에 취하였다 하고"],[3,"곧 성령으로 나를 데리고 광야로 가니라 내가 보니 여자가 붉은 빛 짐승을 탔는데 그 짐승의 몸에 참람된 이름들이 가득하고 일곱 머리와 열 뿔이 있으며"],[4,"그 여자는 자주 빛과 붉은 빛 옷을 입고 금과 보석과 진주로 꾸미고 손에 금잔을 가졌는데 가증한 물건과 그의 음행의 더러운 것들이 가득하더라"],[5,"그 이마에 이름이 기록되었으니 비밀이라, 큰 바벨론이라, 땅의 음녀들과 가증한 것들의 어미라 하였더라"],[6,"또 내가 보매 이 여자가 성도들의 피와 예수의 증인들의 피에 취한지라 내가 그 여자를 보고 기이히 여기고 크게 기이히 여기니"],[7,"천사가 가로되 `왜 기이히 여기느냐 내가 여자와 그의 탄바 일곱 머리와 열 뿔 가진 짐승의 비밀을 네게 이르리라"],[8,"네가 본 짐승은 전에 있었다가 시방 없으나 장차 무저갱으로부터 올라와 멸망으로 들어갈 자니 땅에 거하는 자들로서 창세 이후로 생명책에 녹명되지 못한 자들이 이전에 있었다가 시방 없으나 장차 나올 짐승을 보고 기이히 여기리라"],[9,"지혜 있는 뜻이 여기 있으니 그 일곱 머리는 여자가 앉은 일곱 산이요"],[10,"또 일곱 왕이라 다섯은 망하였고 하나는 있고 다른이는 아직 이르지 아니하였으나 이르면 반드시 잠간 동안 계속하리라"],[11,"전에 있었다가 시방 없어진 짐승은 여덟째 왕이니 일곱 중에 속한 자라 저가 멸망으로 들어가리라"],[12,"네가 보던 열 뿔은 열 왕이니 아직 나라를 얻지 못하였으나 다만 짐승으로 더불어 임금처럼 권세를 일시 동안 받으리라"],[13,"저희가 한 뜻을 가지고 자기의 능력과 권세를 짐승에게 주더라"],[14,"저희가 어린 양으로 더불어 싸우려니와 어린 양은 만주의 주시요 만왕의 왕이시므로 저희를 이기실터이요 또 그와 함께 있는 자들 곧 부르심을 입고 빼내심을 얻고 진실한 자들은 이기리로다"],[15,"또 천사가 내게 말하되 네가 본바 음녀의 앉은 물은 백성과 무리와 열국과 방언들이니라"],[16,"네가 본바 이 열 뿔과 짐승이 음녀를 미워하여 망하게 하고 벌거벗게 하고 그 살을 먹고 불로 아주 사르리라"],[17,"하나님이 자기 뜻대로 할 마음을 저희에게 주사 한 뜻을 이루게 하시고 저희 나라를 그 짐승에게 주게 하시되 하나님 말씀이 응하기까지 하심이니라"],[18,"또 네가 본바 여자는 땅의 임금들을 다스리는 큰 성이라 하더라"]]},{"chapter":18,"title":"요한계시록 18","verses":[[1,"이 일 후에 다른 천사가 하늘에서 내려오는 것을 보니 큰 권세를 가졌는데 그의 영광으로 땅이 환하여지더라"],[2,"힘센 음성으로 외쳐 가로되 `무너졌도다 무너졌도다 큰 성 바벨론이여 귀신의 처소와 각종 더러운 영의 모이는 곳과 각종 더럽고 가증한 새의 모이는 곳이 되었도다"],[3,"그 음행의 진노의 포도주를 인하여 만국이 무너졌으며 또 땅의 왕들이 그로 더불어 음행하였으며 땅의 상고들도 그 사치의 세력을 인하여 치부하였도다' 하더라"],[4,"또 내가 들으니 하늘로서 다른 음성이 나서 가로되 `내 백성아, 거기서 나와 그의 죄에 참예하지 말고 그의 받을 재앙들을 받지 말라"],[5,"그 죄
