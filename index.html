<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>13 Pages</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕊️</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold: #b8860b;
  --gold-light: #e8c84a;
  --gold-dim: #8a6508;
  --parchment: #faf6ee;
  --parchment-dark: #f0e8d4;
  --ink: #1a1208;
  --ink-mid: #3d2e10;
  --ink-light: #7a6040;
  --rule: #c9b47a;
  --revealed-bg: #fff8e1;
  --revealed-border: #b8860b;
  --revealed-text: #5a3e00;
  --hidden-bg: #2a1e08;
  --panel-bg: #f5edd8;
  --btn-bg: transparent;
  --btn-text: var(--gold);
  --btn-border: var(--gold);
  --select-bg: #fff;
  --select-text: #1a1208;
  --chapter-btn-bg: transparent;
  --chapter-btn-active: var(--gold);
  --chapter-btn-active-text: #fff;
  --heading-color: #1a1208;
  --arrow-bg: rgba(250,246,238,0.85);
  --arrow-hover: var(--gold);
  --bottom-bar-bg: var(--panel-bg);
  --bottom-bar-border: var(--rule);
}

[data-theme="dark"] {
  --parchment: #141008;
  --parchment-dark: #1c1610;
  --ink: #e8dcc4;
  --ink-mid: #c9b47a;
  --ink-light: #8a7a58;
  --rule: #3d3020;
  --revealed-bg: #2a2010;
  --revealed-border: #b8860b;
  --revealed-text: #e8c84a;
  --hidden-bg: #e8c84a;
  --panel-bg: #1c1610;
  --select-bg: #2a2010;
  --select-text: #e8dcc4;
  --chapter-btn-bg: #1c1610;
  --chapter-btn-active: var(--gold);
  --chapter-btn-active-text: #141008;
  --heading-color: #e8dcc4;
  --arrow-bg: rgba(20,16,8,0.85);
  --bottom-bar-bg: #1c1610;
  --bottom-bar-border: #3d3020;
}

html { scroll-behavior: smooth; }

body {
  background: var(--parchment);
  color: var(--ink);
  font-family: 'EB Garamond', Georgia, serif;
  font-size: 17px;
  line-height: 1.0;
  min-height: 100vh;
  transition: background 0.35s, color 0.35s;
  overflow-x: hidden;
}

::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--parchment); }
::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 4px; }

/* ── HEADER ── */
.top-bar {
  position: sticky;
  top: 0;
  z-index: 200;
  background: linear-gradient(to bottom, var(--panel-bg), var(--parchment));
  border-bottom: 1px solid var(--rule);
  transition: background 0.35s;
}

.top-bar-title {
  text-align: center;
  padding: 1rem 1rem 0.3rem;
}

.top-bar-title h1 {
  font-family: 'Cinzel', serif;
  font-size: clamp(1.1rem, 3vw, 1.6rem);
  font-weight: 700;
  letter-spacing: 0.1em;
  color: var(--gold);
}

.top-bar-title .subtitle {
  font-size: 0.8rem;
  color: var(--ink-light);
  font-style: italic;
}

.global-controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.6rem;
  flex-wrap: wrap;
  padding: 0.5rem 1rem 0.6rem;
}

.control-group {
  display: flex;
  align-items: center;
  gap: 0.3rem;
}

.control-label {
  font-family: 'Cinzel', serif;
  font-size: 0.62rem;
  letter-spacing: 0.06em;
  color: var(--ink-light);
  text-transform: uppercase;
}

select, .ctrl-btn {
  font-family: 'EB Garamond', serif;
  font-size: 0.8rem;
  padding: 3px 8px;
  border: 1px solid var(--btn-border);
  border-radius: 2px;
  background: var(--btn-bg);
  color: var(--btn-text);
  cursor: pointer;
  letter-spacing: 0.03em;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}

select {
  background: var(--select-bg);
  color: var(--select-text);
  padding-right: 18px;
  transition: background 0.35s, color 0.35s, border-color 0.35s;
}

.ctrl-btn:hover {
  background: var(--gold);
  color: #fff;
  border-color: var(--gold);
}

.theme-toggle {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.95rem;
  padding: 0;
  line-height: 1;
}

/* ── CHAPTER NAV (dropdown) ── */

/* ── READING AREA ── */
.reading-area {
  position: relative;
  overflow: hidden;
  width: 100%;
}

.swipe-track {
  display: flex;
  will-change: transform;
}
.swipe-track.animating {
  transition: transform 0.3s ease;
}

.chapter-panel {
  flex: 0 0 100%;
  width: 100%;
  max-width: 680px;
  margin: 0 auto;
  padding: 1.2rem 2rem 4rem;
  box-sizing: border-box;
}

/* Desktop: center the track */
@media (min-width: 701px) {
  .reading-area {
    max-width: 680px;
    margin: 0 auto;
  }
}
.side-arrow {
  position: fixed;
  top: 50%;
  transform: translateY(-50%);
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 1px solid var(--rule);
  background: var(--arrow-bg);
  color: var(--ink-light);
  font-size: 1.2rem;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 50;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.side-arrow:hover { border-color: var(--gold); color: var(--gold); background: var(--panel-bg); }
.side-arrow.left { left: max(12px, calc(50% - 380px)); }
.side-arrow.right { right: max(12px, calc(50% - 380px)); }
.side-arrow.disabled { opacity: 0.25; pointer-events: none; }

/* ── CHAPTER CONTENT ── */

.chapter-num-header {
  text-align: center;
  padding: 1rem 0 0.8rem;
}
.chapter-num-header .ch-label {
  font-family: 'Cinzel', serif;
  font-size: 0.75rem;
  letter-spacing: 0.15em;
  color: var(--gold);
  text-transform: uppercase;
}
.chapter-num-header .ch-num {
  font-family: 'Cinzel', serif;
  font-size: clamp(2.5rem, 6vw, 3.5rem);
  font-weight: 700;
  color: var(--heading-color);
  line-height: 1.1;
}

.chapter-toolbar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  padding: 0 0 1rem;
  flex-wrap: wrap;
}

.ch-score {
  font-size: 0.78rem;
  color: var(--ink-light);
  font-style: italic;
  white-space: nowrap;
}
.ch-score b { color: var(--ink-mid); font-style: normal; }

.randomise-btn {
  font-family: 'EB Garamond', serif;
  font-size: 0.78rem;
  padding: 3px 10px;
  border: 1px solid var(--btn-border);
  border-radius: 2px;
  background: var(--btn-bg);
  color: var(--btn-text);
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
  white-space: nowrap;
}
.randomise-btn:hover { background: var(--gold); color: #fff; }

/* Section heading */
.section-heading {
  font-family: 'EB Garamond', serif;
  font-size: 1.1rem;
  font-weight: 400;
  font-style: italic;
  color: var(--ink-light);
  margin: 1.5rem 0 0.4rem;
  line-height: 1.3;
}
.section-heading:first-of-type { margin-top: 0.5rem; }

/* Verse */
.verse {
  font-size: 1.1rem;
  line-height: 2;
  color: var(--ink);
  margin-bottom: 0.35rem;
  transition: color 0.35s;
}

.vnum {
  font-family: 'Cinzel', serif;
  font-size: 0.55rem;
  font-weight: 600;
  vertical-align: super;
  margin-right: 3px;
  color: var(--gold);
  letter-spacing: 0.02em;
  user-select: none;
}

/* Blanks */
.blank {
  display: inline;
  background: var(--hidden-bg);
  color: transparent;
  border-radius: 2px;
  cursor: pointer;
  padding: 1px 3px;
  transition: background 0.2s, color 0.2s, border-color 0.2s;
  user-select: none;
  border: 1px solid transparent;
  -webkit-tap-highlight-color: transparent;
  position: relative;
}
.blank:hover { opacity: 0.8; }
.blank.revealed {
  background: var(--revealed-bg);
  color: var(--revealed-text);
  border-color: var(--revealed-border);
}
.blank.not-hidden {
  background: transparent;
  color: var(--ink);
  border: none;
  cursor: default;
  padding: 0;
}
/* Word count badge */
.blank .wc-badge {
  position: absolute;
  top: -8px;
  right: -4px;
  font-family: 'Cinzel', serif;
  font-size: 0.5rem;
  font-weight: 700;
  background: var(--gold);
  color: #fff;
  min-width: 13px;
  height: 13px;
  line-height: 13px;
  text-align: center;
  border-radius: 7px;
  padding: 0 2px;
  pointer-events: none;
}
[data-theme="dark"] .blank .wc-badge {
  background: var(--gold-dim);
  color: #e8dcc4;
}
.blank.revealed .wc-badge,
.blank.not-hidden .wc-badge { display: none; }
body:not([data-wc="on"]) .wc-badge { display: none; }

/* Toggle button active state (Sealed Mode, Word Count) */
.ctrl-btn.toggle-active {
  background: var(--gold);
  color: #fff;
  border-color: var(--gold);
}

/* ── MOBILE BOTTOM BAR ── */
.bottom-bar {
  display: none;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 200;
  background: var(--bottom-bar-bg);
  border-top: 1px solid var(--bottom-bar-border);
  padding: 0.6rem 1rem;
  align-items: center;
  justify-content: space-between;
  transition: background 0.35s, border-color 0.35s, transform 0.3s ease;
}
.bottom-bar.bb-hidden {
  transform: translateY(100%);
}

.bottom-bar .bb-arrow {
  font-size: 1.4rem;
  color: var(--ink-light);
  cursor: pointer;
  padding: 0.3rem 0.6rem;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  border: none;
  background: none;
}
.bottom-bar .bb-arrow:hover { color: var(--gold); }
.bottom-bar .bb-arrow.disabled { opacity: 0.25; pointer-events: none; }

.bottom-bar .bb-title {
  font-family: 'Cinzel', serif;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--ink);
  letter-spacing: 0.04em;
}

/* ── SAVE INDICATOR ── */
.save-indicator {
  position: fixed;
  bottom: 16px;
  right: 16px;
  font-family: 'EB Garamond', serif;
  font-size: 0.78rem;
  color: var(--gold);
  background: var(--panel-bg);
  border: 1px solid var(--rule);
  padding: 4px 12px;
  border-radius: 2px;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
  z-index: 300;
}
.save-indicator.show { opacity: 1; }

/* ── RESPONSIVE ── */
@media (max-width: 700px) {
  .top-bar-title { padding: 0.7rem 0.6rem 0.15rem; }
  .top-bar-title h1 { font-size: 1rem; }
  .top-bar-title .subtitle { font-size: 0.7rem; }
  .global-controls { gap: 0.4rem; padding: 0.35rem 0.5rem 0.45rem; }
  .control-label { font-size: 0.55rem; }
  select, .ctrl-btn { font-size: 0.72rem; padding: 2px 6px; }
  .chapter-panel { padding: 1.2rem 1rem 5rem; }
  .side-arrow { display: none; }
  .bottom-bar { display: flex; }
  .verse { font-size: 1rem; line-height: 1.9; }
  .section-heading { font-size: 1.05rem; }
  .save-indicator { bottom: 60px; }
}

@media (min-width: 701px) {
  .bottom-bar { display: none !important; }
  .side-arrow { display: flex; }
}
</style>
</head>
<body>

<div class="top-bar">
  <div class="top-bar-title">
    <h1>13 Pages</h1>
    <p class="subtitle">Click blacked-out words to reveal</p>
  </div>
  <div class="global-controls">
    <div class="control-group">
      <span class="control-label">Version</span>
      <select id="translationSel">
        <option value="niv2011">NIV 2011</option>
        <option value="niv1984">NIV 1984</option>
        <option value="korean">Korean (개역한글)</option>
      </select>
    </div>
    <div class="control-group">
      <span class="control-label">Hide</span>
      <select id="globalPct"></select>
    </div>
    <div class="control-group">
      <span class="control-label">Chapter</span>
      <select id="chapterSel"></select>
    </div>
    <button class="ctrl-btn" id="wordCountToggle">Word Count</button>
    <button class="ctrl-btn" id="revealAll">Reveal All</button>
    <button class="ctrl-btn" id="hideAll">Hide All</button>
    <button class="ctrl-btn theme-toggle" id="themeToggle" title="Toggle light/dark mode">&#9789;</button>
    <button class="ctrl-btn" id="sealedToggle">Sealed Mode</button>
  </div>
</div>

<button class="side-arrow left" id="arrowLeft" aria-label="Previous chapter">&#8249;</button>
<button class="side-arrow right" id="arrowRight" aria-label="Next chapter">&#8250;</button>

<div class="reading-area" id="readingArea">
  <div class="swipe-track" id="swipeTrack"></div>
</div>

<div class="bottom-bar" id="bottomBar">
  <button class="bb-arrow" id="bbLeft" aria-label="Previous chapter">&#8249;</button>
  <span class="bb-title" id="bbTitle">Revelation 1</span>
  <button class="bb-arrow" id="bbRight" aria-label="Next chapter">&#8250;</button>
</div>

<div class="save-indicator" id="saveIndicator">&#10003; Saved</div>

<script>

const TRANSLATIONS = {
  niv2011: [{"chapter":1,"title":"Revelation 1","verses":[[1,"The revelation from Jesus Christ, which God gave him to show his servants what must soon take place. He made it known by sending his angel to his servant John,"],[2,"who testifies to everything he saw—that is, the word of God and the testimony of Jesus Christ."],[3,"Blessed is the one who reads aloud the words of this prophecy, and blessed are those who hear it and take to heart what is written in it, because the time is near."],[4,"John, To the seven churches in the province of Asia: Grace and peace to you from him who is, and who was, and who is to come, and from the seven spirits before his throne,"],[5,"and from Jesus Christ, who is the faithful witness, the firstborn from the dead, and the ruler of the kings of the earth. To him who loves us and has freed us from our sins by his blood,"],[6,"and has made us to be a kingdom and priests to serve his God and Father—to him be glory and power for ever and ever! Amen."],[7,"“Look, he is coming with the clouds,” and “every eye will see him, even those who pierced him”; and all peoples on earth “will mourn because of him.” So shall it be! Amen."],[8,"“I am the Alpha and the Omega,” says the Lord God, “who is, and who was, and who is to come, the Almighty.”"],[9,"I, John, your brother and companion in the suffering and kingdom and patient endurance that are ours in Jesus, was on the island of Patmos because of the word of God and the testimony of Jesus."],[10,"On the Lord’s Day I was in the Spirit, and I heard behind me a loud voice like a trumpet,"],[11,"which said: “Write on a scroll what you see and send it to the seven churches: to Ephesus, Smyrna, Pergamum, Thyatira, Sardis, Philadelphia and Laodicea.”"],[12,"I turned around to see the voice that was speaking to me. And when I turned I saw seven golden lampstands,"],[13,"and among the lampstands was someone like a son of man, dressed in a robe reaching down to his feet and with a golden sash around his chest."],[14,"The hair on his head was white like wool, as white as snow, and his eyes were like blazing fire."],[15,"His feet were like bronze glowing in a furnace, and his voice was like the sound of rushing waters."],[16,"In his right hand he held seven stars, and coming out of his mouth was a sharp, double-edged sword. His face was like the sun shining in all its brilliance."],[17,"When I saw him, I fell at his feet as though dead. Then he placed his right hand on me and said: “Do not be afraid. I am the First and the Last."],[18,"I am the Living One; I was dead, and now look, I am alive for ever and ever! And I hold the keys of death and Hades."],[19,"“Write, therefore, what you have seen, what is now and what will take place later."],[20,"The mystery of the seven stars that you saw in my right hand and of the seven golden lampstands is this: The seven stars are the angels of the seven churches, and the seven lampstands are the seven churches."]]},{"chapter":2,"title":"Revelation 2","verses":[[1,"“To the angel of the church in Ephesus write: These are the words of him who holds the seven stars in his right hand and walks among the seven golden lampstands."],[2,"I know your deeds, your hard work and your perseverance. I know that you cannot tolerate wicked people, that you have tested those who claim to be apostles but are not, and have found them false."],[3,"You have persevered and have endured hardships for my name, and have not grown weary."],[4,"Yet I hold this against you: You have forsaken the love you had at first."],[5,"Consider how far you have fallen! Repent and do the things you did at first. If you do not repent, I will come to you and remove your lampstand from its place."],[6,"But you have this in your favor: You hate the practices of the Nicolaitans, which I also hate."],[7,"Whoever has ears, let them hear what the Spirit says to the churches. To the one who is victorious, I will give the right to eat from the tree of life, which is in the paradise of God."],[8,"“To the angel of the church in Smyrna write: These are the words of him who is the First and the Last, who died and came to life again."],[9,"I know your afflictions and your poverty—yet you are rich! I know about the slander of those who say they are Jews and are not, but are a synagogue of Satan."],[10,"Do not be afraid of what you are about to suffer. I tell you, the devil will put some of you in prison to test you, and you will suffer persecution for ten days. Be faithful, even to the point of death, and I will give you life as your victor’s crown."],[11,"Whoever has ears, let them hear what the Spirit says to the churches. The one who is victorious will not be hurt at all by the second death."],[12,"“To the angel of the church in Pergamum write: These are the words of him who has the sharp, double-edged sword."],[13,"I know where you live—where Satan has his throne. Yet you remain true to my name. You did not renounce your faith in me, not even in the days of Antipas, my faithful witness, who was put to death in your city—where Satan lives."],[14,"Nevertheless, I have a few things against you: There are some among you who hold to the teaching of Balaam, who taught Balak to entice the Israelites to sin so that they ate food sacrificed to idols and committed sexual immorality."],[15,"Likewise, you also have those who hold to the teaching of the Nicolaitans."],[16,"Repent therefore! Otherwise, I will soon come to you and will fight against them with the sword of my mouth."],[17,"Whoever has ears, let them hear what the Spirit says to the churches. To the one who is victorious, I will give some of the hidden manna. I will also give that person a white stone with a new name written on it, known only to the one who receives it."],[18,"“To the angel of the church in Thyatira write: These are the words of the Son of God, whose eyes are like blazing fire and whose feet are like burnished bronze."],[19,"I know your deeds, your love and faith, your service and perseverance, and that you are now doing more than you did at first."],[20,"Nevertheless, I have this against you: You tolerate that woman Jezebel, who calls herself a prophet. By her teaching she misleads my servants into sexual immorality and the eating of food sacrificed to idols."],[21,"I have given her time to repent of her immorality, but she is unwilling."],[22,"So I will cast her on a bed of suffering, and I will make those who commit adultery with her suffer intensely, unless they repent of her ways."],[23,"I will strike her children dead. Then all the churches will know that I am he who searches hearts and minds, and I will repay each of you according to your deeds."],[24,"Now I say to the rest of you in Thyatira, to you who do not hold to her teaching and have not learned Satan’s so-called deep secrets, ‘I will not impose any other burden on you,"],[25,"except to hold on to what you have until I come.’"],[26,"To the one who is victorious and does my will to the end, I will give authority over the nations—"],[27,"that one ‘will rule them with an iron scepter and will dash them to pieces like pottery’—just as I have received authority from my Father."],[28,"I will also give that one the morning star."],[29,"Whoever has ears, let them hear what the Spirit says to the churches."]]},{"chapter":3,"title":"Revelation 3","verses":[[1,"“To the angel of the church in Sardis write: These are the words of him who holds the seven spirits of God and the seven stars. I know your deeds; you have a reputation of being alive, but you are dead."],[2,"Wake up! Strengthen what remains and is about to die, for I have found your deeds unfinished in the sight of my God."],[3,"Remember, therefore, what you have received and heard; hold it fast, and repent. But if you do not wake up, I will come like a thief, and you will not know at what time I will come to you."],[4,"Yet you have a few people in Sardis who have not soiled their clothes. They will walk with me, dressed in white, for they are worthy."],[5,"The one who is victorious will, like them, be dressed in white. I will never blot out the name of that person from the book of life, but will acknowledge that name before my Father and his angels."],[6,"Whoever has ears, let them hear what the Spirit says to the churches."],[7,"“To the angel of the church in Philadelphia write: These are the words of him who is holy and true, who holds the key of David. What he opens no one can shut, and what he shuts no one can open."],[8,"I know your deeds. See, I have placed before you an open door that no one can shut. I know that you have little strength, yet you have kept my word and have not denied my name."],[9,"I will make those who are of the synagogue of Satan, who claim to be Jews though they are not, but are liars—I will make them come and fall down at your feet and acknowledge that I have loved you."],[10,"Since you have kept my command to endure patiently, I will also keep you from the hour of trial that is going to come on the whole world to test the inhabitants of the earth."],[11,"I am coming soon. Hold on to what you have, so that no one will take your crown."],[12,"The one who is victorious I will make a pillar in the temple of my God. Never again will they leave it. I will write on them the name of my God and the name of the city of my God, the new Jerusalem, which is coming down out of heaven from my God; and I will also write on them my new name."],[13,"Whoever has ears, let them hear what the Spirit says to the churches."],[14,"“To the angel of the church in Laodicea write: These are the words of the Amen, the faithful and true witness, the ruler of God’s creation."],[15,"I know your deeds, that you are neither cold nor hot. I wish you were either one or the other!"],[16,"So, because you are lukewarm—neither hot nor cold—I am about to spit you out of my mouth."],[17,"You say, ‘I am rich; I have acquired wealth and do not need a thing.’ But you do not realize that you are wretched, pitiful, poor, blind and naked."],[18,"I counsel you to buy from me gold refined in the fire, so you can become rich; and white clothes to wear, so you can cover your shameful nakedness; and salve to put on your eyes, so you can see."],[19,"Those whom I love I rebuke and discipline. So be earnest and repent."],[20,"Here I am! I stand at the door and knock. If anyone hears my voice and opens the door, I will come in and eat with that person, and they with me."],[21,"To the one who is victorious, I will give the right to sit with me on my throne, just as I was victorious and sat down with my Father on his throne."],[22,"Whoever has ears, let them hear what the Spirit says to the churches.”"]]},{"chapter":4,"title":"Revelation 4","verses":[[1,"After this I looked, and there before me was a door standing open in heaven. And the voice I had first heard speaking to me like a trumpet said, “Come up here, and I will show you what must take place after this.”"],[2,"At once I was in the Spirit, and there before me was a throne in heaven with someone sitting on it."],[3,"And the one who sat there had the appearance of jasper and ruby. A rainbow that shone like an emerald encircled the throne."],[4,"Surrounding the throne were twenty-four other thrones, and seated on them were twenty-four elders. They were dressed in white and had crowns of gold on their heads."],[5,"From the throne came flashes of lightning, rumblings and peals of thunder. In front of the throne, seven lamps were blazing. These are the seven spirits of God."],[6,"Also in front of the throne there was what looked like a sea of glass, clear as crystal. In the center, around the throne, were four living creatures, and they were covered with eyes, in front and in back."],[7,"The first living creature was like a lion, the second was like an ox, the third had a face like a man, the fourth was like a flying eagle."],[8,"Each of the four living creatures had six wings and was covered with eyes all around, even under its wings. Day and night they never stop saying: “‘Holy, holy, holy is the Lord God Almighty,’ who was, and is, and is to come.”"],[9,"Whenever the living creatures give glory, honor and thanks to him who sits on the throne and who lives for ever and ever,"],[10,"the twenty-four elders fall down before him who sits on the throne and worship him who lives for ever and ever. They lay their crowns before the throne and say:"],[11,"“You are worthy, our Lord and God, to receive glory and honor and power, for you created all things, and by your will they were created and have their being.”"]]},{"chapter":5,"title":"Revelation 5","verses":[[1,"Then I saw in the right hand of him who sat on the throne a scroll with writing on both sides and sealed with seven seals."],[2,"And I saw a mighty angel proclaiming in a loud voice, “Who is worthy to break the seals and open the scroll?”"],[3,"But no one in heaven or on earth or under the earth could open the scroll or even look inside it."],[4,"I wept and wept because no one was found who was worthy to open the scroll or look inside."],[5,"Then one of the elders said to me, “Do not weep! See, the Lion of the tribe of Judah, the Root of David, has triumphed. He is able to open the scroll and its seven seals.”"],[6,"Then I saw a Lamb, looking as if it had been slain, standing at the center of the throne, encircled by the four living creatures and the elders. The Lamb had seven horns and seven eyes, which are the seven spirits of God sent out into all the earth."],[7,"He went and took the scroll from the right hand of him who sat on the throne."],[8,"And when he had taken it, the four living creatures and the twenty-four elders fell down before the Lamb. Each one had a harp and they were holding golden bowls full of incense, which are the prayers of God’s people."],[9,"And they sang a new song, saying: “You are worthy to take the scroll and to open its seals, because you were slain, and with your blood you purchased for God persons from every tribe and language and people and nation."],[10,"You have made them to be a kingdom and priests to serve our God, and they will reign on the earth.”"],[11,"Then I looked and heard the voice of many angels, numbering thousands upon thousands, and ten thousand times ten thousand. They encircled the throne and the living creatures and the elders."],[12,"In a loud voice they were saying: “Worthy is the Lamb, who was slain, to receive power and wealth and wisdom and strength and honor and glory and praise!”"],[13,"Then I heard every creature in heaven and on earth and under the earth and on the sea, and all that is in them, saying: “To him who sits on the throne and to the Lamb be praise and honor and glory and power, for ever and ever!”"],[14,"The four living creatures said, “Amen,” and the elders fell down and worshiped."]]},{"chapter":6,"title":"Revelation 6","verses":[[1,"I watched as the Lamb opened the first of the seven seals. Then I heard one of the four living creatures say in a voice like thunder, “Come!”"],[2,"I looked, and there before me was a white horse! Its rider held a bow, and he was given a crown, and he rode out as a conqueror bent on conquest."],[3,"When the Lamb opened the second seal, I heard the second living creature say, “Come!”"],[4,"Then another horse came out, a fiery red one. Its rider was given power to take peace from the earth and to make people kill each other. To him was given a large sword."],[5,"When the Lamb opened the third seal, I heard the third living creature say, “Come!” I looked, and there before me was a black horse! Its rider was holding a pair of scales in his hand."],[6,"Then I heard what sounded like a voice among the four living creatures, saying, “Two pounds of wheat for a day’s wages, and six pounds of barley for a day’s wages, and do not damage the oil and the wine!”"],[7,"When the Lamb opened the fourth seal, I heard the voice of the fourth living creature say, “Come!”"],[8,"I looked, and there before me was a pale horse! Its rider was named Death, and Hades was following close behind him. They were given power over a fourth of the earth to kill by sword, famine and plague, and by the wild beasts of the earth."],[9,"When he opened the fifth seal, I saw under the altar the souls of those who had been slain because of the word of God and the testimony they had maintained."],[10,"They called out in a loud voice, “How long, Sovereign Lord, holy and true, until you judge the inhabitants of the earth and avenge our blood?”"],[11,"Then each of them was given a white robe, and they were told to wait a little longer, until the full number of their fellow servants, their brothers and sisters, were killed just as they had been."],[12,"I watched as he opened the sixth seal. There was a great earthquake. The sun turned black like sackcloth made of goat hair, the whole moon turned blood red,"],[13,"and the stars in the sky fell to earth, as figs drop from a fig tree when shaken by a strong wind."],[14,"The heavens receded like a scroll being rolled up, and every mountain and island was removed from its place."],[15,"Then the kings of the earth, the princes, the generals, the rich, the mighty, and everyone else, both slave and free, hid in caves and among the rocks of the mountains."],[16,"They called to the mountains and the rocks, “Fall on us and hide us from the face of him who sits on the throne and from the wrath of the Lamb!"],[17,"For the great day of their wrath has come, and who can withstand it?”"]]},{"chapter":7,"title":"Revelation 7","verses":[[1,"After this I saw four angels standing at the four corners of the earth, holding back the four winds of the earth to prevent any wind from blowing on the land or on the sea or on any tree."],[2,"Then I saw another angel coming up from the east, having the seal of the living God. He called out in a loud voice to the four angels who had been given power to harm the land and the sea:"],[3,"“Do not harm the land or the sea or the trees until we put a seal on the foreheads of the servants of our God.”"],[4,"Then I heard the number of those who were sealed: 144,000 from all the tribes of Israel."],[5,"From the tribe of Judah 12,000 were sealed, from the tribe of Reuben 12,000, from the tribe of Gad 12,000,"],[6,"from the tribe of Asher 12,000, from the tribe of Naphtali 12,000, from the tribe of Manasseh 12,000,"],[7,"from the tribe of Simeon 12,000, from the tribe of Levi 12,000, from the tribe of Issachar 12,000,"],[8,"from the tribe of Zebulun 12,000, from the tribe of Joseph 12,000, from the tribe of Benjamin 12,000."],[9,"After this I looked, and there before me was a great multitude that no one could count, from every nation, tribe, people and language, standing before the throne and before the Lamb. They were wearing white robes and were holding palm branches in their hands."],[10,"And they cried out in a loud voice: “Salvation belongs to our God, who sits on the throne, and to the Lamb.”"],[11,"All the angels were standing around the throne and around the elders and the four living creatures. They fell down on their faces before the throne and worshiped God,"],[12,"saying: “Amen! Praise and glory and wisdom and thanks and honor and power and strength be to our God for ever and ever. Amen!”"],[13,"Then one of the elders asked me, “These in white robes—who are they, and where did they come from?”"],[14,"I answered, “Sir, you know.” And he said, “These are they who have come out of the great tribulation; they have washed their robes and made them white in the blood of the Lamb."],[15,"Therefore, “they are before the throne of God and serve him day and night in his temple; and he who sits on the throne will shelter them with his presence."],[16,"‘Never again will they hunger; never again will they thirst. The sun will not beat down on them,’ nor any scorching heat."],[17,"For the Lamb at the center of the throne will be their shepherd; ‘he will lead them to springs of living water.’ ‘And God will wipe away every tear from their eyes.’”"]]},{"chapter":8,"title":"Revelation 8","verses":[[1,"When he opened the seventh seal, there was silence in heaven for about half an hour."],[2,"And I saw the seven angels who stand before God, and seven trumpets were given to them."],[3,"Another angel, who had a golden censer, came and stood at the altar. He was given much incense to offer, with the prayers of all God’s people, on the golden altar in front of the throne."],[4,"The smoke of the incense, together with the prayers of God’s people, went up before God from the angel’s hand."],[5,"Then the angel took the censer, filled it with fire from the altar, and hurled it on the earth; and there came peals of thunder, rumblings, flashes of lightning and an earthquake."],[6,"Then the seven angels who had the seven trumpets prepared to sound them."],[7,"The first angel sounded his trumpet, and there came hail and fire mixed with blood, and it was hurled down on the earth. A third of the earth was burned up, a third of the trees were burned up, and all the green grass was burned up."],[8,"The second angel sounded his trumpet, and something like a huge mountain, all ablaze, was thrown into the sea. A third of the sea turned into blood,"],[9,"a third of the living creatures in the sea died, and a third of the ships were destroyed."],[10,"The third angel sounded his trumpet, and a great star, blazing like a torch, fell from the sky on a third of the rivers and on the springs of water—"],[11,"the name of the star is Wormwood. A third of the waters turned bitter, and many people died from the waters that had become bitter."],[12,"The fourth angel sounded his trumpet, and a third of the sun was struck, a third of the moon, and a third of the stars, so that a third of them turned dark. A third of the day was without light, and also a third of the night."],[13,"As I watched, I heard an eagle that was flying in midair call out in a loud voice: “Woe! Woe! Woe to the inhabitants of the earth, because of the trumpet blasts about to be sounded by the other three angels!”"]]},{"chapter":9,"title":"Revelation 9","verses":[[1,"The fifth angel sounded his trumpet, and I saw a star that had fallen from the sky to the earth. The star was given the key to the shaft of the Abyss."],[2,"When he opened the Abyss, smoke rose from it like the smoke from a gigantic furnace. The sun and sky were darkened by the smoke from the Abyss."],[3,"And out of the smoke locusts came down on the earth and were given power like that of scorpions of the earth."],[4,"They were told not to harm the grass of the earth or any plant or tree, but only those people who did not have the seal of God on their foreheads."],[5,"They were not allowed to kill them but only to torture them for five months. And the agony they suffered was like that of the sting of a scorpion when it strikes."],[6,"During those days people will seek death but will not find it; they will long to die, but death will elude them."],[7,"The locusts looked like horses prepared for battle. On their heads they wore something like crowns of gold, and their faces resembled human faces."],[8,"Their hair was like women’s hair, and their teeth were like lions’ teeth."],[9,"They had breastplates like breastplates of iron, and the sound of their wings was like the thundering of many horses and chariots rushing into battle."],[10,"They had tails with stingers, like scorpions, and in their tails they had power to torment people for five months."],[11,"They had as king over them the angel of the Abyss, whose name in Hebrew is Abaddon and in Greek is Apollyon (that is, Destroyer)."],[12,"The first woe is past; two other woes are yet to come."],[13,"The sixth angel sounded his trumpet, and I heard a voice coming from the four horns of the golden altar that is before God."],[14,"It said to the sixth angel who had the trumpet, “Release the four angels who are bound at the great river Euphrates.”"],[15,"And the four angels who had been kept ready for this very hour and day and month and year were released to kill a third of mankind."],[16,"The number of the mounted troops was twice ten thousand times ten thousand. I heard their number."],[17,"The horses and riders I saw in my vision looked like this: Their breastplates were fiery red, dark blue, and yellow as sulfur. The heads of the horses resembled the heads of lions, and out of their mouths came fire, smoke and sulfur."],[18,"A third of mankind was killed by the three plagues of fire, smoke and sulfur that came out of their mouths."],[19,"The power of the horses was in their mouths and in their tails; for their tails were like snakes, having heads with which they inflict injury."],[20,"The rest of mankind who were not killed by these plagues still did not repent of the work of their hands; they did not stop worshiping demons, and idols of gold, silver, bronze, stone and wood—idols that cannot see or hear or walk."],[21,"Nor did they repent of their murders, their magic arts, their sexual immorality or their thefts."]]},{"chapter":10,"title":"Revelation 10","verses":[[1,"Then I saw another mighty angel coming down from heaven. He was robed in a cloud, with a rainbow above his head; his face was like the sun, and his legs were like fiery pillars."],[2,"He was holding a little scroll, which lay open in his hand. He planted his right foot on the sea and his left foot on the land,"],[3,"and he gave a loud shout like the roar of a lion. When he shouted, the voices of the seven thunders spoke."],[4,"And when the seven thunders spoke, I was about to write; but I heard a voice from heaven say, “Seal up what the seven thunders have said and do not write it down.”"],[5,"Then the angel I had seen standing on the sea and on the land raised his right hand to heaven."],[6,"And he swore by him who lives for ever and ever, who created the heavens and all that is in them, the earth and all that is in it, and the sea and all that is in it, and said, “There will be no more delay!"],[7,"But in the days when the seventh angel is about to sound his trumpet, the mystery of God will be accomplished, just as he announced to his servants the prophets.”"],[8,"Then the voice that I had heard from heaven spoke to me once more: “Go, take the scroll that lies open in the hand of the angel who is standing on the sea and on the land.”"],[9,"So I went to the angel and asked him to give me the little scroll. He said to me, “Take it and eat it. It will turn your stomach sour, but ‘in your mouth it will be as sweet as honey.’”"],[10,"I took the little scroll from the angel’s hand and ate it. It tasted as sweet as honey in my mouth, but when I had eaten it, my stomach turned sour."],[11,"Then I was told, “You must prophesy again about many peoples, nations, languages and kings.”"]]},{"chapter":11,"title":"Revelation 11","verses":[[1,"I was given a reed like a measuring rod and was told, “Go and measure the temple of God and the altar, with its worshipers."],[2,"But exclude the outer court; do not measure it, because it has been given to the Gentiles. They will trample on the holy city for 42 months."],[3,"And I will appoint my two witnesses, and they will prophesy for 1,260 days, clothed in sackcloth.”"],[4,"They are “the two olive trees” and the two lampstands, and “they stand before the Lord of the earth.”"],[5,"If anyone tries to harm them, fire comes from their mouths and devours their enemies. This is how anyone who wants to harm them must die."],[6,"They have power to shut up the heavens so that it will not rain during the time they are prophesying; and they have power to turn the waters into blood and to strike the earth with every kind of plague as often as they want."],[7,"Now when they have finished their testimony, the beast that comes up from the Abyss will attack them, and overpower and kill them."],[8,"Their bodies will lie in the public square of the great city—which is figuratively called Sodom and Egypt—where also their Lord was crucified."],[9,"For three and a half days some from every people, tribe, language and nation will gaze on their bodies and refuse them burial."],[10,"The inhabitants of the earth will gloat over them and will celebrate by sending each other gifts, because these two prophets had tormented those who live on the earth."],[11,"But after the three and a half days the breath of life from God entered them, and they stood on their feet, and terror struck those who saw them."],[12,"Then they heard a loud voice from heaven saying to them, “Come up here.” And they went up to heaven in a cloud, while their enemies looked on."],[13,"At that very hour there was a severe earthquake and a tenth of the city collapsed. Seven thousand people were killed in the earthquake, and the survivors were terrified and gave glory to the God of heaven."],[14,"The second woe has passed; the third woe is coming soon."],[15,"The seventh angel sounded his trumpet, and there were loud voices in heaven, which said: “The kingdom of the world has become the kingdom of our Lord and of his Messiah, and he will reign for ever and ever.”"],[16,"And the twenty-four elders, who were seated on their thrones before God, fell on their faces and worshiped God,"],[17,"saying: “We give thanks to you, Lord God Almighty, the One who is and who was, because you have taken your great power and have begun to reign."],[18,"The nations were angry, and your wrath has come. The time has come for judging the dead, and for rewarding your servants the prophets and your people who revere your name, both great and small— and for destroying those who destroy the earth.”"],[19,"Then God’s temple in heaven was opened, and within his temple was seen the ark of his covenant. And there came flashes of lightning, rumblings, peals of thunder, an earthquake and a severe hailstorm."]]},{"chapter":12,"title":"Revelation 12","verses":[[1,"A great sign appeared in heaven: a woman clothed with the sun, with the moon under her feet and a crown of twelve stars on her head."],[2,"She was pregnant and cried out in pain as she was about to give birth."],[3,"Then another sign appeared in heaven: an enormous red dragon with seven heads and ten horns and seven crowns on its heads."],[4,"Its tail swept a third of the stars out of the sky and flung them to the earth. The dragon stood in front of the woman who was about to give birth, so that it might devour her child the moment he was born."],[5,"She gave birth to a son, a male child, who “will rule all the nations with an iron scepter.” And her child was snatched up to God and to his throne."],[6,"The woman fled into the wilderness to a place prepared for her by God, where she might be taken care of for 1,260 days."],[7,"Then war broke out in heaven. Michael and his angels fought against the dragon, and the dragon and his angels fought back."],[8,"But he was not strong enough, and they lost their place in heaven."],[9,"The great dragon was hurled down—that ancient serpent called the devil, or Satan, who leads the whole world astray. He was hurled to the earth, and his angels with him."],[10,"Then I heard a loud voice in heaven say: “Now have come the salvation and the power and the kingdom of our God, and the authority of his Messiah. For the accuser of our brothers and sisters, who accuses them before our God day and night, has been hurled down."],[11,"They triumphed over him by the blood of the Lamb and by the word of their testimony; they did not love their lives so much as to shrink from death."],[12,"Therefore rejoice, you heavens and you who dwell in them! But woe to the earth and the sea, because the devil has gone down to you! He is filled with fury, because he knows that his time is short.”"],[13,"When the dragon saw that he had been hurled to the earth, he pursued the woman who had given birth to the male child."],[14,"The woman was given the two wings of a great eagle, so that she might fly to the place prepared for her in the wilderness, where she would be taken care of for a time, times and half a time, out of the serpent’s reach."],[15,"Then from his mouth the serpent spewed water like a river, to overtake the woman and sweep her away with the torrent."],[16,"But the earth helped the woman by opening its mouth and swallowing the river that the dragon had spewed out of his mouth."],[17,"Then the dragon was enraged at the woman and went off to wage war against the rest of her offspring—those who keep God’s commands and hold fast their testimony about Jesus."]]},{"chapter":13,"title":"Revelation 13","verses":[[1,"The dragon stood on the shore of the sea. And I saw a beast coming out of the sea. It had ten horns and seven heads, with ten crowns on its horns, and on each head a blasphemous name."],[2,"The beast I saw resembled a leopard, but had feet like those of a bear and a mouth like that of a lion. The dragon gave the beast his power and his throne and great authority."],[3,"One of the heads of the beast seemed to have had a fatal wound, but the fatal wound had been healed. The whole world was filled with wonder and followed the beast."],[4,"People worshiped the dragon because he had given authority to the beast, and they also worshiped the beast and asked, “Who is like the beast? Who can wage war against it?”"],[5,"The beast was given a mouth to utter proud words and blasphemies and to exercise its authority for forty-two months."],[6,"It opened its mouth to blaspheme God, and to slander his name and his dwelling place and those who live in heaven."],[7,"It was given power to wage war against God’s holy people and to conquer them. And it was given authority over every tribe, people, language and nation."],[8,"All inhabitants of the earth will worship the beast—all whose names have not been written in the Lamb’s book of life, the Lamb who was slain from the creation of the world."],[9,"Whoever has ears, let them hear."],[10,"“If anyone is to go into captivity, into captivity they will go. If anyone is to be killed with the sword, with the sword they will be killed.” This calls for patient endurance and faithfulness on the part of God’s people."],[11,"Then I saw a second beast, coming out of the earth. It had two horns like a lamb, but it spoke like a dragon."],[12,"It exercised all the authority of the first beast on its behalf, and made the earth and its inhabitants worship the first beast, whose fatal wound had been healed."],[13,"And it performed great signs, even causing fire to come down from heaven to the earth in full view of the people."],[14,"Because of the signs it was given power to perform on behalf of the first beast, it deceived the inhabitants of the earth. It ordered them to set up an image in honor of the beast who was wounded by the sword and yet lived."],[15,"The second beast was given power to give breath to the image of the first beast, so that the image could speak and cause all who refused to worship the image to be killed."],[16,"It also forced all people, great and small, rich and poor, free and slave, to receive a mark on their right hands or on their foreheads,"],[17,"so that they could not buy or sell unless they had the mark, which is the name of the beast or the number of its name."],[18,"This calls for wisdom. Let the person who has insight calculate the number of the beast, for it is the number of a man. That number is 666."]]},{"chapter":14,"title":"Revelation 14","verses":[[1,"Then I looked, and there before me was the Lamb, standing on Mount Zion, and with him 144,000 who had his name and his Father’s name written on their foreheads."],[2,"And I heard a sound from heaven like the roar of rushing waters and like a loud peal of thunder. The sound I heard was like that of harpists playing their harps."],[3,"And they sang a new song before the throne and before the four living creatures and the elders. No one could learn the song except the 144,000 who had been redeemed from the earth."],[4,"These are those who did not defile themselves with women, for they remained virgins. They follow the Lamb wherever he goes. They were purchased from among mankind and offered as firstfruits to God and the Lamb."],[5,"No lie was found in their mouths; they are blameless."],[6,"Then I saw another angel flying in midair, and he had the eternal gospel to proclaim to those who live on the earth—to every nation, tribe, language and people."],[7,"He said in a loud voice, “Fear God and give him glory, because the hour of his judgment has come. Worship him who made the heavens, the earth, the sea and the springs of water.”"],[8,"A second angel followed and said, “‘Fallen! Fallen is Babylon the Great,’ which made all the nations drink the maddening wine of her adulteries.”"],[9,"A third angel followed them and said in a loud voice: “If anyone worships the beast and its image and receives its mark on their forehead or on their hand,"],[10,"they, too, will drink the wine of God’s fury, which has been poured full strength into the cup of his wrath. They will be tormented with burning sulfur in the presence of the holy angels and of the Lamb."],[11,"And the smoke of their torment will rise for ever and ever. There will be no rest day or night for those who worship the beast and its image, or for anyone who receives the mark of its name.”"],[12,"This calls for patient endurance on the part of the people of God who keep his commands and remain faithful to Jesus."],[13,"Then I heard a voice from heaven say, “Write this: Blessed are the dead who die in the Lord from now on.” “Yes,” says the Spirit, “they will rest from their labor, for their deeds will follow them.”"],[14,"I looked, and there before me was a white cloud, and seated on the cloud was one like a son of man with a crown of gold on his head and a sharp sickle in his hand."],[15,"Then another angel came out of the temple and called in a loud voice to him who was sitting on the cloud, “Take your sickle and reap, because the time to reap has come, for the harvest of the earth is ripe.”"],[16,"So he who was seated on the cloud swung his sickle over the earth, and the earth was harvested."],[17,"Another angel came out of the temple in heaven, and he too had a sharp sickle."],[18,"Still another angel, who had charge of the fire, came from the altar and called in a loud voice to him who had the sharp sickle, “Take your sharp sickle and gather the clusters of grapes from the earth’s vine, because its grapes are ripe.”"],[19,"The angel swung his sickle on the earth, gathered its grapes and threw them into the great winepress of God’s wrath."],[20,"They were trampled in the winepress outside the city, and blood flowed out of the press, rising as high as the horses’ bridles for a distance of 1,600 stadia."]]},{"chapter":15,"title":"Revelation 15","verses":[[1,"I saw in heaven another great and marvelous sign: seven angels with the seven last plagues—last, because with them God’s wrath is completed."],[2,"And I saw what looked like a sea of glass glowing with fire and, standing beside the sea, those who had been victorious over the beast and its image and over the number of its name. They held harps given them by God"],[3,"and sang the song of God’s servant Moses and of the Lamb: “Great and marvelous are your deeds, Lord God Almighty. Just and true are your ways, King of the nations."],[4,"Who will not fear you, Lord, and bring glory to your name? For you alone are holy. All nations will come and worship before you, for your righteous acts have been revealed.”"],[5,"After this I looked, and I saw in heaven the temple—that is, the tabernacle of the covenant law—and it was opened."],[6,"Out of the temple came the seven angels with the seven plagues. They were dressed in clean, shining linen and wore golden sashes around their chests."],[7,"Then one of the four living creatures gave to the seven angels seven golden bowls filled with the wrath of God, who lives for ever and ever."],[8,"And the temple was filled with smoke from the glory of God and from his power, and no one could enter the temple until the seven plagues of the seven angels were completed."]]},{"chapter":16,"title":"Revelation 16","verses":[[1,"Then I heard a loud voice from the temple saying to the seven angels, “Go, pour out the seven bowls of God’s wrath on the earth.”"],[2,"The first angel went and poured out his bowl on the land, and ugly, festering sores broke out on the people who had the mark of the beast and worshiped its image."],[3,"The second angel poured out his bowl on the sea, and it turned into blood like that of a dead person, and every living thing in the sea died."],[4,"The third angel poured out his bowl on the rivers and springs of water, and they became blood."],[5,"Then I heard the angel in charge of the waters say: “You are just in these judgments, O Holy One, you who are and who were;"],[6,"for they have shed the blood of your holy people and your prophets, and you have given them blood to drink as they deserve.”"],[7,"And I heard the altar respond: “Yes, Lord God Almighty, true and just are your judgments.”"],[8,"The fourth angel poured out his bowl on the sun, and the sun was allowed to scorch people with fire."],[9,"They were seared by the intense heat and they cursed the name of God, who had control over these plagues, but they refused to repent and glorify him."],[10,"The fifth angel poured out his bowl on the throne of the beast, and its kingdom was plunged into darkness. People gnawed their tongues in agony"],[11,"and cursed the God of heaven because of their pains and their sores, but they refused to repent of what they had done."],[12,"The sixth angel poured out his bowl on the great river Euphrates, and its water was dried up to prepare the way for the kings from the East."],[13,"Then I saw three impure spirits that looked like frogs; they came out of the mouth of the dragon, out of the mouth of the beast and out of the mouth of the false prophet."],[14,"They are demonic spirits that perform signs, and they go out to the kings of the whole world, to gather them for the battle on the great day of God Almighty."],[15,"“Look, I come like a thief! Blessed is the one who stays awake and remains clothed, so as not to go naked and be shamefully exposed.”"],[16,"Then they gathered the kings together to the place that in Hebrew is called Armageddon."],[17,"The seventh angel poured out his bowl into the air, and out of the temple came a loud voice from the throne, saying, “It is done!”"],[18,"Then there came flashes of lightning, rumblings, peals of thunder and a severe earthquake. No earthquake like it has ever occurred since mankind has been on earth, so tremendous was the quake."],[19,"The great city split into three parts, and the cities of the nations collapsed. God remembered Babylon the Great and gave her the cup filled with the wine of the fury of his wrath."],[20,"Every island fled away and the mountains could not be found."],[21,"From the sky huge hailstones, each weighing about a hundred pounds, fell on people. And they cursed God on account of the plague of hail, because the plague was so terrible."]]},{"chapter":17,"title":"Revelation 17","verses":[[1,"One of the seven angels who had the seven bowls came and said to me, “Come, I will show you the punishment of the great prostitute, who sits by many waters."],[2,"With her the kings of the earth committed adultery, and the inhabitants of the earth were intoxicated with the wine of her adulteries.”"],[3,"Then the angel carried me away in the Spirit into a wilderness. There I saw a woman sitting on a scarlet beast that was covered with blasphemous names and had seven heads and ten horns."],[4,"The woman was dressed in purple and scarlet, and was glittering with gold, precious stones and pearls. She held a golden cup in her hand, filled with abominable things and the filth of her adulteries."],[5,"The name written on her forehead was a mystery: babylon the great the mother of prostitutes and of the abominations of the earth."],[6,"I saw that the woman was drunk with the blood of God’s holy people, the blood of those who bore testimony to Jesus. When I saw her, I was greatly astonished."],[7,"Then the angel said to me: “Why are you astonished? I will explain to you the mystery of the woman and of the beast she rides, which has the seven heads and ten horns."],[8,"The beast, which you saw, once was, now is not, and yet will come up out of the Abyss and go to its destruction. The inhabitants of the earth whose names have not been written in the book of life from the creation of the world will be astonished when they see the beast, because it once was, now is not, and yet will come."],[9,"“This calls for a mind with wisdom. The seven heads are seven hills on which the woman sits."],[10,"They are also seven kings. Five have fallen, one is, the other has not yet come; but when he does come, he must remain for only a little while."],[11,"The beast who once was, and now is not, is an eighth king. He belongs to the seven and is going to his destruction."],[12,"“The ten horns you saw are ten kings who have not yet received a kingdom, but who for one hour will receive authority as kings along with the beast."],[13,"They have one purpose and will give their power and authority to the beast."],[14,"They will wage war against the Lamb, but the Lamb will triumph over them because he is Lord of lords and King of kings—and with him will be his called, chosen and faithful followers.”"],[15,"Then the angel said to me, “The waters you saw, where the prostitute sits, are peoples, multitudes, nations and languages."],[16,"The beast and the ten horns you saw will hate the prostitute. They will bring her to ruin and leave her naked; they will eat her flesh and burn her with fire."],[17,"For God has put it into their hearts to accomplish his purpose by agreeing to hand over to the beast their royal authority, until God’s words are fulfilled."],[18,"The woman you saw is the great city that rules over the kings of the earth.”"]]},{"chapter":18,"title":"Revelation 18","verses":[[1,"After this I saw another angel coming down from heaven. He had great authority, and the earth was illuminated by his splendor."],[2,"With a mighty voice he shouted: “‘Fallen! Fallen is Babylon the Great!’ She has become a dwelling for demons and a haunt for every impure spirit, a haunt for every unclean bird, a haunt for every unclean and detestable animal."],[3,"For all the nations have drunk the maddening wine of her adulteries. The kings of the earth committed adultery with her, and the merchants of the earth grew rich from her excessive luxuries.”"],[4,"Then I heard another voice from heaven say: “‘Come out of her, my people,’ so that you will not share in her sins, so that you will not receive any of her plagues;"],[5,"for her sins are piled up to heaven, and God has remembered her crimes."],[6,"Give back to her as she has given; pay her back double for what she has done. Pour her a double portion from her own cup."],[7,"Give her as much torment and grief as the glory and luxury she gave herself. In her heart she boasts, ‘I sit enthroned as queen. I am not a widow; I will never mourn.’"],[8,"Therefore in one day her plagues will overtake her: death, mourning and famine. She will be consumed by fire, for mighty is the Lord God who judges her."],[9,"“When the kings of the earth who committed adultery with her and shared her luxury see the smoke of her burning, they will weep and mourn over her."],[10,"Terrified at her torment, they will stand far off and cry: “‘Woe! Woe to you, great city, you mighty city of Babylon! In one hour your doom has come!’"],[11,"“The merchants of the earth will weep and mourn over her because no one buys their cargoes anymore—"],[12,"cargoes of gold, silver, precious stones and pearls; fine linen, purple, silk and scarlet cloth; every sort of citron wood, and articles of every kind made of ivory, costly wood, bronze, iron and marble;"],[13,"cargoes of cinnamon and spice, of incense, myrrh and frankincense, of wine and olive oil, of fine flour and wheat; cattle and sheep; horses and carriages; and human beings sold as slaves."],[14,"“They will say, ‘The fruit you longed for is gone from you. All your luxury and splendor have vanished, never to be recovered.’"],[15,"The merchants who sold these things and gained their wealth from her will stand far off, terrified at her torment. They will weep and mourn"],[16,"and cry out: “‘Woe! Woe to you, great city, dressed in fine linen, purple and scarlet, and glittering with gold, precious stones and pearls!"],[17,"In one hour such great wealth has been brought to ruin!’ “Every sea captain, and all who travel by ship, the sailors, and all who earn their living from the sea, will stand far off."],[18,"When they see the smoke of her burning, they will exclaim, ‘Was there ever a city like this great city?’"],[19,"They will throw dust on their heads, and with weeping and mourning cry out: “‘Woe! Woe to you, great city, where all who had ships on the sea became rich through her wealth! In one hour she has been brought to ruin!’"],[20,"“Rejoice over her, you heavens! Rejoice, you people of God! Rejoice, apostles and prophets! For God has judged her with the judgment she imposed on you.”"],[21,"Then a mighty angel picked up a boulder the size of a large millstone and threw it into the sea, and said: “With such violence the great city of Babylon will be thrown down, never to be found again."],[22,"The music of harpists and musicians, pipers and trumpeters, will never be heard in you again. No worker of any trade will ever be found in you again. The sound of a millstone will never be heard in you again."],[23,"The light of a lamp will never shine in you again. The voice of bridegroom and bride will never be heard in you again. Your merchants were the world’s important people. By your magic spell all the nations were led astray."],[24,"In her was found the blood of prophets and of God’s holy people, of all who have been slaughtered on the earth.”"]]},{"chapter":19,"title":"Revelation 19","verses":[[1,"After this I heard what sounded like the roar of a great multitude in heaven shouting: “Hallelujah! Salvation and glory and power belong to our God,"],[2,"for true and just are his judgments. He has condemned the great prostitute who corrupted the earth by her adulteries. He has avenged on her the blood of his servants.”"],[3,"And again they shouted: “Hallelujah! The smoke from her goes up for ever and ever.”"],[4,"The twenty-four elders and the four living creatures fell down and worshiped God, who was seated on the throne. And they cried: “Amen, Hallelujah!”"],[5,"Then a voice came from the throne, saying: “Praise our God, all you his servants, you who fear him, both great and small!”"],[6,"Then I heard what sounded like a great multitude, like the roar of rushing waters and like loud peals of thunder, shouting: “Hallelujah! For our Lord God Almighty reigns."],[7,"Let us rejoice and be glad and give him glory! For the wedding of the Lamb has come, and his bride has made herself ready."],[8,"Fine linen, bright and clean, was given her to wear.” (Fine linen stands for the righteous acts of God’s holy people.)"],[9,"Then the angel said to me, “Write this: Blessed are those who are invited to the wedding supper of the Lamb!” And he added, “These are the true words of God.”"],[10,"At this I fell at his feet to worship him. But he said to me, “Don’t do that! I am a fellow servant with you and with your brothers and sisters who hold to the testimony of Jesus. Worship God! For it is the Spirit of prophecy who bears testimony to Jesus.”"],[11,"I saw heaven standing open and there before me was a white horse, whose rider is called Faithful and True. With justice he judges and wages war."],[12,"His eyes are like blazing fire, and on his head are many crowns. He has a name written on him that no one knows but he himself."],[13,"He is dressed in a robe dipped in blood, and his name is the Word of God."],[14,"The armies of heaven were following him, riding on white horses and dressed in fine linen, white and clean."],[15,"Coming out of his mouth is a sharp sword with which to strike down the nations. “He will rule them with an iron scepter.” He treads the winepress of the fury of the wrath of God Almighty."],[16,"On his robe and on his thigh he has this name written: king of kings and lord of lords."],[17,"And I saw an angel standing in the sun, who cried in a loud voice to all the birds flying in midair, “Come, gather together for the great supper of God,"],[18,"so that you may eat the flesh of kings, generals, and the mighty, of horses and their riders, and the flesh of all people, free and slave, great and small.”"],[19,"Then I saw the beast and the kings of the earth and their armies gathered together to wage war against the rider on the horse and his army."],[20,"But the beast was captured, and with it the false prophet who had performed the signs on its behalf. With these signs he had deluded those who had received the mark of the beast and worshiped its image. The two of them were thrown alive into the fiery lake of burning sulfur."],[21,"The rest were killed with the sword coming out of the mouth of the rider on the horse, and all the birds gorged themselves on their flesh."]]},{"chapter":20,"title":"Revelation 20","verses":[[1,"And I saw an angel coming down out of heaven, having the key to the Abyss and holding in his hand a great chain."],[2,"He seized the dragon, that ancient serpent, who is the devil, or Satan, and bound him for a thousand years."],[3,"He threw him into the Abyss, and locked and sealed it over him, to keep him from deceiving the nations anymore until the thousand years were ended. After that, he must be set free for a short time."],[4,"I saw thrones on which were seated those who had been given authority to judge. And I saw the souls of those who had been beheaded because of their testimony about Jesus and because of the word of God. They had not worshiped the beast or its image and had not received its mark on their foreheads or their hands. They came to life and reigned with Christ a thousand years."],[5,"(The rest of the dead did not come to life until the thousand years were ended.) This is the first resurrection."],[6,"Blessed and holy are those who share in the first resurrection. The second death has no power over them, but they will be priests of God and of Christ and will reign with him for a thousand years."],[7,"When the thousand years are over, Satan will be released from his prison"],[8,"and will go out to deceive the nations in the four corners of the earth—Gog and Magog—and to gather them for battle. In number they are like the sand on the seashore."],[9,"They marched across the breadth of the earth and surrounded the camp of God’s people, the city he loves. But fire came down from heaven and devoured them."],[10,"And the devil, who deceived them, was thrown into the lake of burning sulfur, where the beast and the false prophet had been thrown. They will be tormented day and night for ever and ever."],[11,"Then I saw a great white throne and him who was seated on it. The earth and the heavens fled from his presence, and there was no place for them."],[12,"And I saw the dead, great and small, standing before the throne, and books were opened. Another book was opened, which is the book of life. The dead were judged according to what they had done as recorded in the books."],[13,"The sea gave up the dead that were in it, and death and Hades gave up the dead that were in them, and each person was judged according to what they had done."],[14,"Then death and Hades were thrown into the lake of fire. The lake of fire is the second death."],[15,"Anyone whose name was not found written in the book of life was thrown into the lake of fire."]]},{"chapter":21,"title":"Revelation 21","verses":[[1,"Then I saw “a new heaven and a new earth,” for the first heaven and the first earth had passed away, and there was no longer any sea."],[2,"I saw the Holy City, the new Jerusalem, coming down out of heaven from God, prepared as a bride beautifully dressed for her husband."],[3,"And I heard a loud voice from the throne saying, “Look! God’s dwelling place is now among the people, and he will dwell with them. They will be his people, and God himself will be with them and be their God."],[4,"‘He will wipe every tear from their eyes. There will be no more death’ or mourning or crying or pain, for the old order of things has passed away.”"],[5,"He who was seated on the throne said, “I am making everything new!” Then he said, “Write this down, for these words are trustworthy and true.”"],[6,"He said to me: “It is done. I am the Alpha and the Omega, the Beginning and the End. To the thirsty I will give water without cost from the spring of the water of life."],[7,"Those who are victorious will inherit all this, and I will be their God and they will be my children."],[8,"But the cowardly, the unbelieving, the vile, the murderers, the sexually immoral, those who practice magic arts, the idolaters and all liars—they will be consigned to the fiery lake of burning sulfur. This is the second death.”"],[9,"One of the seven angels who had the seven bowls full of the seven last plagues came and said to me, “Come, I will show you the bride, the wife of the Lamb.”"],[10,"And he carried me away in the Spirit to a mountain great and high, and showed me the Holy City, Jerusalem, coming down out of heaven from God."],[11,"It shone with the glory of God, and its brilliance was like that of a very precious jewel, like a jasper, clear as crystal."],[12,"It had a great, high wall with twelve gates, and with twelve angels at the gates. On the gates were written the names of the twelve tribes of Israel."],[13,"There were three gates on the east, three on the north, three on the south and three on the west."],[14,"The wall of the city had twelve foundations, and on them were the names of the twelve apostles of the Lamb."],[15,"The angel who talked with me had a measuring rod of gold to measure the city, its gates and its walls."],[16,"The city was laid out like a square, as long as it was wide. He measured the city with the rod and found it to be 12,000 stadia in length, and as wide and high as it is long."],[17,"The angel measured the wall using human measurement, and it was 144 cubits thick."],[18,"The wall was made of jasper, and the city of pure gold, as pure as glass."],[19,"The foundations of the city walls were decorated with every kind of precious stone. The first foundation was jasper, the second sapphire, the third agate, the fourth emerald,"],[20,"the fifth onyx, the sixth ruby, the seventh chrysolite, the eighth beryl, the ninth topaz, the tenth turquoise, the eleventh jacinth, and the twelfth amethyst."],[21,"The twelve gates were twelve pearls, each gate made of a single pearl. The great street of the city was of gold, as pure as transparent glass."],[22,"I did not see a temple in the city, because the Lord God Almighty and the Lamb are its temple."],[23,"The city does not need the sun or the moon to shine on it, for the glory of God gives it light, and the Lamb is its lamp."],[24,"The nations will walk by its light, and the kings of the earth will bring their splendor into it."],[25,"On no day will its gates ever be shut, for there will be no night there."],[26,"The glory and honor of the nations will be brought into it."],[27,"Nothing impure will ever enter it, nor will anyone who does what is shameful or deceitful, but only those whose names are written in the Lamb’s book of life."]]},{"chapter":22,"title":"Revelation 22","verses":[[1,"Then the angel showed me the river of the water of life, as clear as crystal, flowing from the throne of God and of the Lamb"],[2,"down the middle of the great street of the city. On each side of the river stood the tree of life, bearing twelve crops of fruit, yielding its fruit every month. And the leaves of the tree are for the healing of the nations."],[3,"No longer will there be any curse. The throne of God and of the Lamb will be in the city, and his servants will serve him."],[4,"They will see his face, and his name will be on their foreheads."],[5,"There will be no more night. They will not need the light of a lamp or the light of the sun, for the Lord God will give them light. And they will reign for ever and ever."],[6,"The angel said to me, “These words are trustworthy and true. The Lord, the God who inspires the prophets, sent his angel to show his servants the things that must soon take place.”"],[7,"“Look, I am coming soon! Blessed is the one who keeps the words of the prophecy written in this scroll.”"],[8,"I, John, am the one who heard and saw these things. And when I had heard and seen them, I fell down to worship at the feet of the angel who had been showing them to me."],[9,"But he said to me, “Don’t do that! I am a fellow servant with you and with your fellow prophets and with all who keep the words of this scroll. Worship God!”"],[10,"Then he told me, “Do not seal up the words of the prophecy of this scroll, because the time is near."],[11,"Let the one who does wrong continue to do wrong; let the vile person continue to be vile; let the one who does right continue to do right; and let the holy person continue to be holy.”"],[12,"“Look, I am coming soon! My reward is with me, and I will give to each person according to what they have done."],[13,"I am the Alpha and the Omega, the First and the Last, the Beginning and the End."],[14,"“Blessed are those who wash their robes, that they may have the right to the tree of life and may go through the gates into the city."],[15,"Outside are the dogs, those who practice magic arts, the sexually immoral, the murderers, the idolaters and everyone who loves and practices falsehood."],[16,"“I, Jesus, have sent my angel to give you this testimony for the churches. I am the Root and the Offspring of David, and the bright Morning Star.”"],[17,"The Spirit and the bride say, “Come!” And let the one who hears say, “Come!” Let the one who is thirsty come; and let the one who wishes take the free gift of the water of life."],[18,"I warn everyone who hears the words of the prophecy of this scroll: If anyone adds anything to them, God will add to that person the plagues described in this scroll."],[19,"And if anyone takes words away from this scroll of prophecy, God will take away from that person any share in the tree of life and in the Holy City, which are described in this scroll."],[20,"He who testifies to these things says, “Yes, I am coming soon.” Amen. Come, Lord Jesus."],[21,"The grace of the Lord Jesus be with God’s people. Amen."]]}],
  niv1984: [{"chapter":1,"title":"Revelation 1","verses":[[1,"The revelation of Jesus Christ, which God gave him to show his servants what must soon take place. He made it known by sending his angel to his servant John,"],[2,"who testifies to everything he saw–that is, the word of God and the testimony of Jesus Christ."],[3,"Blessed is the one who reads the words of this prophecy, and blessed are those who hear it and take to heart what is written in it, because the time is near."],[4,"John, To the seven churches in the province of Asia: Grace and peace to you from him who is, and who was, and who is to come, and from the seven spirits"],[5,"before his throne, and from Jesus Christ, who is the faithful witness, the firstborn from the dead, and the ruler of the kings of the earth."],[6,"To him who loves us and has freed us from our sins by his blood, and has made us to be a kingdom and priests to serve his God and Father–to him be glory and power for ever and ever! Amen."],[7,"Look, he is coming with the clouds, and every eye will see him, even those who pierced him; and all the peoples of the earth will mourn because of him. So shall it be! Amen."],[8,"“I am the Alpha and the Omega,” says the Lord God, “who is, and who was, and who is to come, the Almighty.”"],[9,"I, John, your brother and companion in the suffering and kingdom and patient endurance that are ours in Jesus, was on the island of Patmos because of the word of God and the testimony of Jesus."],[10,"On the Lord’s Day I was in the Spirit, and I heard behind me a loud voice like a trumpet,"],[11,"which said: “Write on a scroll what you see and send it to the seven churches: to Ephesus, Smyrna, Pergamum, Thyatira, Sardis, Philadelphia and Laodicea.”"],[12,"I turned around to see the voice that was speaking to me. And when I turned I saw seven golden lampstands,"],[13,"and among the lampstands was someone “like a son of man,” dressed in a robe reaching down to his feet and with a golden sash around his chest."],[14,"His head and hair were white like wool, as white as snow, and his eyes were like blazing fire."],[15,"His feet were like bronze glowing in a furnace, and his voice was like the sound of rushing waters."],[16,"In his right hand he held seven stars, and out of his mouth came a sharp double- edged sword. His face was like the sun shining in all its brilliance."],[17,"When I saw him, I fell at his feet as though dead. Then he placed his right hand on me and said: “Do not be afraid. I am the First and the Last."],[18,"I am the Living One; I was dead, and behold I am alive for ever and ever! And I hold the keys of death and Hades."],[19,"“Write, therefore, what you have seen, what is now and what will take place later."],[20,"The mystery of the seven stars that you saw in my right hand and of the seven golden lampstands is this: The seven stars are the angels of the seven churches, and the seven lampstands are the seven churches."]]},{"chapter":2,"title":"Revelation 2","verses":[[1,"“To the angel of the church in Ephesus write: These are the words of him who holds the seven stars in his right hand and walks among the seven golden lampstands:"],[2,"I know your deeds, your hard work and your perseverance. I know that you cannot tolerate wicked men, that you have tested those who claim to be apostles but are not, and have found them false."],[3,"You have persevered and have endured hardships for my name, and have not grown weary."],[4,"Yet I hold this against you: You have forsaken your first love."],[5,"Remember the height from which you have fallen! Repent and do the things you did at first. If you do not repent, I will come to you and remove your lampstand from its place."],[6,"But you have this in your favor: You hate the practices of the Nicolaitans, which I also hate."],[7,"He who has an ear, let him hear what the Spirit says to the churches. To him who overcomes, I will give the right to eat from the tree of life, which is in the paradise of God."],[8,"“To th
