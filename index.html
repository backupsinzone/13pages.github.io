는 하늘에 사무쳤으며 하나님은 그의 불의한 일을 기억하신지라"],[6,"그가 준 그대로 그에게 주고 그의 행위대로 갑절을 갚아주고 그의 섞은 잔에도 갑절이나 섞어 그에게 주라"],[7,"그가 어떻게 자기를 영화롭게 하였으며 사치하였든지 그만큼 고난과 애통으로 갚아 주라 그가 마음에 말하기를 나는 여황으로 앉은 자요 과부가 아니라 결단코 애통을 당하지 아니하리라 하니"],[8,"그러므로 하루 동안에 그 재앙들이 이르리니 곧 사망과 애통과 흉년이라 그가 또한 불에 살라지리니 그를 심판하신 주 하나님은 강하신 자이심이니라"],[9,"그와 함께 음행하고 사치하던 땅의 왕들이 그 불붙는 연기를 보고 위하여 울고 가슴을 치며"],[10,"그 고난을 무서워하여 멀리 서서 가로되 화 있도다, 화 있도다 큰 성, 견고한 성 바벨론이여 일시간에 네 심판이 이르렀다' 하리로다"],[11,"땅의 상고들이 그를 위하여 울고 애통하는 것은 다시 그 상품을 사는 자가 없음이라"],[12,"그 상품은 금과 은과 보석과 진주와 세마포와 자주 옷감과 비단과 붉은 옷감이요 각종 향목과 각종 상아 기명이요 값진 나무와 진유와 철과 옥석으로 만든 각종 기명이요"],[13,"계피와 향료와 향과 향유와 유향과 포도주와 감람유와 고운 밀가루와 밀과 소와 양과 말과 수레와 종들과 사람의 영혼들이라"],[14,"바벨론아 네 영혼의 탐하던 과실이 네게서 떠났으며 맛 있는 것들과 빛난 것들이 다 없어졌으니 사람들이 결코 이것들을 다시 보지 못하리로다"],[15,"바벨론을 인하여 치부한 이 상품의 상고들이 그 고난을 무서워하여 멀리 서서 울고 애통하여"],[16,"가로되 `화 있도다 화 있도다 큰 성이여 세마포와 자주와 붉은 옷을 입고 금과 보석과 진주로 꾸민 것인데"],[17,"그러한 부가 일시간에 망하였도다 각 선장과 각처를 다니는 선객들과 선인들과 바다에서 일하는 자들이 멀리 서서"],[18,"그 불붙는 연기를 보고 외쳐 가로되 이 큰 성과 같은 성이 어디 있느뇨' 하며"],[19,"티끌을 자기 머리에 뿌리고 울고 애통하여 외쳐 가로되 `화 있도다 화 있도다 이 큰 성이여 바다에서 배 부리는 모든 자들이 너의 보배로운 상품을 인하여 치부하였더니 일시간에 망하였도다"],[20,"하늘과 성도들과 사도들과 선지자들아 그를 인하여 즐거워하라 하나님이 너희를 신원하시는 심판을 그에게 하셨음이라' 하더라"],[21,"이에 한 힘센 천사가 큰 맷돌 같은 돌을 들어 바다에 던져 가로되 큰 성 바벨론이 이같이 몹시 떨어져 결코 다시 보이지 아니하리로다"],[22,"또 거문고 타는 자와 풍류하는 자와 퉁소 부는 자와 나팔 부는 자들의 소리가 결코 다시 네 가운데서 들리지 아니하고 물론 어떠한 세공업자든지 결코 다시 네 가운데서 보이지 아니하고 또 맷돌 소리가 결코 다시 네 가운데서 들리지 아니하고"],[23,"등불 빛이 결코 다시 네 가운데서 비취지 아니하고 신랑과 신부의 음성이 결코 다시 네 가운데서 들리지 아니하리로다 너의 상고들은 땅의 왕족들이라 네 복술을 인하여 만국이 미혹되었도다"],[24,"선지자들과 성도들과 및 땅 위에서 죽임을 당한 모든 자의 피가 이 성중에서 보였느니라 하더라"]]},{"chapter":19,"title":"요한계시록 19","verses":[[1,"이 일 후에 내가 들으니 하늘에 허다한 무리의 큰 음성 같은 것이 있어 가로되 `할렐루야 구원과 영광과 능력이 우리 하나님께 있도다"],[2,"그의 심판은 참되고 의로운지라 음행으로 땅을 더럽게 한 큰 음녀를 심판하사 자기 종들의 피를 그의 손에 갚으셨도다' 하고"],[3,"두번째 가로되 할렐루야 하더니 그 연기가 세세토록 올라가더라"],[4,"또 이십 사 장로와 네 생물이 엎드려 보좌에 앉으신 하나님께 경배하여 가로되 `아멘, 할렐루야' 하니"],[5,"보좌에서 음성이 나서 가로되 `하나님의 종들 곧 그를 경외하는 너희들아 무론대소하고 다 우리 하나님께 찬송하라 하더라"],[6,"또 내가 들으니 허다한 무리의 음성도 같고 많은 물 소리도 같고 큰 뇌성도 같아서 가로되 `할렐루야 주 우리 하나님 곧 전능하신 이가 통치하시도다"],[7,"우리가 즐거워하고 크게 기뻐하여 그에게 영광을 돌리세 어린 양의 혼인 기약이 이르렀고 그 아내가 예비하였으니"],[8,"그에게 허락하사 빛나고 깨끗한 세마포를 입게 하셨은즉 이 세마포는 성도들의 옳은 행실이로다' 하더라"],[9,"천사가 내게 말하기를 기록하라 어린 양의 혼인 잔치에 청함을 입은 자들이 복이 있도다 하고 또 내게 말하되 `이것은 하나님의 참되신 말씀이라' 하기로"],[10,"내가 그 발 앞에 엎드려 경배하려 하니 그가 나더러 말하기를 `나는 너와 및 예수의 증거를 받은 네 형제들과 같이 된 종이니 삼가 그리하지 말고 오직 하나님께 경배하라 예수의 증거는 대언의 영이라' 하더라"],[11,"또 내가 하늘이 열린 것을 보니 보라 백마와 탄 자가 있으니 그 이름은 충신과 진실이라 그가 공의로 심판하며 싸우더라"],[12,"그 눈이 불꽃 같고 그 머리에 많은 면류관이 있고 또 이름 쓴 것이 하나가 있으니 자기 밖에 아는 자가 없고"],[13,"또 그가 피 뿌린 옷을 입었는데 그 이름은 하나님의 말씀이라 칭하더라"],[14,"하늘에 있는 군대들이 희고 깨끗한 세마포를 입고 백마를 타고 그를 따르더라"],[15,"그의 입에서 이한 검이 나오니 그것으로 만국을 치겠고 친히 저희를 철장으로 다스리며 또 친히 하나님 곧 전능하신 이의 맹렬한 진노의 포도주 틀을 밟겠고"],[16,"그 옷과 그 다리에 이름 쓴 것이 있으니 만왕의 왕이요 만주의 주라 하였더라"],[17,"또 내가 보니 한 천사가 해에 서서 공중에 나는 모든 새를 향하여 큰 음성으로 외쳐 가로되 `와서 하나님의 큰 잔치에 모여"],[18,"왕들의 고기와 장군들의 고기와 장사들의 고기와 말들과 그 탄 자들의 고기와 자유한 자들이나 종들이나 무론대소하고 모든 자의 고기를 먹으라' 하더라"],[19,"또 내가 보매 그 짐승과 땅의 임금들과 그 군대들이 모여 그 말 탄 자와 그의 군대로 더불어 전쟁을 일으키다가"],[20,"짐승이 잡히고 그 앞에서 이적을 행하던 거짓 선지자도 함께 잡혔으니 이는 짐승의 표를 받고 그의 우상에게 경배하던 자들을 이적으로 미혹하던 자라 이 둘이 산채로 유황불 붙는 못에 던지우고"],[21,"그 나머지는 말 탄 자의 입으로 나오는 검에 죽으매 모든 새가 그 고기로 배불리우더라"]]},{"chapter":20,"title":"요한계시록 20","verses":[[1,"또 내가 보매 천사가 무저갱 열쇠와 큰 쇠사슬을 그 손에 가지고 하늘로서 내려와서"],[2,"용을 잡으니 곧 옛 뱀이요 마귀요 사단이라 잡아 일천년 동안 결박하여"],[3,"무저갱에 던져 잠그고 그 위에 인봉하여 천년이 차도록 다시는 만국을 미혹하지 못하게 하였다가 그 후에는 반드시 잠간 놓이리라"],[4,"또 내가 보좌들을 보니 거기 앉은 자들이 있어 심판하는 권세를 받았더라 또 내가 보니 예수의 증거와 하나님의 말씀을 인하여 목 베임을 받은 자의 영혼들과 또 짐승과 그의 우상에게 경배하지도 아니하고 이마와 손에 그의 표를 받지도 아니한 자들이 살아서 그리스도로 더불어 천년 동안 왕노릇 하니"],[5,"(그 나머지 죽은 자들은 그 천년이 차기까지 살지 못하더라) )이는 첫째 부활이라"],[6,"이 첫째 부활에 참예하는 자들은 복이 있고 거룩하도다 둘째 사망이 그들을 다스리는 권세가 없고 도리어 그들이 하나님과 그리스도의 제사장이 되어 천년 동안 그리스도로 더불어 왕노릇 하리라"],[7,"천년이 차매 사단이 그 옥에서 놓여"],[8,"나와서 땅의 사방 백성 곧 곡과 마곡을 미혹하고 모아 싸움을 붙이리니 그 수가 바다 모래 같으리라"],[9,"저희가 지면에 널리 퍼져 성도들의 진과 사랑하시는 성을 두르매 하늘에서 불이 내려와 저희를 소멸하고"],[10,"또 저희를 미혹하는 마귀가 불과 유황 못에 던지우니 거기는 그 짐승과 거짓 선지자도 있어 세세토록 밤낮 괴로움을 받으리라"],[11,"또 내가 크고 흰 보좌와 그 위에 앉으신 자를 보니 땅과 하늘이 그 앞에서 피하여 간데 없더라"],[12,"또 내가 보니 죽은 자들이 무론 대소하고 그 보좌 앞에 섰는데 책들이 펴 있고 또 다른 책이 펴졌으니 곧 생명책이라 죽은 자들이 자기 행위를 따라 책들에 기록된대로 심판을 받으니"],[13,"바다가 그 가운데서 죽은 자들을 내어주고 또 사망과 음부도 그 가운데서 죽은 자들을 내어주매 각 사람이 자기의 행위대로 심판을 받고"],[14,"사망과 음부도 불못에 던지우니 이것은 둘째 사망 곧 불못이라"],[15,"누구든지 생명책에 기록되지 못한 자는 불못에 던지우더라"]]},{"chapter":21,"title":"요한계시록 21","verses":[[1,"또 내가 새 하늘과 새 땅을 보니 처음 하늘과 처음 땅이 없어졌고 바다도 다시 있지 않더라"],[2,"또 내가 보매 거룩한 성 새 예루살렘이 하나님께로부터 하늘에서 내려오니 그 예비한 것이 신부가 남편을 위하여 단장한 것 같더라"],[3,"내가 들으니 보좌에서 큰 음성이 나서 가로되 `보라, 하나님의 장막이 사람들과 함께 있으매 하나님이 저희와 함께 거하시리니 저희는 하나님의 백성이 되고 하나님은 친히 저희와 함께 계셔서"],[4,"모든 눈물을 그 눈에서 씻기시매 다시 사망이 없고 애통하는 것이나 곡하는 것이나 아픈 것이 다시 있지 아니하리니 처음 것들이 다 지나갔음이러라"],[5,"보좌에 앉으신 이가 가라사대 `보라 내가 만물을 새롭게 하노라' 하시고 또 가라사대 `이 말은 신실하고 참되니 기록하라' 하시고"],[6,"또 내게 말씀하시되 `이루었도다 나는 알파와 오메가요 처음과 나중이라 내가 생명수 샘물로 목 마른 자에게 값 없이 주리니"],[7,"이기는 자는 이것들을 유업으로 얻으리라 나는 저의 하나님이 되고 그는 내 아들이 되리라"],[8,"그러나 두려워하는 자들과, 믿지 아니하는 자들과, 흉악한 자들과, 살인자들과, 행음자들과, 술객들과, 우상 숭배자들과, 모든 거짓말 하는 자들은 불과 유황으로 타는 못에 참예하리니 이것이 둘째 사망이라"],[9,"일곱 대접을 가지고 마지막 일곱 재앙을 담은 일곱 천사중 하나가 나아와서 내게 말하여 가로되 이리 오라 내가 신부 곧 어린 양의 아내를 네게 보이리라' 하고"],[10,"성령으로 나를 데리고 크고 높은 산으로 올라가 하나님께로부터 하늘에서 내려오는 거룩한 성 예루살렘을 보이니"],[11,"하나님의 영광이 있으매 그 성의 빛이 지극히 귀한 보석 같고 벽옥과 수정 같이 맑더라"],[12,"크고 높은 성곽이 있고 열 두 문이 있는데 문에 열 두 천사가 있고 그 문들 위에 이름을 썼으니 이스라엘 자손 열 두 지파의 이름들이라"],[13,"동편에 세 문, 북편에 세 문, 남편에 세 문, 서편에 세 문이니"],[14,"그 성에 성곽은 열 두 기초석이 있고 그 위에 어린 양의 십 이 사도의 열 두 이름이 있더라"],[15,"내게 말하는 자가 그 성과 그 문들과 성곽을 척량하려고 금 갈대를 가졌더라"],[16,"그 성은 네모가 반듯하여 장광이 같은지라 그 갈대로 그 성을 척량하니 일만 이천 스다디온이요 장과 광과 고가 같더라"],[17,"그 성곽을 척량하매 일백 사십 사 규빗이니 사람의 척량 곧 천사의 척량이라"],[18,"그 성곽은 벽옥으로 쌓였고 그 성은 정금인데 맑은 유리 같더라"],[19,"그 성의 성곽의 기초석은 각색 보석으로 꾸몄는데 첫째 기초석은 벽옥이요, 둘째는 남보석이요, 세째는 옥수요, 네째는 녹보석이요"],[20,"다섯째는 홍마노요, 여섯째는 홍보석이요, 일곱째는 황옥이요, 여덟째는 녹옥이요, 아홉째는 담황옥이요, 열째는 비취옥이요, 열 한째는 청옥이요, 열 둘째는 자정이라"],[21,"그 열 두 문은 열 두 진주니 문마다 한 진주요 성의 길은 맑은 유리 같은 정금이더라"],[22,"성안에 성전을 내가 보지 못하였으니 이는 주 하나님 곧 전능하신 이와 및 어린 양이 그 성전이심이라"],[23,"그 성은 해나 달의 비췸이 쓸데 없으니 이는 하나님의 영광이 비취고 어린 양이 그 등이 되심이라"],[24,"만국이 그 빛 가운데로 다니고 땅의 왕들이 자기 영광을 가지고 그리로 들어오리라"],[25,"성문들을 낮에 도무지 닫지 아니하리니 거기는 밤이 없음이라"],[26,"사람들이 만국의 영광과 존귀를 가지고 그리로 들어오겠고"],[27,"무엇이든지 속된 것이나 가증한 일 또는 거짓말 하는 자는 결코 그리로 들어오지 못하되 오직 어린 양의 생명책에 기록된 자들뿐이라"]]},{"chapter":22,"title":"요한계시록 22","verses":[[1,"또 저가 수정 같이 맑은 생명수의 강을 내게 보이니 하나님과 및 어린 양의 보좌로부터 나서"],[2,"길 가운데로 흐르더라 강 좌우에 생명 나무가 있어 열 두가지 실과를 맺히되 달마다 그 실과를 맺히고 그 나무 잎사귀들은 만국을 소성하기 위하여 있더라"],[3,"다시 저주가 없으며 하나님과 그 어린 양의 보좌가 그 가운데 있으리니 그의 종들이 그를 섬기며"],[4,"그의 얼굴을 볼터이요 그의 이름도 저희 이마에 있으리라"],[5,"다시 밤이 없겠고 등불과 햇빛이 쓸데 없으니 이는 주 하나님이 저희에게 비취심이라 저희가 세세토록 왕노릇하리로다"],[6,"또 그가 내게 말하기를 이 말은 신실하고 참된지라 주 곧 선지자들의 영의 하나님이 그의 종들에게 결코 속히 될 일을 보이시려고 그의 천사를 보내셨도다"],[7,"보라, 내가 속히 오리니 이 책의 예언의 말씀을 지키는 자가 복이 있으리라 하더라"],[8,"이것들을 보고 들은 자는 나 요한이니 내가 듣고 볼 때에 이 일을 내게 보이던 천사의 발앞에 경배하려고 엎드렸더니"],[9,"저가 내게 말하기를 나는 너와 네 형제 선지자들과 또 이 책의 말을 지키는 자들과 함께 된 종이니 그리하지 말고 오직 하나님께 경배하라 하더라"],[10,"또 내게 말하되 이 책의 예언의 말씀을 인봉하지 말라 때가 가까우니라"],[11,"불의를 하는 자는 그대로 불의를 하고 더러운 자는 그대로 더럽고 의로운 자는 그대로 의를 행하고 거룩한 자는 그대로 거룩되게 하라"],[12,"보라, 내가 속히 오리니 내가 줄 상이 내게 있어 각 사람에게 그의 일한대로 갚아 주리라"],[13,"나는 알파와 오메가요 처음과 나중이요 시작과 끝이라"],[14,"그 두루마기를 빠는 자들은 복이 있으니 이는 저희가 생명 나무에 나아가며 문들을 통하여 성에 들어갈 권세를 얻으려 함이로다"],[15,"개들과 술객들과 행음자들과 살인자들과 우상 숭배자들과 및 거짓말을 좋아하며 지어내는 자마다 성밖에 있으리라"],[16,"나 예수는 교회들을 위하여 내 사자를 보내어 이것들을 너희에게 증거하게 하였노라 나는 다윗의 뿌리요 자손이니 곧 광명한 새벽별이라 하시더라"],[17,"성령과 신부가 말씀하시기를 오라 하시는도다 듣는 자도 오라 할 것이요 목마른 자도 올 것이요 또 원하는 자는 값 없이 생명수를 받으라 하시더라"],[18,"내가 이 책의 예언의 말씀을 듣는 각인에게 증거하노니 만일 누구든지 이것들 외에 더하면 하나님이 이 책에 기록된 재앙들을 그에게 더하실 터이요"],[19,"만일 누구든지 이 책의 예언의 말씀에서 제하여 버리면 하나님이 이 책에 기록된 생명 나무와 및 거룩한 성에 참예함을 제하여 버리시리라"],[20,"이것들을 증거하신 이가 가라사대 내가 진실로 속히 오리라! 하시거늘 아멘 주 예수여! 오시옵소서"],[21,"주 예수의 은혜가 모든 자들에게 있을찌어다! 아멘"]]}]
};

function isKw(w){const c=w.toLowerCase().replace(/[^a-z0-9'-]/g,'');if(KW.has(c))return true;for(const k of KW){if(k.length>3&&c.includes(k))return true;}return false;}

// ── State ──
let currentTranslation='niv2011';
let globalPct=30;
let darkMode=false;
let currentChapterIdx=0;
let allStates={niv2011:{},niv1984:{},korean:{}};
let lastPct={niv2011:null,niv1984:null,korean:null};
let wordCountOn=true;
let sealedMode=false;
let preSealedPct=30;
let preSealedWc=true;

function chs(){return TRANSLATIONS[currentTranslation];}
function st(){return allStates[currentTranslation];}

// ── Tokenize ──
function tokenize(t){const r=[];const rx=/(\S+)/g;let m,l=0;while((m=rx.exec(t))!==null){if(m.index>l)r.push({t:'s',x:t.slice(l,m.index)});r.push({t:'w',x:m[1]});l=rx.lastIndex;}if(l<t.length)r.push({t:'s',x:t.slice(l)});return r;}

// ── Select hidden words ──
function selectHidden(ci,pct){
  const ch=chs()[ci];const aW=[];
  ch.verses.forEach((v,vi)=>{const tk=tokenize(v[1]);let wi=0;tk.forEach(t=>{if(t.t==='w'){aW.push({vi,wi,kw:isKw(t.x)});wi++;}});});
  const total=aW.length,num=Math.max(1,Math.round(total*pct/100));
  const kwI=[],nkI=[];aW.forEach((w,i)=>{(w.kw?kwI:nkI).push(i);});
  shuffle(kwI);shuffle(nkI);
  const kwN=Math.min(Math.round(num*0.8),kwI.length);
  let nkN=Math.min(num-kwN,nkI.length);
  nkN+=Math.min(num-kwN-nkN,nkI.length-nkN);
  const sel=new Set();
  for(let i=0;i<kwN;i++)sel.add(kwI[i]);
  for(let i=0;i<nkN;i++)sel.add(nkI[i]);
  if(sel.size<num)for(let i=kwN;i<kwI.length&&sel.size<num;i++)sel.add(kwI[i]);
  const h=new Set();aW.forEach((w,i)=>{if(sel.has(i))h.add(w.vi+'-'+w.wi);});
  return h;
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}

// ── DOM ──
let scoreEls={};
let panels=[];

function buildAllChapters(){
  const track=document.getElementById('swipeTrack');
  track.innerHTML='';
  track.classList.remove('animating');
  track.style.transform='';
  panels=[];
  scoreEls={};
  const bookName=currentTranslation==='korean'?'요한계시록':'Revelation';
  chs().forEach((ch,ci)=>{
    // Ensure state
    if(!st()[ci]){const h=selectHidden(ci,globalPct);st()[ci]={hiddenSet:h,revealedSet:new Set()};lastPct[currentTranslation]=globalPct;}
    const panel=document.createElement('div');
    panel.className='chapter-panel';
    panel.id='panel-'+ci;
    // Header
    const numHdr=document.createElement('div');
    numHdr.className='chapter-num-header';
    numHdr.innerHTML='<div class="ch-label">'+bookName+'</div><div class="ch-num">'+ch.chapter+'</div>';
    panel.appendChild(numHdr);
    // Toolbar
    const toolbar=document.createElement('div');
    toolbar.className='chapter-toolbar';
    const sc=document.createElement('span');
    sc.className='ch-score';
    scoreEls[ci]=sc;
    const rb=document.createElement('button');
    rb.className='randomise-btn';
    rb.textContent='\u27F3 Randomise';
    rb.onclick=(()=>{const idx=ci;return()=>randomiseCh(idx);})();
    toolbar.appendChild(sc);
    toolbar.appendChild(rb);
    panel.appendChild(toolbar);
    // Verses
    const headings=HEADINGS[ch.chapter]||{};
    ch.verses.forEach((v,vi)=>{
      const vn=v[0];
      if(headings[vn]){const hd=document.createElement('div');hd.className='section-heading';hd.textContent=headings[vn];panel.appendChild(hd);}
      const p=document.createElement('p');p.className='verse';
      const sup=document.createElement('sup');sup.className='vnum';sup.textContent=vn;p.appendChild(sup);
      const tks=tokenize(v[1]);let wi=0;
      tks.forEach(tk=>{
        if(tk.t==='w'){
          const sp=document.createElement('span');
          sp.className='blank not-hidden';
          sp.textContent=tk.x;
          sp.dataset.c=ci;sp.dataset.v=vi;sp.dataset.w=wi;
          sp.onclick=onBlankClick;
          p.appendChild(sp);wi++;
        }else{p.appendChild(document.createTextNode(tk.x));}
      });
      panel.appendChild(p);
    });
    // Apply hidden state + merge
    applyStateToPanel(panel,ci);
    track.appendChild(panel);
    panels.push(panel);
  });
  positionTrack();
}

function applyStateToPanel(panel,ci){
  const s=st()[ci];if(!s)return;
  panel.querySelectorAll('.blank').forEach(sp=>{
    const k=sp.dataset.v+'-'+sp.dataset.w;
    if(s.hiddenSet.has(k)){
      sp.classList.remove('not-hidden');
      sp.classList.toggle('revealed',s.revealedSet.has(k));
    }else{sp.classList.add('not-hidden');sp.classList.remove('revealed');}
  });
  mergeAdjacent(panel);
  updateScore(ci);
}

function mergeAdjacent(root){
  const ignorePeriods=globalPct>=100;
  root.querySelectorAll('.verse').forEach(verse=>{
    const kids=Array.from(verse.childNodes);let i=0;
    while(i<kids.length){
      const n=kids[i];
      if(n.nodeType===1&&n.classList.contains('blank')&&!n.classList.contains('not-hidden')&&!n.classList.contains('revealed')){
        let wordCount=1;
        // Don't merge if this word ends with a period (unless at 100%)
        if(!ignorePeriods&&n.textContent.trimEnd().match(/[.!?]$/)){i++;continue;}
        let j=i+1,space='',targets=[];
        while(j<kids.length){
          const nx=kids[j];
          if(nx.nodeType===3&&nx.textContent.trim()===''){space+=nx.textContent;targets.push(nx);j++;}
          else if(nx.nodeType===1&&nx.classList.contains('blank')&&!nx.classList.contains('not-hidden')&&!nx.classList.contains('revealed')){
            n.textContent+=space+nx.textContent;
            const ex=n.dataset.words||(n.dataset.v+'-'+n.dataset.w);
            n.dataset.words=ex+','+nx.dataset.v+'-'+nx.dataset.w;
            wordCount++;
            targets.push(nx);targets.forEach(t=>t.remove());
            targets=[];space='';kids.splice(i+1,j-i);j=i+1;
            // Stop merging if the newly added word ends with a period (unless at 100%)
            if(!ignorePeriods&&nx.textContent.trimEnd().match(/[.!?]$/))break;
          }else break;
        }
        // Add word count badge if more than 1 word
        if(wordCount>1){
          const badge=document.createElement('span');
          badge.className='wc-badge';
          badge.textContent=wordCount;
          n.appendChild(badge);
        }
      }
      i++;
    }
  });
}

function positionTrack(animate){
  const track=document.getElementById('swipeTrack');
  if(animate){track.classList.add('animating');}else{track.classList.remove('animating');}
  track.style.transform='translateX('+(-(currentChapterIdx*100))+'%)';
  if(animate){setTimeout(()=>{track.classList.remove('animating');},300);}
}

function showChapter(ci,skipScroll){
  if(ci<0||ci>=chs().length)return;
  currentChapterIdx=ci;
  positionTrack();
  updateArrows();
  updateNav();
  if(!skipScroll)window.scrollTo({top:0});
  debounceSave();
}

function onBlankClick(e){
  const sp=e.currentTarget;if(sp.classList.contains('not-hidden'))return;
  const ci=parseInt(sp.dataset.c);const s=st()[ci];
  const keys=sp.dataset.words?sp.dataset.words.split(','):[sp.dataset.v+'-'+sp.dataset.w];
  if(!sp.classList.contains('revealed')){sp.classList.add('revealed');keys.forEach(k=>s.revealedSet.add(k));}
  else{sp.classList.remove('revealed');keys.forEach(k=>s.revealedSet.delete(k));}
  updateScore(ci);debounceSave();
}

function updateScore(ci){
  const s=st()[ci];const el=scoreEls[ci];
  if(!s||!el)return;
  el.innerHTML='<b>'+s.revealedSet.size+'</b> / '+s.hiddenSet.size;
}

function randomiseCh(ci,silent){
  const h=selectHidden(ci,globalPct);
  st()[ci]={hiddenSet:h,revealedSet:new Set()};
  lastPct[currentTranslation]=globalPct;
  // Rebuild that panel
  const panel=panels[ci];
  if(panel){
    const ch=chs()[ci];
    const bookName=currentTranslation==='korean'?'요한계시록':'Revelation';
    panel.innerHTML='';
    const numHdr=document.createElement('div');
    numHdr.className='chapter-num-header';
    numHdr.innerHTML='<div class="ch-label">'+bookName+'</div><div class="ch-num">'+ch.chapter+'</div>';
    panel.appendChild(numHdr);
    const toolbar=document.createElement('div');
    toolbar.className='chapter-toolbar';
    const sc=document.createElement('span');
    sc.className='ch-score';
    scoreEls[ci]=sc;
    const rb=document.createElement('button');
    rb.className='randomise-btn';
    rb.textContent='\u27F3 Randomise';
    rb.onclick=()=>randomiseCh(ci);
    toolbar.appendChild(sc);
    toolbar.appendChild(rb);
    panel.appendChild(toolbar);
    const headings=HEADINGS[ch.chapter]||{};
    ch.verses.forEach((v,vi)=>{
      const vn=v[0];
      if(headings[vn]){const hd=document.createElement('div');hd.className='section-heading';hd.textContent=headings[vn];panel.appendChild(hd);}
      const p=document.createElement('p');p.className='verse';
      const sup=document.createElement('sup');sup.className='vnum';sup.textContent=vn;p.appendChild(sup);
      const tks=tokenize(v[1]);let wi=0;
      tks.forEach(tk=>{
        if(tk.t==='w'){
          const sp=document.createElement('span');
          sp.className='blank not-hidden';
          sp.textContent=tk.x;
          sp.dataset.c=ci;sp.dataset.v=vi;sp.dataset.w=wi;
          sp.onclick=onBlankClick;
          p.appendChild(sp);wi++;
        }else{p.appendChild(document.createTextNode(tk.x));}
      });
      panel.appendChild(p);
    });
    applyStateToPanel(panel,ci);
  }
  if(!silent)debounceSave(true);
}

// ── Navigation ──
let animating=false;
function goChapter(ci,animate){
  if(ci<0||ci>=chs().length||animating)return;
  if(ci===currentChapterIdx){return;}
  currentChapterIdx=ci;
  if(animate){
    animating=true;
    positionTrack(true);
    setTimeout(()=>{animating=false;},300);
  }else{
    positionTrack();
  }
  updateArrows();
  updateNav();
  window.scrollTo({top:0});
  debounceSave();
}

function updateArrows(){
  const l=document.getElementById('arrowLeft'),r=document.getElementById('arrowRight');
  const bl=document.getElementById('bbLeft'),br=document.getElementById('bbRight');
  l.classList.toggle('disabled',currentChapterIdx===0);
  r.classList.toggle('disabled',currentChapterIdx>=chs().length-1);
  bl.classList.toggle('disabled',currentChapterIdx===0);
  br.classList.toggle('disabled',currentChapterIdx>=chs().length-1);
  document.getElementById('bbTitle').textContent=chs()[currentChapterIdx].title;
}
function updateNav(){
  const sel=document.getElementById('chapterSel');
  if(sel)sel.value=currentChapterIdx;
}

// ── Swipe with peek ──
let touchStartX=0,touchStartY=0,dragging=false,dragLocked=false;
const SWIPE_THRESHOLD=0.3;

document.addEventListener('touchstart',e=>{
  if(animating)return;
  touchStartX=e.touches[0].clientX;
  touchStartY=e.touches[0].clientY;
  dragging=false;dragLocked=false;
  // Remove any lingering animation class
  document.getElementById('swipeTrack').classList.remove('animating');
},{passive:true});

document.addEventListener('touchmove',e=>{
  if(animating)return;
  const dx=e.touches[0].clientX-touchStartX;
  const dy=e.touches[0].clientY-touchStartY;
  if(!dragLocked){
    if(Math.abs(dx)>10||Math.abs(dy)>10){
      dragLocked=true;
      dragging=Math.abs(dx)>Math.abs(dy);
    }
    return;
  }
  if(!dragging)return;
  // Boundary: don't drag past first/last chapter
  const targetCi=dx<0?currentChapterIdx+1:currentChapterIdx-1;
  if(targetCi<0||targetCi>=chs().length){return;}
  const track=document.getElementById('swipeTrack');
  const baseOffset=-(currentChapterIdx*100);
  const pxToPct=(dx/window.innerWidth)*100;
  track.style.transform='translateX('+(baseOffset+pxToPct)+'%)';
},{passive:true});

document.addEventListener('touchend',e=>{
  if(!dragging||animating){dragging=false;return;}
  const dx=e.changedTouches[0].clientX-touchStartX;
  const sw=window.innerWidth;
  const ratio=Math.abs(dx)/sw;
  const targetCi=dx<0?currentChapterIdx+1:currentChapterIdx-1;
  const track=document.getElementById('swipeTrack');

  if(ratio>=SWIPE_THRESHOLD&&targetCi>=0&&targetCi<chs().length){
    // Commit
    animating=true;
    currentChapterIdx=targetCi;
    track.classList.add('animating');
    track.style.transform='translateX('+(-(currentChapterIdx*100))+'%)';
    updateArrows();
    updateNav();
    window.scrollTo({top:0});
    debounceSave();
    setTimeout(()=>{track.classList.remove('animating');animating=false;},300);
  }else{
    // Snap back
    track.classList.add('animating');
    track.style.transform='translateX('+(-(currentChapterIdx*100))+'%)';
    setTimeout(()=>{track.classList.remove('animating');},300);
  }
  dragging=false;dragLocked=false;
},{passive:true});

// ── Scroll-direction bottom bar hide/show ──
let lastScrollY=0,bbTicking=false;
window.addEventListener('scroll',()=>{
  if(!bbTicking){
    requestAnimationFrame(()=>{
      const bb=document.getElementById('bottomBar');
      const sy=window.scrollY;
      if(sy>lastScrollY&&sy>100)bb.classList.add('bb-hidden');
      else bb.classList.remove('bb-hidden');
      lastScrollY=sy;
      bbTicking=false;
    });
    bbTicking=true;
  }
},{passive:true});

// ── Init ──
function init(){
  loadState();

  document.getElementById('translationSel').value=currentTranslation;
  document.getElementById('translationSel').onchange=e=>{
    currentTranslation=e.target.value;
    if(lastPct[currentTranslation]!==globalPct)allStates[currentTranslation]={};
    buildNav();buildAllChapters();
    updateArrows();updateNav();
    debounceSave(true);
  };

  const pSel=document.getElementById('globalPct');
  for(let p=10;p<=100;p+=10){const o=document.createElement('option');o.value=p;o.textContent=p+'%';if(p===globalPct)o.selected=true;pSel.appendChild(o);}
  pSel.onchange=e=>{
    globalPct=parseInt(e.target.value);
    chs().forEach((_,ci)=>{const h=selectHidden(ci,globalPct);st()[ci]={hiddenSet:h,revealedSet:new Set()};});
    lastPct[currentTranslation]=globalPct;
    buildAllChapters();debounceSave(true);
  };

  applyTheme();
  applyWordCount();
  applySealedMode();
  document.getElementById('themeToggle').onclick=()=>{darkMode=!darkMode;applyTheme();debounceSave(true);};

  document.getElementById('wordCountToggle').onclick=()=>{
    wordCountOn=!wordCountOn;
    applyWordCount();
    debounceSave(true);
  };

  document.getElementById('sealedToggle').onclick=()=>{
    sealedMode=!sealedMode;
    if(sealedMode){
      // Store current settings before sealing
      preSealedPct=globalPct;
      preSealedWc=wordCountOn;
      globalPct=100;
      wordCountOn=false;
      document.getElementById('globalPct').value=100;
    }else{
      // Revert to pre-sealed settings
      globalPct=preSealedPct;
      wordCountOn=preSealedWc;
      document.getElementById('globalPct').value=globalPct;
    }
    // Re-randomise all chapters at new percentage
    chs().forEach((_,ci)=>{const h=selectHidden(ci,globalPct);st()[ci]={hiddenSet:h,revealedSet:new Set()};});
    lastPct[currentTranslation]=globalPct;
    applyWordCount();
    applySealedMode();
    buildAllChapters();
    debounceSave(true);
  };

  document.getElementById('revealAll').onclick=()=>{
    chs().forEach((_,ci)=>{const s=st()[ci];if(s)s.hiddenSet.forEach(k=>s.revealedSet.add(k));});
    buildAllChapters();debounceSave();
  };
  document.getElementById('hideAll').onclick=()=>{
    chs().forEach((_,ci)=>{const s=st()[ci];if(s)s.revealedSet.clear();});
    buildAllChapters();debounceSave();
  };

  document.getElementById('arrowLeft').onclick=()=>goChapter(currentChapterIdx-1);
  document.getElementById('arrowRight').onclick=()=>goChapter(currentChapterIdx+1);
  document.getElementById('bbLeft').onclick=()=>goChapter(currentChapterIdx-1);
  document.getElementById('bbRight').onclick=()=>goChapter(currentChapterIdx+1);

  buildNav();
  buildAllChapters();
  updateArrows();updateNav();
}

function buildNav(){
  const sel=document.getElementById('chapterSel');
  sel.innerHTML='';
  chs().forEach((ch,ci)=>{
    const o=document.createElement('option');
    o.value=ci;o.textContent=ch.title;
    if(ci===currentChapterIdx)o.selected=true;
    sel.appendChild(o);
  });
  sel.onchange=e=>goChapter(parseInt(e.target.value),false);
}

function applyTheme(){
  document.documentElement.setAttribute('data-theme',darkMode?'dark':'light');
  document.getElementById('themeToggle').textContent=darkMode?'\u2600':'\u263D';
}

function applyWordCount(){
  document.body.setAttribute('data-wc',wordCountOn?'on':'off');
  const btn=document.getElementById('wordCountToggle');
  btn.classList.toggle('toggle-active',wordCountOn);
}

function applySealedMode(){
  const btn=document.getElementById('sealedToggle');
  btn.classList.toggle('toggle-active',sealedMode);
}

// ── Save / Load ──
let saveTimer=null;
function debounceSave(showIndicator){clearTimeout(saveTimer);saveTimer=setTimeout(()=>saveState(showIndicator),500);}

function saveState(showIndicator){
  try{
    const d={v:4,t:currentTranslation,p:globalPct,dk:darkMode,ci:currentChapterIdx,lp:lastPct,wc:wordCountOn,sm:sealedMode,sp:preSealedPct,sw:preSealedWc,s:{}};
    for(const tk in allStates){d.s[tk]={};for(const ci in allStates[tk]){d.s[tk][ci]={h:Array.from(allStates[tk][ci].hiddenSet),r:Array.from(allStates[tk][ci].revealedSet)};}}
    localStorage.setItem('thirteenPages',JSON.stringify(d));
    if(showIndicator){const el=document.getElementById('saveIndicator');el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1200);}
  }catch(e){console.warn('Save failed:',e);}
}

function loadState(){
  try{
    const raw=localStorage.getItem('thirteenPages')||localStorage.getItem('heavenlyExamBuddy');if(!raw)return;
    const d=JSON.parse(raw);
    if(d.v===4||d.v===3){
      if(d.t)currentTranslation=d.t;
      if(d.p)globalPct=d.p;
      if(d.dk!==undefined)darkMode=d.dk;
      if(d.ci!==undefined)currentChapterIdx=d.ci;
      if(d.lp){lastPct.niv2011=d.lp.niv2011??null;lastPct.niv1984=d.lp.niv1984??null;lastPct.korean=d.lp.korean??null;}
      if(d.wc!==undefined)wordCountOn=d.wc;
      if(d.sm!==undefined)sealedMode=d.sm;
      if(d.sp!==undefined)preSealedPct=d.sp;
      if(d.sw!==undefined)preSealedWc=d.sw;
      if(d.s)for(const tk in d.s){if(!allStates[tk])allStates[tk]={};for(const ci in d.s[tk]){allStates[tk][parseInt(ci)]={hiddenSet:new Set(d.s[tk][ci].h),revealedSet:new Set(d.s[tk][ci].r)};}}
    }else if(d.v===2){
      if(d.translation)currentTranslation=d.translation;
      if(d.pct)globalPct=d.pct;
      if(d.dark!==undefined)darkMode=d.dark;
      if(d.lastPct){lastPct.niv2011=d.lastPct.niv2011??null;lastPct.niv1984=d.lastPct.niv1984??null;}
      if(d.states)for(const tk in d.states){if(!allStates[tk])allStates[tk]={};for(const ci in d.states[tk]){allStates[tk][parseInt(ci)]={hiddenSet:new Set(d.states[tk][ci].h),revealedSet:new Set(d.states[tk][ci].r)};}}
    }else{
      if(d.globalPct)globalPct=d.globalPct;
      if(d.darkMode!==undefined)darkMode=d.darkMode;
      if(d.chapters)for(const ci in d.chapters){allStates.niv2011[parseInt(ci)]={hiddenSet:new Set(d.chapters[ci].hidden),revealedSet:new Set(d.chapters[ci].revealed)};}
    }
  }catch(e){console.warn('Load failed:',e);}
}

init();
</script>
